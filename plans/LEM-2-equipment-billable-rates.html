# LEM-2: Equipment Billable Rates — Implementation Plan

## Overview

Create an equipment rate configuration system with editable rate types per EquipmentCategory, a polymorphic `EquipmentRateValue` table using `referenceModel` + `referenceId`, and a shared `EquipmentRateTable` frontend component with two-level tabs (Operator/Bare x Per-unit).

**Estimated effort:** 4-6 days
**Risk:** Medium — new models, no existing behavior changes
**Spec:** `tm-work-orders-uis/uis-LEM-2-equipment-billable-rates.html`

---

**File:** `apps/api/prisma/schema.prisma`

### 1a. Add the EquipmentRatePer enum

```prisma

  HOUR
  DAY
  WEEK
  MONTH
  YEAR
}

### 1d. Add EquipmentRateValue model (polymorphic)

```prisma
model EquipmentRateValue {
  id                      String                  @id @db.VarChar(21)
  isDeleted               Boolean                 @default(false)
  isArchived              Boolean                 @default(false)
  createdAt               DateTime                @default(now())
  updatedAt               DateTime                @default(now()) @updatedAt

  referenceModel          String
  referenceId             String                  @db.VarChar(21)

  equipmentRateScheduleId String?                 @db.VarChar(21)
  EquipmentRateSchedule   EquipmentRateSchedule?  @relation(fields: [equipmentRateScheduleId], references: [id])

  equipmentRateLabelId    String                  @db.VarChar(21)
  EquipmentRateLabel      EquipmentRateLabel      @relation(fields: [equipmentRateLabelId], references: [id])
  amount                  Decimal                 @db.Decimal(12, 2)
  per                     EquipmentRatePer        @default(HOUR)
  operatorIncluded        Boolean                 @default(true)

  @@unique([equipmentRateLabelId, referenceModel, referenceId, per, operatorIncluded, equipmentRateScheduleId])
  @@index([referenceModel, referenceId, isArchived, isDeleted])
  @@index([equipmentRateLabelId, referenceModel])
  @@index([equipmentRateScheduleId])
}
```

### 1e. Add relations on EquipmentCategory (line ~1927)

Add to the existing EquipmentCategory model:

```prisma
  EquipmentRateLabels    EquipmentRateLabel[]
  EquipmentRateSchedules EquipmentRateSchedule[]
```

**Note:** EquipmentRateValue does NOT get `@relation` fields to Equipment, Job, or EquipmentCategory — it's polymorphic. Only EquipmentRateSchedule and EquipmentRateLabel have proper Prisma relations.

Run `pnpm --filter api prisma:migrate` and name it `add_equipment_rate_system`.

public async initializeEquipmentRateLabels(

**Key method — `resolveEquipmentRate`:**

```typescript
// Resolution priority: highest index wins
private static PRIORITY: Record<string, number> = {
    "EquipmentCategory": 0,
    "Equipment": 1,
    "Job": 2
    // Future: "Company": 3
};

public async resolveEquipmentRate(
    equipmentId: string,
    rateLabelId: string,
    per: string,
    jobId?: string,
    operatorIncluded: boolean = true,
    date?: Date  // optional — determines which schedule is active
): Promise<{ amount: number; per: string; operatorIncluded: boolean; provenance: string; rateLabelName: string; equipmentRateScheduleId: string | null } | null> {
    // Get equipment to find its category
    const equipment = await prisma.equipment.findUnique({
        where: { id: equipmentId },
        include: { EquipmentCategory: true }
    });
    if (!equipment) return null;

    const rateLabel = await prisma.equipmentRateLabel.findUnique({
        where: { id: rateLabelId }
    });
    if (!rateLabel) return null;

    // Determine active schedule for this category
    let scheduleId: string | null = null;
    if (date) {
        const activeSchedule = await prisma.equipmentRateSchedule.findFirst({
            where: {
                equipmentCategoryId: equipment.equipmentCategoryId,
                effectiveDate: { lte: date },
                isDeleted: false,
                isArchived: false
            },
            orderBy: { effectiveDate: "desc" }
        });
        scheduleId = activeSchedule?.id ?? null;
    }

    // Build OR conditions for all applicable scope levels
    const orConditions: any[] = [
        { referenceModel: "EquipmentCategory", referenceId: equipment.equipmentCategoryId },
        { referenceModel: "Equipment", referenceId: equipmentId }
    ];
    if (jobId) {
        orConditions.push({ referenceModel: "Job", referenceId: jobId });
    }

    const candidates = await this.prisma.findMany({
        where: {
            equipmentRateLabelId: rateLabelId,
            per: per,
            operatorIncluded: operatorIncluded,
            equipmentRateScheduleId: scheduleId, // null = default (unscheduled) rates
            isDeleted: false,
            isArchived: false,
            OR: orConditions
        }
    });

    if (candidates.length === 0) return null;

    // Pick highest priority
    const sorted = candidates.sort(
        (a, b) => (EquipmentRateValueModel.PRIORITY[b.referenceModel] ?? -1)
                 - (EquipmentRateValueModel.PRIORITY[a.referenceModel] ?? -1)
    );

    const winner = sorted[0];
    return {
        amount: winner.amount.toNumber(),
        per: winner.per,
        operatorIncluded: winner.operatorIncluded,
        provenance: winner.referenceModel,
        rateLabelName: rateLabel.name,
        equipmentRateScheduleId: scheduleId
    };
}
```

**Key method — `upsertManyEquipmentRateValues`:**

```typescript
public async upsertManyEquipmentRateValues(
    data: Array<{
        equipmentRateLabelId: string;
        referenceModel: string;
        referenceId: string;
        per: string;
        operatorIncluded: boolean;
        amount: number;
    }>,
    currentUserId: string
): Promise<boolean> {
    for (const item of data) {
        const existing = await this.prisma.findFirst({
            where: {
                equipmentRateLabelId: item.equipmentRateLabelId,
                referenceModel: item.referenceModel,
                referenceId: item.referenceId,
                per: item.per,
                operatorIncluded: item.operatorIncluded,
                isDeleted: false,
                isArchived: false
            }
        });

        if (existing) {
            await this.editItem(existing.id, { amount: item.amount }, currentUserId);
        } else {
            await this.createItem(item, currentUserId);
        }
    }
    return true;
}
```

**Query implementations:**

- `equipmentRateValues`: Simple filter by `referenceModel` + `referenceId`
- `equipmentRatesForEquipment`: Returns values where `(referenceModel = "Equipment" AND referenceId = equipmentId)` — the equipment-level overrides only. The frontend merges these with category defaults client-side.
- `equipmentJobRateOverrides`: Returns values where `referenceModel = "Job" AND referenceId = jobId` — for the Job detail page
- `resolveEquipmentRate`: Delegates to model's `resolveEquipmentRate` method

## Step 6: Shared Frontend Component — EquipmentRateTable

**Create file:** `apps/frontend/src/components/EquipmentRateTable/EquipmentRateTable.tsx`

This is the core shared component used on all three pages.

### Props Interface

```typescript
interface IEquipmentRateTableProps {
    className?: string | ClassNames;
    referenceModel: "EquipmentCategory" | "Equipment" | "Job";
    referenceId: string;
    equipmentCategoryId: string;
    parentRates?: GqlEquipmentRateValue[];  // inherited values for read-only display
    onSave?: () => void;  // callback after save for parent to refetch
}
```

### Component Structure

```
EquipmentRateTable
├── Level 1 TabGroup: "Operator Included" | "Equipment Only"
│   └── Level 2 TabGroup: "Hourly" | "Daily" | "Weekly" | "Monthly" | "Yearly"
│       └── Rate table
│           ├── Header: Rate Type | [Amount] or [Default | Override]
│           ├── Rows: One per EquipmentRateLabel (sorted by orderNo)
│           └── Each cell: CurrencyInput (editable) or Inherited badge
├── Edit button (top-right)
└── ExitPageWarning footer (when editing)
```

### Data Loading

Query `equipmentRateLabels(equipmentCategoryId)` for the row definitions.
Query `equipmentRateValues(referenceModel, referenceId)` for the current values at this scope level.

### Key Patterns to Follow

- **TabGroup:** Use existing `TabGroup` from `@useanzen/ui` — same component used in WageRates
- **CurrencyInput:** From `@useanzen/ui` with `decimalPlaces={2}`
- **ExitPageWarning:** Same pattern as `WageRates.tsx` (lines 648-668)
- **Edit mode toggle:** Same pattern as `WageRates.tsx` (lines 385-403) — button toggles `isEdit` state
- **useForm hook:** Track `formValues` and `dirtyFormValues` for change detection
- **FC arrow function pattern**, `ClassNames`, no trailing commas per CLAUDE.md

### Save Logic

```typescript
const onSubmit = () => {
    const changes = Object.entries(dirtyFormValues).map(([key, value]) => {
        // key format: "rateLabelId~per~operatorIncluded"
        const [equipmentRateLabelId, per, opIncl] = key.split("~");
        return {
            equipmentRateLabelId,
            referenceModel,
            referenceId,
            per,
            operatorIncluded: opIncl === "true",
            amount: Number(value.replace(/[,]/g, ""))
        };
    });

    upsertManyEquipmentRateValues({
        variables: { data: changes }
    }).then(/* notify success, exit edit mode */);
};
```

### Rendering Columns

Based on `referenceModel`:
- **"EquipmentCategory"**: Single "Amount" column — this IS the base level
- **"Equipment"**: "Category Default" (read-only gray from `parentRates`) + "This Equipment" (editable or Inherited badge) + "Reset" action
- **"Job"**: "Effective Rate" (resolved, read-only with provenance badge) + "Job Override" (editable or "Using default") + "Clear" action
