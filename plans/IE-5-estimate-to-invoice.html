# IE-5: Itemized Estimate to Invoice — Implementation Plan

## Overview

Add `createInvoiceFromEstimate` (or equivalent) mutation: create `JobBill` with `Simple` template rows from `EstimateLineItem`; optional `sourceEstimateChangeOrderRecordId` on `JobBill` for traceability. Frontend: "Generate Invoice" when estimate status is Won; confirmation modal mirroring WO-7 pattern.

**Estimated effort:** 2-3 days  
**Spec:** `uis-IE-5-estimate-to-invoice.html`  
**Requires:** IE-3, existing invoice stack

---

## Step 1: Prisma (optional FK)

- Add nullable `sourceEstimateChangeOrderRecordId` on `JobBill` with FK + index.
- Migrate.

---

## Step 2: Model method

**File:** `JobBill` model or `InvoiceService`

- Load estimate record + line items; validate status Won and permissions.
- Map each line:
  - `description` from line description
  - `quantity` from line qty
  - `rate` = `price / quantity` when qty &gt; 0 else `price`
  - `value` = line `price`
- Create header + lines in transaction; return new bill id.

---

## Step 3: GraphQL

- Mutation `createInvoiceFromEstimate(estimateChangeOrderRecordId: ID!): JobBill` (shape per existing patterns).
- Resolver delegates to model; thin resolver.

---

## Step 4: Frontend

- Button on estimate detail; hidden unless Won + invoice permission.
- `ConversionConfirmationModal`-style summary: line count, total, job link.
- On success: navigate to invoice detail or show toast + link.

---

## UI / UX deliverables

Match `uis-IE-5-estimate-to-invoice.html` §3 (button + confirmation modal).

### Visibility matrix

| Condition | Generate invoice button |
|-----------|-------------------------|
| Status ≠ Won | Hidden or disabled |
| `creationType` ≠ Itemized | Hidden |
| Zero line items | Disabled |
| No invoice permission | Hidden |
| Bill already linked (if product blocks duplicate) | Disabled + tooltip |

### Modal contents

- Job name (default estimate job), line count, grand total; optional preview table (first N lines + ellipsis).
- Primary **Create invoice**, secondary **Cancel**; same flow weighting as WO-7 conversion modal.

### Post-success

- Navigate to `JobBill` detail (or open in flyout per existing billing UX).

---

## Checklist

- [ ] Idempotency strategy documented (block duplicate invoice vs allow — product call)
- [ ] Audit log / activity entry
- [ ] E2E: won estimate → invoice lines match rounded totals

---
