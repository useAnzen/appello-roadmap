# EQ-0: Equipment Time Schema — Implementation Plan

## Overview

Extract the backend/schema work from UIS-15H (Equipment Timesheet Capture) into a standalone prerequisite. This plan creates the two new Prisma models (`EquipmentTimeSheetRecordValue`, `EquipmentTimeSheetRecordCostCodeValue`), TypeScript types, model classes, GraphQL resolvers, permission seeds, and extends existing timesheet mutations to accept equipment values. **No UI work** — UIS-15H (now UI-only) and WO-2/WO-3b consume these models.

This plan was extracted from UIS-15H Steps 1–7. UIS-15H retains Steps 8–14 (all frontend/UI work: EquipmentTimeSection component, cost code allocation UI, timesheet form integration, tooltip updates, approval grid, mobile Log Time button).

**Estimated effort:** 3-4 days
**Risk:** Medium — extends existing timesheet submission + approval flow with equipment values
**Spec:** `appello-sdlc/docs/uis-15h-equipment-timesheet-capture.html` (full spec, this plan covers backend only)
**Requires:** LEM-2 (EquipmentRateLabel, EquipmentRateValue, EquipmentRateSchedule, resolveEquipmentRate)
**Enables:** UIS-15H (Equipment Timesheet UI), WO-2 (structured equipment on Work Orders)

---

## Step 1: Prisma Schema — 2 New Models

**File:** `apps/api/prisma/schema.prisma`

### 1a. EquipmentTimeSheetRecordValue

```prisma
model EquipmentTimeSheetRecordValue {
  id                         String              @id @db.VarChar(21)
  isDeleted                  Boolean             @default(false)
  isArchived                 Boolean             @default(false)
  createdAt                  DateTime            @default(now())
  updatedAt                  DateTime            @default(now()) @updatedAt

  timeSheetDetailRecordId    String              @db.VarChar(21)
  TimeSheetDetailRecord      TimeSheetDetailRecord @relation(fields: [timeSheetDetailRecordId], references: [id])

  equipmentId                String              @db.VarChar(21)
  Equipment                  Equipment           @relation(fields: [equipmentId], references: [id])

  equipmentRateLabelId       String              @db.VarChar(21)
  EquipmentRateLabel         EquipmentRateLabel  @relation(fields: [equipmentRateLabelId], references: [id])
  per                        EquipmentRatePer    @default(HOUR)
  operatorIncluded           Boolean             @default(true)
  isFullDayBilling           Boolean             @default(true)

  meterStart                 Decimal?            @db.Decimal(12, 1)
  meterEnd                   Decimal?            @db.Decimal(12, 1)

  submittedDuration          Int                 @default(0)    // seconds
  approvedDuration           Int                 @default(0)    // seconds

  equipmentRateScheduleId    String?             @db.VarChar(21)
  EquipmentRateSchedule      EquipmentRateSchedule? @relation(fields: [equipmentRateScheduleId], references: [id])

  // Attachment parent link
  parentEquipmentTimeSheetRecordValueId  String?  @db.VarChar(21)
  ParentEquipmentTimeSheetRecordValue    EquipmentTimeSheetRecordValue? @relation("AttachmentSubLines", fields: [parentEquipmentTimeSheetRecordValueId], references: [id])
  AttachmentSubLines                     EquipmentTimeSheetRecordValue[] @relation("AttachmentSubLines")

  EquipmentTimeSheetRecordCostCodeValues EquipmentTimeSheetRecordCostCodeValue[]

  @@index([timeSheetDetailRecordId, isArchived, isDeleted])
  @@index([equipmentId, isArchived, isDeleted])
  @@index([parentEquipmentTimeSheetRecordValueId, isDeleted])
  @@unique([timeSheetDetailRecordId, equipmentId, equipmentRateLabelId, per, operatorIncluded])
}
```

### 1b. EquipmentTimeSheetRecordCostCodeValue

```prisma
model EquipmentTimeSheetRecordCostCodeValue {
  id                                  String                          @id @db.VarChar(21)
  isDeleted                           Boolean                         @default(false)
  isArchived                          Boolean                         @default(false)
  createdAt                           DateTime                        @default(now())
  updatedAt                           DateTime                        @default(now()) @updatedAt

  equipmentTimeSheetRecordValueId     String                          @db.VarChar(21)
  EquipmentTimeSheetRecordValue       EquipmentTimeSheetRecordValue   @relation(fields: [equipmentTimeSheetRecordValueId], references: [id])

  costCodeId                          String                          @db.VarChar(21)
  CostCode                            CostCode                        @relation(fields: [costCodeId], references: [id])

  approvedDuration                    Int                             @default(0)    // seconds

  @@index([equipmentTimeSheetRecordValueId, costCodeId, isDeleted])
}
```

### 1c. Relations on existing models

```prisma
// On TimeSheetDetailRecord:
EquipmentTimeSheetRecordValues EquipmentTimeSheetRecordValue[]

// On Equipment:
EquipmentTimeSheetRecordValues EquipmentTimeSheetRecordValue[]

// On EquipmentRateLabel:
EquipmentTimeSheetRecordValues EquipmentTimeSheetRecordValue[]

// On EquipmentRateSchedule:
EquipmentTimeSheetRecordValues EquipmentTimeSheetRecordValue[]

// On CostCode:
EquipmentTimeSheetRecordCostCodeValues EquipmentTimeSheetRecordCostCodeValue[]
```

### 1d. Migration

Run `pnpm --filter api prisma:migrate`, name: `add_equipment_timesheet_record_value`.

## Step 4: Model Class

**Create file:** `apps/api/src/models/EquipmentTimeSheetRecordValue.ts`

Standard BaseModel with modelFields matching the type interface. Key method:

### upsertManyEquipmentTimeSheetRecordValues

Batch save from the timesheet form. Accepts an array of equipment time entries, creates new ones (no `id`) and updates existing ones (with `id`). The `equipmentRateScheduleId` is set at creation time by resolving the active schedule for the equipment's category and the work date — no separate snapshot step needed since the FK is stored directly on the record.

---

## Step 5: GraphQL Resolver

**Create file:** `apps/api/src/graphql/models/EquipmentTimeSheetRecordValue.ts`

```graphql
type EquipmentTimeSheetRecordValue {
    id: ID!
    timeSheetDetailRecordId: String!
    equipmentId: String!
    Equipment: Equipment
    equipmentRateLabelId: String!
    EquipmentRateLabel: EquipmentRateLabel
    per: EquipmentRatePer!
    operatorIncluded: Boolean!
    isFullDayBilling: Boolean!
    meterStart: Float
    meterEnd: Float
    submittedDuration: Int!
    approvedDuration: Int!
    equipmentRateScheduleId: String
    EquipmentRateSchedule: EquipmentRateSchedule
    parentEquipmentTimeSheetRecordValueId: String
    ParentEquipmentTimeSheetRecordValue: EquipmentTimeSheetRecordValue
    AttachmentSubLines: [EquipmentTimeSheetRecordValue]
    EquipmentTimeSheetRecordCostCodeValues: [EquipmentTimeSheetRecordCostCodeValue]
}

type EquipmentTimeSheetRecordCostCodeValue {
    id: ID!
    costCodeId: String!
    CostCode: CostCode
    approvedDuration: Int!
}

input UpsertEquipmentTimeSheetRecordValueInput {
    id: ID
    timeSheetDetailRecordId: String!
    equipmentId: String!
    equipmentRateLabelId: String!
    per: EquipmentRatePer
    operatorIncluded: Boolean
    isFullDayBilling: Boolean
    meterStart: Float
    meterEnd: Float
    submittedDuration: Int!
    approvedDuration: Int
    parentEquipmentTimeSheetRecordValueId: String
}

extend type Mutation {
    upsertEquipmentTimeSheetRecordValue(data: UpsertEquipmentTimeSheetRecordValueInput!): EquipmentTimeSheetRecordValue
    upsertManyEquipmentTimeSheetRecordValues(data: [UpsertEquipmentTimeSheetRecordValueInput!]!): Boolean
    deleteEquipmentTimeSheetRecordValue(id: ID!): Boolean
}
```

Register in `apps/api/src/graphql/schema.ts` (5 places: import, Resolvers, Query, Mutation, typeDefs).

## Step 6: Extend Existing Timesheet Mutations

### 6a. GraphQL type changes

**File:** `apps/api/src/graphql/models/TimeSheetRecord.ts`

Add `equipmentValues` parameter to both mutations:

```graphql
# editFullTimeRecord — ADD:
equipmentValues: [UpsertEquipmentTimeSheetRecordValueInput]

# createFullTimeRecord — ADD:
equipmentValues: [UpsertEquipmentTimeSheetRecordValueInput]
```

Add resolver for EquipmentTimeSheetRecordValues on TimeSheetDetailRecord type:

```typescript
EquipmentTimeSheetRecordValues: (parent) =>
    prisma.equipmentTimeSheetRecordValue.findMany({
        where: {
            timeSheetDetailRecordId: parent.id,
            isDeleted: false,
            isArchived: false
        }
    })
```

### 6b. Model changes

**File:** `apps/api/src/models/TimeSheetRecord.ts`

In `editFullTimeRecord`: Add `equipmentValues` parameter. After labor values are processed, call `upsertManyEquipmentTimeSheetRecordValues`.

In `createFullTimeRecord`: Same pattern — accept optional `equipmentValues` and process them.

### 6c. Resolver pass-through

Pass `args.equipmentValues` through to the model methods in the mutation resolvers.
