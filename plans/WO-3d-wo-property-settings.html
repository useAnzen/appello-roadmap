# WO-3d: Work Order Property Settings — Implementation Plan

## Overview

Add a "Work Orders" tab to Property Settings using existing DataModel settings components (`DocumentSectionLayoutBuilder`, `DataModelFormBuilderWrapper`, `PropertyValues`, `DefaultDocumentAttributesTable`). Handle dual-status PropertyValues for `jobStatusId` and scope all layout builders by `subModel`. Mostly assembly — all components exist.

**Estimated effort:** 2-3 days
**Risk:** Low — assembling existing components with subModel prop additions
**Spec:** `tm-work-orders-uis/uis-20c-4-wo-property-settings.html`
**Requires:** WO-1 (JobClassification + workOrderStatus PropertyValues), WO-3a (DAAs with WorkOrder subModel)

---

## Step 1: Extend DataModelSettingsTabs to accept subModel and propertyNameFilter

**File:** `apps/frontend/src/components/Settings/PropertySettingTabs/DataModelSettingsTabs.tsx`

The `DataModelSettingsTabs` component already renders all the sub-tabs (Detail View Layout, Settings View Layout, Manage Forms, Custom Properties, Default Properties). It just needs to accept `subModel` and `propertyNameFilter` and propagate them to its children. No new component needed.

### 1a. Add props

```typescript
interface IUserSettingsTabsProps {
    className?: string | ClassNames;
    allowEdit?: boolean;
    referenceModel: GqlTableDataName;
    supportedTypes?: GqlDataModelFormType[];
    subModel?: string;                    // <-- ADD
    propertyNameFilter?: Array<string>;   // <-- ADD
}
```

### 1b. Propagate subModel to layout builders

```typescript
// Detail View Layout (~line 47):
<DocumentSectionLayoutBuilder
    initialReferenceModel={referenceModel}
    subModel={subModel}                    // <-- ADD
    viewSectionType={"DETAILS" as GqlViewSectionType}
/>

// Settings View Layout (~line 58):
<DocumentSectionLayoutBuilder
    initialReferenceModel={referenceModel}
    subModel={subModel}                    // <-- ADD
    viewSectionType={"SETTINGS" as GqlViewSectionType}
/>

// Manage Forms (~line 69):
<DataModelFormBuilderWrapper
    modelName={referenceModel}
    subModel={subModel}                    // <-- ADD
    supportedTypes={supportedTypes}
/>
```

### 1c. Propagate propertyNameFilter to PropertyValues and subModel to DefaultDocumentAttributesTable

```typescript
// Default Properties tab (~line 87-95):
<>
    {MODELS_WITH_PROPERTY_VALUES.includes(referenceModel) && (
        <PropertyValues
            allowEdit={allowEdit}
            referencedOn={[referenceModel]}
            propertyNameFilter={propertyNameFilter}    // <-- ADD
        />
    )}
    <DefaultDocumentAttributesTable
        referenceModel={referenceModel}
        subModel={subModel}                             // <-- ADD
    />
</>
```

**Note:** When `subModel` and `propertyNameFilter` are not provided (existing usages for Company, Contact, Department, User, RFI), the component behaves identically — no regression.

```typescript

## Step 8: Classification-aware status input on Job form

**File:** Job DataModelForm page (from PR #6831)

The `job-status` DAA exists in both ProjectJob and WorkOrder sets (duplicated in WO-3a). The form needs to query the correct PropertyValue set for the status dropdown based on the job's classification.

Add to `customFormControl` (or handle in the DataModelForm's field rendering logic):

```typescript
"job-status": (formData, setFormData) => {
    const classification = getJobClassification(formData.jobTypeId);
    const statusPropertyName = classification === "WorkOrder"
        ? "workOrderStatus"
        : "jobStatus";

    return (
        <PropertyValueSelector
            propertyName={statusPropertyName}
            value={formData.jobStatusId}
            onChange={(id) => setFormData({ ...formData, jobStatusId: id })}
        />
    );
}
```

**Note:** The exact component name (`PropertyValueSelector`) depends on how the existing job form renders the status field. It may be a `CustomCombobox` with `queryResultLabel` filtering by `propertyName`. The key change is making the `propertyName` filter dynamic based on classification.
