# WO-6: Mobile WO List & Detail — Implementation Plan

## Overview

Add Work Order list and detail pages to the mobile app using existing `TableDataList` and `DetailOverview` + `TabGroup` components. Mirrors the RFI list page pattern and the Job detail tab pattern. This is the mobile entry point for viewing, creating, and editing work orders.

**Estimated effort:** 1-2 days
**Risk:** Low — wiring existing components into a new route with WO-specific configuration
**Spec:** `tm-work-orders-uis/uis-20h-0-mobile-list-detail.html`
**Requires:** WO-1 (JobClassification + sidebar), WO-3d (TableFeed configureColumns for WORK_ORDER)

---

## Step 1: WO List Page

**Create file:** `apps/mobile/src/pages/job-sites/[id]/work-orders/index.tsx`

Follows the exact pattern of `apps/mobile/src/pages/admin/rfis/index.tsx`.

```typescript
import type { NextPage } from "next";
import { WOListCard } from "~root/components/WorkOrders/WOListCard";
import type { IWOTableData } from "~root/components/WorkOrders/WOListCard";
import TableDataList from "~root/displays/TableDataList";
import { useFlyout, FlyoutVersionEnum } from "@useanzen/ui";
import { hasPermissions, PermissionItemsEnum, PermissionActionsEnum } from "@useanzen/shared-utils";
import { useAuth } from "~root/context";
import { DataModelForm } from "~root/components/Forms/DataModelForm/DataModelForm";

const WorkOrders: NextPage = () => {
    const { openFlyout, closeFlyout } = useFlyout();
    const { permissions } = useAuth();

    const canCreate = hasPermissions(
        {
            [PermissionItemsEnum.Job]: {
                [PermissionActionsEnum.Create]: true
            }
        },
        permissions
    );

    return (
        <TableDataList<IWOTableData>
            columns={[
                "id",
                "full-job-number",
                "name",
                "job-status-id",
                "date-of-work",
                "project-id"
            ]}
            orderBy={{ column: "createdAt", direction: "DESC" }}
            modelName="Job"
            defaultWhere={{ subModel: "WORK_ORDER" }}
            filterableColumns={["job-status-id", "project-id"]}
            displayCard={(record) => {
                return <WOListCard key={record.id} record={record} />;
            }}
            onCreateClick={
                canCreate
                    ? () => {
                          openFlyout(
                              <DataModelForm
                                  formType="CREATE"
                                  referenceModel="Job"
                                  subModel="WORK_ORDER"
                                  onSaved={() => closeFlyout()}
                                  steppedForm
                              />,
                              {
                                  version: FlyoutVersionEnum.VERTICAL,
                                  size: "xxl",
                                  title: <h2>New Work Order</h2>
                              }
                          );
                      }
                    : undefined
            }
            createLabel="New Work Order"
        />
    );
};

export default WorkOrders;
```

### Key decisions

- `modelName="Job"` — Work Orders are Job records, filtered by subModel
- `defaultWhere={{ subModel: "WORK_ORDER" }}` — TableFeed uses the subModel filter set up in WO-3d's configureColumns
- `columns` use slug-case keys per the TableFeed convention
- Permission check uses `Job` permissions (Work Orders are Jobs)
- Create button opens `DataModelForm` with `steppedForm` (from WO-8a) — until WO-8a is done, can omit `steppedForm` and it renders the standard form

## Step 2: WOListCard Component

**Create file:** `apps/mobile/src/components/WorkOrders/WOListCard.tsx`

```typescript
import { FC } from "react";
import { useRouter } from "next/router";
import { ClassNames } from "@useanzen/shared-utils";

export interface IWOTableData {
    id: string;
    "full-job-number": string;
    name: string;
    "job-status-id": { label: string };
    "date-of-work": string;
    "project-id": { label: string } | null;
}

interface IWOListCardProps {
    className?: string;
    record: IWOTableData;
}

const WOListCard: FC<IWOListCardProps> = ({ className = "", record }) => {
    const router = useRouter();

    return (
        <div
            className={new ClassNames("border rounded-lg p-3.5 mb-2 cursor-pointer")
                .add(className)
                .list()}
            onClick={() => router.push(`/job-sites/[id]/work-orders/${record.id}`)}
        >
            <div className="flex justify-between items-start mb-1">
                <span className="text-sm font-semibold">
                    {record["full-job-number"]}
                </span>
                <span className="text-xs font-bold px-2 py-0.5 rounded bg-info-light text-on-info-light">
                    {record["job-status-id"]?.label}
                </span>
            </div>
            <p className="text-sm text-gray-700 mb-1 line-clamp-1">
                {record.name}
            </p>
            <p className="text-xs text-gray-500">
                {record["project-id"]?.label ?? "No Project"}
                {record["date-of-work"] && ` \u2022 ${record["date-of-work"]}`}
            </p>
        </div>
    );
};

export { WOListCard };
```

The card navigates to `/job-sites/[id]/work-orders/[id]` on tap. Status badge uses semantic color classes per the CLAUDE.md guidelines.

## Step 4: WODetail Component

**Create file:** `apps/mobile/src/components/WorkOrders/WODetail.tsx`

This is the main detail component with tabs. Follows the `SimplifiedJobTasks` pattern (Job detail) for tab structure, and the `RFIDetail` pattern for header + `DetailOverview` usage.

```typescript
import { FC } from "react";
import { useRouter } from "next/router";
import { useQuery, gql } from "@apollo/client";
import {
    Breadcrumbs,
    useFlyout,
    FlyoutVersionEnum,
    TabGroup
} from "@useanzen/ui";
import { ClassNames, hasPermissions, PermissionItemsEnum, PermissionActionsEnum } from "@useanzen/shared-utils";
import { PageHeader, Loader } from "~root/components";
import { TableDataName } from "~root/graphql/generated";
import { useAuth } from "~root/context";
import { DetailOverview } from "../DetailOverview";
import { JobNotes } from "../JobViews/JobNotes";
import { JobFiles } from "../JobViews/JobFiles";
import { FilesProvider } from "~root/context";
import { DataModelForm } from "../Forms/DataModelForm/DataModelForm";
import { LaborItemsDisplay } from "./LaborItemsDisplay";
import { MaterialItemsDisplay } from "./MaterialItemsDisplay";
import { EquipmentItemsDisplay } from "./EquipmentItemsDisplay";
import { SignaturesDisplay } from "./SignaturesDisplay";

interface IWOHeaderRecord {
    fullJobNumber: string;
    name: string;
    jobStatus?: { label: string };
}

const activeTabClass = (isActive: boolean) =>
    new ClassNames("text-sm font-semibold px-4 py-2")
        .if(isActive, "bg-primary text-white rounded-lg", "text-gray-500")
        .list();

const WODetail: FC = () => {
    const router = useRouter();
    const jobId = router.query.id as string;
    const { openFlyout, closeFlyout } = useFlyout();
    const { permissions } = useAuth();

    const canEdit = hasPermissions(
        { [PermissionItemsEnum.Job]: { [PermissionActionsEnum.Edit]: true } },
        permissions
    );

    const { data, loading, error } = useQuery(GET_WO_HEADER, {
        variables: { modelName: TableDataName.Job, recordId: jobId },
        skip: !jobId,
        fetchPolicy: "no-cache"
    });

    if (loading) return <Loader />;

    if (error || !data?.dataModel?.record) {
        return (
            <div className="flex flex-col flex-grow h-full">
                <PageHeader size="xs">
                    <div className="text-sm">Work Order Not Found</div>
                </PageHeader>
                <div className="px-4 py-2">
                    <Breadcrumbs
                        backClickFunction={() => router.back()}
                        breadcrumbs={[]}
                        onlyBackButton
                    />
                </div>
            </div>
        );
    }

    const wo: IWOHeaderRecord = data.dataModel.record;

    const handleEdit = () => {
        openFlyout(
            <DataModelForm
                formType="EDIT"
                referenceModel="Job"
                subModel="WORK_ORDER"
                recordId={jobId}
                onSaved={() => closeFlyout()}
            />,
            {
                version: FlyoutVersionEnum.VERTICAL,
                size: "xxl",
                title: <h2>Edit {wo.fullJobNumber}</h2>
            }
        );
    };

    const tabs = [
        {
            id: "wo-overview",
            label: "Overview",
            headerClassName: activeTabClass,
            permission: true,
            content: (
                <DetailOverview
                    modelName={TableDataName.Job}
                    recordId={jobId}
                    viewSectionType="Details"
                    onEdit={canEdit ? handleEdit : undefined}
                    customColumnRender={{
                        "wo-labor-items": () => <LaborItemsDisplay jobId={jobId} />,
                        "wo-material-items": () => <MaterialItemsDisplay jobId={jobId} />,
                        "wo-equipment-items": () => <EquipmentItemsDisplay jobId={jobId} />,
                        "wo-signatures": () => <SignaturesDisplay jobId={jobId} />
                    }}
                />
            )
        },
        {
            id: "wo-notes",
            label: "Notes",
            headerClassName: activeTabClass,
            permission: hasPermissions(
                { [PermissionItemsEnum.Note]: { [PermissionActionsEnum.View]: true } },
                permissions
            ),
            content: <JobNotes jobId={jobId} />
        },
        {
            id: "wo-files",
            label: "Files",
            headerClassName: activeTabClass,
            permission: true,
            content: (
                <FilesProvider referenceModel="Job" referenceId={jobId}>
                    <JobFiles jobId={jobId} />
                </FilesProvider>
            )
        }
    ];

    return (
        <div className="flex flex-col flex-grow h-full">
            <PageHeader size="xs">
                <div className="flex items-center justify-between w-full">
                    <div className="text-sm">
                        <p className="font-semibold">{wo.fullJobNumber}</p>
                        <p className="line-clamp-1">{wo.name}</p>
                    </div>
                    {canEdit && (
                        <button
                            className="text-sm text-primary font-semibold"
                            onClick={handleEdit}
                        >
                            Edit
                        </button>
                    )}
                </div>
            </PageHeader>
            <div className="px-4 py-2">
                <Breadcrumbs
                    backClickFunction={() => router.back()}
                    breadcrumbs={[]}
                    onlyBackButton
                />
            </div>
            <TabGroup
                tabs={tabs.filter((t) => t.permission)}
                tabListClasses="sticky top-8 z-50"
            />
        </div>
    );
};

export { WODetail };
```

### Key decisions

- `DetailOverview` with `modelName: Job` and `viewSectionType: "Details"` renders the WO DAA fields in sectioned layout — same as the desktop WO-4 detail page
- `JobNotes` and `JobFiles` are reused directly — Notes and Files are polymorphic on Job, so they work for Work Orders without modification
- Edit opens DataModelForm in standard (non-stepped) mode — editing an existing WO doesn't need the wizard, just the normal form
- Tabs filter by permission at render time

## Step 5: Custom Display Components

The four `customColumnRender` entries handle the complex relationship fields that `DetailOverview` can't render automatically. These are the same components the desktop WO-4 detail page uses — placed in the mobile WorkOrders directory but built to be portable (no desktop/mobile-specific dependencies).

### 5a. LaborItemsDisplay

**Create file:** `apps/mobile/src/components/WorkOrders/LaborItemsDisplay.tsx`

Queries `workOrderLaborItems(jobId)` and renders a read-only list of labor line items.

```typescript
interface ILaborItemsDisplayProps {
    className?: string;
    jobId: string;
}
```

- **Structured rows** (tradeLevelRateId is set): Show trade level name, qty of workers, submitted hours
- **Blank rows** (tradeLevelRateId is null): Show description (italic), qty of workers, submitted hours
- Rate/cost columns: Only visible with `viewWageDetails` permission — check `hasPermissions({ user: { viewWageDetails: true } }, permissions)`
- Subtotal row at bottom: total hours across all items

```graphql
query GetWOLaborItems($jobId: ID!) {
    workOrderLaborItems(where: { jobId: $jobId, isDeleted: false }, orderBy: { orderNo: "asc" }) {
        id
        tradeLevelRateId
        TradeLevelRate { id name billableValue }
        description
        qtyOfWorkers
        submittedDuration
        rate
        orderNo
    }
}
```

### 5b. MaterialItemsDisplay

**Create file:** `apps/mobile/src/components/WorkOrders/MaterialItemsDisplay.tsx`

Queries `workOrderMaterialItems(jobId)` and renders a read-only list.

```typescript
interface IMaterialItemsDisplayProps {
    className?: string;
    jobId: string;
}
```

      - **Structured rows** (materialId is set): Show material name from relation, qty, sell price (unitPrice)
      - **Blank rows** (materialId is null): Show description (italic), qty, sell price (unitPrice)
- Subtotal row: total dollar amount

```graphql
query GetWOMaterialItems($jobId: ID!) {
    workOrderMaterialItems(where: { jobId: $jobId, isDeleted: false }, orderBy: { orderNo: "asc" }) {
        id
        materialId
              Material { id name }
              description
              quantity
              unitPrice
        orderNo
    }
}
```

### 5c. EquipmentItemsDisplay

**Create file:** `apps/mobile/src/components/WorkOrders/EquipmentItemsDisplay.tsx`

Queries `workOrderEquipmentItems(jobId)` and renders a read-only list.

```typescript
interface IEquipmentItemsDisplayProps {
    className?: string;
    jobId: string;
}
```

- **Structured rows** (equipmentId is set): Show equipment name, rate type, duration/qty
- **Blank rows** (equipmentId is null): Show description (italic), qty, per, unit rate
- Rate/cost info gated by `viewWageDetails` permission
- Subtotal grouped by unit type (e.g., "8.0 hrs + 2 days")

```graphql
query GetWOEquipmentItems($jobId: ID!) {
    workOrderEquipmentItems(where: { jobId: $jobId, isDeleted: false }, orderBy: { orderNo: "asc" }) {
        id
        equipmentId
        Equipment { id name }
        description
        quantity
        per
        unitRate
        orderNo
    }
}
```

### 5d. SignaturesDisplay

**Create file:** `apps/mobile/src/components/WorkOrders/SignaturesDisplay.tsx`

Queries the Job's polymorphic Signatures and renders a grid of signature images.

```typescript
interface ISignaturesDisplayProps {
    className?: string;
    jobId: string;
}
```

- Each signature: Image thumbnail (from Asset URL), signer name (from `User` relation or `signerName` for external), `signerCompany` if present, signed timestamp, GPS coordinates
- Empty state: "No signatures" message

Uses the `Signatures` field-level resolver on Job (set up in WO-3a):

```graphql
query GetWOSignatures($jobId: ID!) {
    job(id: $jobId) {
        Signatures {
            id
            Asset { url }
            userId
            User { firstName lastName }
            signerName
            signerCompany
            signedAt
            latitude
            longitude
        }
    }
}
```

## Step 6: GraphQL Query for WO Header

**Add to:** `apps/mobile/src/components/WorkOrders/WODetail.tsx` (bottom of file per code style)

```graphql
const GET_WO_HEADER = gql`
    query GetWOHeader($modelName: TableDataName!, $recordId: ID!) {
        dataModel(modelName: $modelName, options: { recordId: $recordId }) {
            record
        }
    }
`;
```

This uses the same generic `dataModel` query pattern as the RFI detail. The `record` field returns the full Job record, and we extract `fullJobNumber`, `name`, and `jobStatus` for the header.
