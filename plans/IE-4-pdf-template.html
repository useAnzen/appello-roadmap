# IE-4: Itemized Estimate PDF — Implementation Plan

## Overview

Branch `EstimateChangeOrderPDF.tsx` (or shared PDF module) for `creationType === Itemized`: render customer-facing line table with optional columns (qty, unit price, internal cost hidden by default). Persist column visibility in estimate PDF settings JSON if product requires.

**Estimated effort:** 2-3 days  
**Spec:** `uis-IE-4-pdf-template.html`  
**Requires:** IE-3

---

## Step 1: Data load for PDF route

- Ensure PDF data loader includes `EstimateLineItem[]` ordered by `orderNo`.
- Strip server-only fields from client bundle if PDF is generated server-side only.

---

## Step 2: PDF table layout

- Columns: Description, Qty, Unit, Unit Price (customer), Line Total.
- Optional internal columns behind instance flag (never default on client PDF).

---

## Step 3: `pdf-export.ts`

- Register route or template key for itemized estimate PDF.
- Reuse `InvoicePDFHeader` / letterhead components per existing estimate PDF.

---

## Step 4: Settings UI (if in scope)

- Checkbox group on estimate detail or template admin: show qty, show unit, show markup (internal PDF only).

---

## UI / UX deliverables

Match `uis-IE-4-pdf-template.html` §3–4 (client vs internal tables + toggle mockup).

### PDF column matrix

| Mode | Typical columns |
|------|------------------|
| Client | Description, Qty, Unit, **Unit price**, **Line total** |
| Internal | + Unit cost, Total cost, Markup %, Markup $, Line price |

### Toggle matrix

| Toggle | Affects client PDF | Default |
|--------|-------------------|---------|
| Show quantity | Yes | On |
| Show unit | Yes | On |
| Show unit cost | Yes (if ever allowed) | **Off** |
| Show markup | Yes | **Off** |

### Regression

- `BidFirst` / `Full` worksheet estimates: existing PDF path unchanged.

---

## Checklist

- [ ] Multi-page table breaks cleanly
- [ ] Totals match IE-3 calculation to the cent
- [ ] Regression: non-itemized estimate PDF unchanged

---

## Integration / E2E test scenarios

1. Itemized estimate with known lines → **Client PDF** → assert columns (no unit cost / markup when toggles off) and row count.
2. Same record → **Internal PDF** → assert extended columns present.
3. Toggle **show unit** off on client → regenerate PDF → Unit column absent.
4. **Multi-page:** Seed 40+ short lines → PDF renders &gt;1 page → table header repeats; grand total on last page only.
5. **Regression:** `Full` worksheet estimate PDF unchanged (pixel or snapshot diff optional).
6. **Totals parity:** PDF grand total matches IE-3 panel value for same record.

---
