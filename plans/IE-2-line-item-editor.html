# IE-2: Itemized Estimate Line Item Editor — Implementation Plan

## Overview

Build `EstimateLineItemEditor.tsx` (repeating rows, combobox search, per-line markup) and integrate into `EstimateChangeOrderDetails.tsx` when `creationType === Itemized`. Depends on IE-1 GraphQL.

**Estimated effort:** 4-6 days  
**Spec:** `uis-IE-2-line-item-editor.html`  
**Requires:** IE-1

---

## Step 1: GraphQL queries (frontend)

- Add or extend `.graphql` for `estimateLineItems` list by `estimateChangeOrderRecordId`.
- Add mutation for `resolveEstimateLineItemUnitCost` (lazy on combobox select) or embed resolved values in create flow.

Use generated hooks per repo convention after schema/codegen.

---

## Step 2: `EstimateLineItemEditor.tsx`

**Location:** `apps/frontend/src/components/.../EstimateLineItemEditor.tsx`

- Mirror `SimpleInvoice.tsx` row pattern: local state array, add row, delete row, reorder (`orderNo`).
- Columns: type badge, description (combobox), qty, unit, unit cost, total cost, markup %, markup $, price, delete.
- On type + entity selection: call pricing resolver; set `unit`, `unitCost`, recompute `totalCost` and `price`.
- Default markup from job/instance settings (read from existing estimate context props).

---

## Step 3: Combobox data sources

- Labor: TableFeed or existing trade-level picker filtered by job permissions.
- Material / Equipment: same patterns as WO line item pickers; respect scoped TableFeed where required.

---

## Step 4: Integration

**File:** `EstimateChangeOrderDetails.tsx`

- When `creationType` is `Itemized`, render `EstimateLineItemEditor` above or beside existing lump-sum UI (hide lump path for itemized).
- Wire save to parent form state; actual persist batching belongs in IE-3 `upsert` extension.

---

## Step 5: QA

- Empty state, single row, many rows, permission-denied pickers, loading on resolve.

---

## UI / UX deliverables

Implement to match `uis-IE-2-line-item-editor.html` §3–4 and parent glossary (`uis-IE-itemized-estimates.html#s-ui`).

### UI build checklist (column contract)

| Column | Component | Data / state | Validation |
|--------|-----------|--------------|------------|
| Type | Badge | `lineItemType` | Set from picker path |
| Selected item / description | `FormControl` combobox + free text | `userId`, FKs, `description` | Labor requires user when product requires it |
| Qty | Numeric | `quantity` | &gt; 0 |
| Unit | Text/select | `unit` | Non-empty preferred |
| Unit cost | Currency | `unitCost` | &gt;= 0 |
| Total cost | Read-only (typ.) | `totalCost` | qty × unitCost |
| Markup % | Percent | `markupPercent` | 0–100+ per product |
| Markup $ | Currency | `markupDollarValue` | Precedence vs % (product) |
| Line price | Read-only | `price` | Consistent with markup rules |
| Delete | Icon | remove / soft-delete | Confirm optional |

### Add-line flow

- Grouped list: Labor → Material → Equipment → Custom; search filters within groups.
- After pick: fire `resolveEstimateLineItemUnitCost`; show loading on row; on failure allow manual unit cost.

### Handoff to IE-3

- Emit line-derived subtotals (cost, markup dollars, sell) to `EstimateChangeOrderTotals` props or shared context for Itemized branch.

---

## Checklist

- [ ] Rows validate qty &gt; 0 and numeric fields
- [ ] Labor lines always tie to a **user** where the product rule requires worker-linked time (follow `.cursorrules` labor constraint)
- [ ] No `console.log`
- [ ] Loading / error on query and resolve mutation

---
