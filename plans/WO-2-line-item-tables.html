# WO-2: Line Item Tables — Implementation Plan

## Overview

Create three simplified Prisma models for Work Order **unstructured/blank line items only** (Labor, Material, Equipment). Structured labour uses the existing **TimeSheetRecord / TimeSheetDetailRecord** infrastructure. Structured equipment uses the new **EquipmentTimeSheetRecordValue** model from EQ-0. The WO UI (WO-3b) provides in-place interfaces to log structured time, but the data lives in the existing timesheet tables and rolls up automatically.

No UI in this plan — WO-3 owns the form interface.

**Estimated effort:** 3-5 days
**Risk:** Low — 3 simplified blank-line-only models, no new structured models (those come from existing infrastructure + EQ-0)
**Spec:** `tm-work-orders-uis/uis-20b-line-item-tables.html`
**Requires:** WO-1 (JobClassification), LEM-1 (TradeLevelRate.billableValue), LEM-2 (EquipmentRateValue), EQ-0 (EquipmentTimeSheetRecordValue)

### Labour Architecture Decision

Work Order labour is split across two sources:

- **Structured labour** — Uses the existing scheduling and timesheet infrastructure. Workers are assigned to the WO job via JobSchedule (or use the unscheduled-job workflow if permissions allow). Hours are captured as TimeSheetRecord / TimeSheetDetailRecord entries with rate labels and trade levels. All existing permissions, approval workflows, and payroll rollup apply unchanged.
- **Unstructured labour (blank lines)** — WorkOrderLaborItem stores free-form entries (description, rate, hours, qty) for ClearStory-style flexible entry where the user doesn't go through the timesheet workflow.

The `recalculateWorkOrderTotals` mutation queries both sources to compute the combined labour subtotal.

### Equipment Architecture Decision

Work Order equipment follows the same dual-source pattern as labour:

- **Structured equipment** — Uses `EquipmentTimeSheetRecordValue` (from EQ-0) linked to the WO job's TimeSheetDetailRecords. Equipment entries include equipment selection, rate type, per-unit, meter readings, and duration. Rates resolved from LEM-2 at invoice time. Entries share the timesheet approval workflow.
- **Unstructured equipment (blank lines)** — WorkOrderEquipmentItem stores free-form entries (description, quantity, unit rate) for ad-hoc rentals or equipment not in the catalog.

The `recalculateWorkOrderTotals` mutation queries both sources to compute the combined equipment subtotal.

## Step 0: TimeSheetDetailRecord — Optional Trade Level Override

> **⚠️ CALLOUT FOR CHRIS — PLEASE REVIEW ⚠️**
>
> Chris has been doing work around different wage rates per job/user. This change adds an **optional** `tradeLevelId` to `TimeSheetDetailRecord` to allow per-detail-record trade level selection when logging time from a Work Order. **The existing derivation flow (UserTradeLevel → TimeSheetRecord.tradeLevelId) is NOT changed — this is additive only.** Chris should review this change to ensure it aligns with his recent work on per-job/user wage rates and doesn't conflict. See **WO-3b LaborItemEditor mockup** (Section 3) for how this is used in the UI — users select a trade level per row in the time entry table.

### Problem

Currently, trade level is derived from `UserTradeLevel` for the submission date and stored on `TimeSheetRecord.tradeLevelId`. This works well for the standard timesheet flow where one user logs their own time. However, in the Work Order context:

1. A foreman may log time for **multiple crew members** from the WO form
2. Some users work at **different trade levels depending on the work** — e.g., a user might work as Journeyman on one task and Foreman on another within the same WO

The existing derivation only supports one trade level per TimeSheetRecord (per user per date per job). To support per-entry trade level selection without breaking existing functionality, we add an optional `tradeLevelId` on `TimeSheetDetailRecord`.

### Schema Change

**File:** `apps/api/prisma/schema.prisma`

```prisma
// On existing TimeSheetDetailRecord model, ADD:
tradeLevelId      String?         @db.VarChar(21)
TradeLevel        TradeLevel?     @relation(fields: [tradeLevelId], references: [id])
```

**Migration:**

```sql
ALTER TABLE `TimeSheetDetailRecord`
  ADD COLUMN `tradeLevelId` VARCHAR(21) NULL,
  ADD CONSTRAINT `TimeSheetDetailRecord_tradeLevelId_fkey`
    FOREIGN KEY (`tradeLevelId`) REFERENCES `TradeLevel`(`id`);
```

### Behaviour

- **When `tradeLevelId` IS NULL** (default, all existing records): Trade level is derived from the parent `TimeSheetRecord.tradeLevelId` as today. **No change to existing functionality.**
- **When `tradeLevelId` IS SET** (WO context): This detail record uses the specified trade level, which determines which `TradeLevelRate` options are available for the `TimeSheetDetailRecordValue` relationship. The parent `TimeSheetRecord.tradeLevelId` still exists and is still set via the existing UserTradeLevel derivation.

### Rate Resolution Impact

When `recalculateWorkOrderTotals` queries TimeSheetDetailRecords for labour subtotals, it should resolve the trade level (and therefore billable rate) as:

```
effectiveTradeLevelId = detail.tradeLevelId ?? detail.TimeSheetRecord.tradeLevelId
```

### Inverse relation on TradeLevel

```prisma
// On TradeLevel model, ADD:
TimeSheetDetailRecords  TimeSheetDetailRecord[]
```

## Step 1: Prisma Schema — 3 New Models

**File:** `apps/api/prisma/schema.prisma`

### 1a. WorkOrderLaborItem (Unstructured / Blank Lines Only)

```prisma
model WorkOrderLaborItem {
  id                    String          @id @db.VarChar(21)
  isDeleted             Boolean         @default(false)
  isArchived            Boolean         @default(false)
  createdAt             DateTime        @default(now())
  updatedAt             DateTime        @default(now()) @updatedAt

  jobId                 String          @db.VarChar(21)
  Job                   Job             @relation(fields: [jobId], references: [id])

  jobScheduleId         String?         @db.VarChar(21)
  JobSchedule           JobSchedule?    @relation(fields: [jobScheduleId], references: [id])

  rate                  Decimal?        @db.Decimal(10, 2)
  qtyOfWorkers          Int             @default(1)
  submittedDuration     Int             @default(0)    // seconds
  description           String?         @db.VarChar(500)
  orderNo               Int             @default(0)

  @@index([jobId, isDeleted])
}
```

**Key design:** This model is exclusively for **unstructured (blank) labour lines** — free-form entries where the user provides a description, rate, hours, and qty manually. This mirrors ClearStory's flexible labour entry. Structured labour (trade-level, rate-label time entries) lives in **TimeSheetRecord / TimeSheetDetailRecord** linked to the same Job — no FK to TradeLevelRate is needed on this model.

### 1b. WorkOrderMaterialItem

```prisma
model WorkOrderMaterialItem {
  id            String    @id @db.VarChar(21)
  isDeleted     Boolean   @default(false)
  isArchived    Boolean   @default(false)
  createdAt     DateTime  @default(now())
  updatedAt     DateTime  @default(now()) @updatedAt

  jobId         String    @db.VarChar(21)
  Job           Job       @relation(fields: [jobId], references: [id])

  jobScheduleId String?   @db.VarChar(21)
  JobSchedule   JobSchedule? @relation(fields: [jobScheduleId], references: [id])

  materialId    String?   @db.VarChar(21)
  Material      Material? @relation(fields: [materialId], references: [id])

  description   String?   @db.VarChar(500)
  quantity      Decimal?  @db.Decimal(10, 2)
  unitPrice     Decimal?  @db.Decimal(10, 2)   // sell price (auto from LEM-3 cascade, editable)
  costPrice     Decimal?  @db.Decimal(10, 2)   // cost basis (from DistributorPrice or MaterialAttributePrice)
  total         Decimal?  @db.Decimal(10, 2)   // quantity * unitPrice
  orderNo       Int       @default(0)

  @@index([jobId, isDeleted])
}
```

**Note:** Structured material lines auto-populate `unitPrice` (sell) and `costPrice` (cost) from `resolveMaterialSellPrice()` (LEM-3 cascade). Both are editable — the user can override. Blank lines (`materialId` null) require manual entry. `total = quantity * unitPrice`.

### 1c. WorkOrderEquipmentItem (Unstructured / Blank Lines Only)

```prisma
model WorkOrderEquipmentItem {
  id                      String              @id @db.VarChar(21)
  isDeleted               Boolean             @default(false)
  isArchived              Boolean             @default(false)
  createdAt               DateTime            @default(now())
  updatedAt               DateTime            @default(now()) @updatedAt

  jobId                   String              @db.VarChar(21)
  Job                     Job                 @relation(fields: [jobId], references: [id])

  jobScheduleId           String?             @db.VarChar(21)
  JobSchedule             JobSchedule?        @relation(fields: [jobScheduleId], references: [id])

  unitRate                Decimal?            @db.Decimal(10, 2)
  quantity                Decimal?            @db.Decimal(10, 2)
  description             String?             @db.VarChar(500)
  orderNo                 Int                 @default(0)

  @@index([jobId, isDeleted])
}
```

**Same pattern as labor:** This model is exclusively for **unstructured (blank) equipment lines** — free-form entries where the user provides a description, quantity, and unit rate manually. Structured equipment entries (equipment from catalog, rate types, meter readings, durations) live in **EquipmentTimeSheetRecordValue** (from EQ-0) linked to TimeSheetDetailRecords for the WO job. No FK to Equipment, EquipmentRateLabel, or EquipmentRateSchedule needed on this model.

### 1d. Relations on existing models

```prisma

WorkOrderLaborItems      WorkOrderLaborItem[]
WorkOrderMaterialItems   WorkOrderMaterialItem[]

// On Material:

## Step 5: Batch Upsert Mutation

The core mutation for saving all line items from the WO form in a single transaction.

### GraphQL definition

```graphql
input UpsertWorkOrderLineItemsInput {
    jobId: String!
    laborItems: [UpsertWorkOrderLaborItemInput!]
    materialItems: [UpsertWorkOrderMaterialItemInput!]
    equipmentItems: [UpsertWorkOrderEquipmentItemInput!]
}

extend type Mutation {
    upsertWorkOrderLineItems(input: UpsertWorkOrderLineItemsInput!): Boolean!
}
```

### Model implementation

This can live on a new `WorkOrderLineItems` model or as a static method. The logic:

```typescript
async upsertWorkOrderLineItems(
    input: {
        jobId: string;
        laborItems?: UpsertWorkOrderLaborItemInput[];
        materialItems?: UpsertWorkOrderMaterialItemInput[];
        equipmentItems?: UpsertWorkOrderEquipmentItemInput[];
    },
    currentUserId: string
): Promise<boolean> {
    // Transaction: process all three item types

    // Labor items
    if (input.laborItems) {
        for (const item of input.laborItems) {
            if (item.id) {
                await new WorkOrderLaborItemModel().editItem(item.id, item, currentUserId);
            } else {
                await new WorkOrderLaborItemModel().createItem(
                    { ...item, jobId: input.jobId },
                    currentUserId
                );
            }
        }
    }

    // Material items (same pattern)
    if (input.materialItems) {
        for (const item of input.materialItems) {
            // Auto-calculate total
            const total = item.quantity && item.unitPrice
                ? Number((item.quantity * item.unitPrice).toFixed(2))
                : undefined;
            const data = { ...item, total };

            if (item.id) {
                await new WorkOrderMaterialItemModel().editItem(item.id, data, currentUserId);
            } else {
                await new WorkOrderMaterialItemModel().createItem(
                    { ...data, jobId: input.jobId },
                    currentUserId
                );
            }
        }
    }

    // Equipment items (same pattern)
    if (input.equipmentItems) {
        for (const item of input.equipmentItems) {
            if (item.id) {
                await new WorkOrderEquipmentItemModel().editItem(item.id, item, currentUserId);
            } else {
                await new WorkOrderEquipmentItemModel().createItem(
                    { ...item, jobId: input.jobId },
                    currentUserId
                );
            }
        }
    }

    return true;
}
```

**Note:** Deleted items are handled by sending a separate `deleteWorkOrderLineItem(id: ID!)` mutation per item removed from the form. The batch upsert only handles creates and updates.

## Step 7: Recalculate Work Order Totals

**Mutation:** `recalculateWorkOrderTotals(jobId: String!): Job`

Recomputes the Job-level WO summary fields (from the WO-3 Job model extensions). Labour totals are computed from **two sources**: TimeSheetDetailRecords (structured) and WorkOrderLaborItems (unstructured blank lines).

```typescript
async recalculateWorkOrderTotals(jobId: string, currentUserId: string): Promise<Job> {
    // --- LABOUR (two sources) ---

    // 1. Structured labour: TimeSheetDetailRecords for this job
    //    Hours come from secondsAtService; billable rate from TradeLevelRate.billableValue (LEM-1)
    //    Query TimeSheetDetailRecord where TimeSheetRecord.jobId = jobId
    const timesheetDetails = await prisma.timeSheetDetailRecord.findMany({
        where: {
            TimeSheetRecord: { jobId, isDeleted: false },
            isDeleted: false
        },
        include: {
            TimeSheetRecord: true,
            TradeLevelRate: true
        }
    });

    let structuredLaborSubtotal = 0;
    for (const detail of timesheetDetails) {
        const hours = (detail.secondsAtService ?? 0) / 3600;
        const billableRate = detail.TradeLevelRate?.billableValue?.toNumber() ?? 0;
        structuredLaborSubtotal += hours * billableRate;
    }

    // 2. Unstructured labour: WorkOrderLaborItems (blank lines)
    const blankLaborItems = await prisma.workOrderLaborItem.findMany({
        where: { jobId, isDeleted: false }
    });

    let blankLaborSubtotal = 0;
    for (const item of blankLaborItems) {
        const hours = item.submittedDuration / 3600;
        const rate = item.rate?.toNumber() ?? 0;
        blankLaborSubtotal += hours * rate * item.qtyOfWorkers;
    }

    const laborSubtotal = structuredLaborSubtotal + blankLaborSubtotal;

    // --- MATERIALS ---
    const materialItems = await prisma.workOrderMaterialItem.findMany({
        where: { jobId, isDeleted: false }
    });
    const materialSubtotal = materialItems.reduce(
        (sum, item) => sum + (item.total?.toNumber() ?? 0), 0
    );

    // --- EQUIPMENT (two sources) ---

    // 1. Structured: EquipmentTimeSheetRecordValues for this job (from EQ-0)
    const equipTimeEntries = await prisma.equipmentTimeSheetRecordValue.findMany({
        where: {
            TimeSheetDetailRecord: {
                TimeSheetRecord: { jobId, isDeleted: false }
            },
            isDeleted: false
        },
        include: {
            Equipment: true,
            EquipmentRateLabel: true
        }
    });

    let structuredEquipSubtotal = 0;
    const rateValueModel = new EquipmentRateValueModel();
    for (const entry of equipTimeEntries) {
        const resolved = await rateValueModel.resolveEquipmentRate(
            entry.equipmentId,
            entry.equipmentRateLabelId,
            entry.per ?? "HOUR",
            jobId,
            entry.operatorIncluded,
            job?.dateOfWork
        );
        const rate = resolved?.amount ?? 0;
        const quantity = calculateQuantity(entry, job?.dailyHours ?? 8);
        structuredEquipSubtotal += rate * quantity;
    }

    // 2. Unstructured: WorkOrderEquipmentItems (blank lines)
    const blankEquipItems = await prisma.workOrderEquipmentItem.findMany({
        where: { jobId, isDeleted: false }
    });

    let blankEquipSubtotal = 0;
    for (const item of blankEquipItems) {
        const rate = item.unitRate?.toNumber() ?? 0;
        const qty = item.quantity?.toNumber() ?? 0;
        blankEquipSubtotal += rate * qty;
    }

    const equipmentSubtotal = structuredEquipSubtotal + blankEquipSubtotal;

    const markupPercent = job.markupPercent?.toNumber() ?? 0;
    const overheadPercent = job.overheadPercent?.toNumber() ?? 0;
    const taxPercent = job.taxPercent?.toNumber() ?? 0;

    const subtotal = laborSubtotal + materialSubtotal + equipmentSubtotal;
    const afterMarkup = subtotal * (1 + markupPercent / 100);
    const afterOverhead = afterMarkup * (1 + overheadPercent / 100);
    const grandTotal = afterOverhead * (1 + taxPercent / 100);

    return prisma.job.update({
        where: { id: jobId },
        data: {
            laborSubtotal: Number(laborSubtotal.toFixed(2)),
            materialSubtotal: Number(materialSubtotal.toFixed(2)),
            equipmentSubtotal: Number(equipmentSubtotal.toFixed(2)),
            grandTotal: Number(grandTotal.toFixed(2))
        }
    });
}
```

**Note:** Structured labour uses `billableValue` from TradeLevelRate (LEM-1) via the existing TimeSheetDetailRecord → TradeLevelRate relation. Structured equipment uses `resolveEquipmentRate` from LEM-2 via EquipmentTimeSheetRecordValue (EQ-0). These totals are only visible to users with `viewWageDetails` permission (gated in WO-4 detail page, not here).
