# WO-3b: Line Item Editors — Implementation Plan

## Overview

Three custom input components (**LaborItemEditor**, **MaterialItemEditor**, **EquipmentItemEditor**) plus shared building blocks (**DateGroupSection**, **AddLineDropdown**, **CostCodeSubRows**) that replace the `<p>` tag placeholders in the DataModelForm's `customFormControl` from WO-3a. Labour and Equipment follow the same dual-source pattern: **structured entries** via date-grouped tabular layouts (TimeSheetRecord for labour, EquipmentTimeEntry for equipment) plus **blank lines** for ClearStory-style flexible entry. Material supports structured (catalog lookup with LEM-3 sell price cascade) and blank lines.

> **Architecture decision — shared UI package:** The editor components are built in `@useanzen/ui` (`packages/ui/src/components/WorkOrder/`) as **presentational, data-agnostic components**. They take all data as props and emit callbacks — no GraphQL, no data fetching. Each app (`apps/frontend` for desktop, `apps/mobile` for mobile — see WO-8a) creates thin wrapper components that handle GraphQL queries and pass data down. This avoids duplicating all the rendering logic (date grouping, cost code sub-rows, rate label inputs, subtotals, add/remove) across two apps. The shared editors accept a `layout` prop (`"table" | "card"`) to switch between desktop table layout and mobile stacked card layout.

> **Design decision:** Rather than extracting from `TimesheetModification` (high regression risk), we build the WO-specific date-grouped layouts fresh. They share the same visual pattern (date group header → content → footer) via a shared `DateGroupSection` wrapper, but the column definitions and data models are distinct.

**Estimated effort:** 8-10 days (includes shared package + desktop wrappers; mobile wrappers covered in WO-8a)
**Risk:** Medium — structured labour integrates with scheduling permissions and timesheet infrastructure; structured equipment integrates with EquipmentTimeEntry model (EQ-0); shared package components must be layout-flexible
**Spec:** `tm-work-orders-uis/uis-20c-2-line-item-editors.html`
**Requires:** WO-3a (DAA positions + customFormControl), WO-2 (blank-line models + upsertWorkOrderLineItems mutation), EQ-0 (EquipmentTimeEntry model + mutations), PR #6831 (DataModelForm)

---

## Step 1: Shared UI Package — Building Blocks

All presentational components live in `packages/ui/src/components/WorkOrder/`. They have **no GraphQL dependencies** — all data is passed as props. Both `apps/frontend` and `apps/mobile` consume these.

### 1a. AddLineDropdown

**Create file:** `packages/ui/src/components/WorkOrder/AddLineDropdown.tsx`

Uses the existing `Dropdown` component from `@useanzen/ui` (Headless UI `Menu`). Each consumer passes its own labels:
- Labor: "Log Time" / "Blank Line"
- Equipment: "Log Equipment" / "Blank Line"
- Material: "Structured Line" / "Blank Line"

```typescript
interface IAddLineDropdownProps {
    label: string;                  // "Labor", "Material", "Equipment"
    onAddStructured: () => void;
    onAddBlank: () => void;
    structuredLabel?: string;       // default "Structured Line"
    blankLabel?: string;            // default "Blank Line"
    structuredHelper?: string;
    blankHelper?: string;
}
```

### 1b. DateGroupSection

**Create file:** `packages/ui/src/components/WorkOrder/DateGroupSection.tsx`

Shared wrapper for the date-grouped layout used by both LaborItemEditor and EquipmentItemEditor. Renders the date group chrome (header, footer) and takes content as children.

```typescript
interface IDateGroupSectionProps {
    className?: string | ClassNames;
    workDate: string;                    // YYYY-MM-DD
    onDateChange: (date: string) => void;
    summaryText: string;                 // e.g., "3 rows · 20.0 hrs"
    isApproved?: boolean;                // if true, show Approved badge, no delete
    onDelete?: () => void;
    children: ReactNode;                 // table content (desktop) or card stack (mobile)
    footerLeft?: ReactNode;              // "+ Add Row" / "Split by Cost Code" links
    footerRight?: ReactNode;             // column totals (desktop only)
}
```

**Renders:**
- **Header bar:** `bg-gray-50` with date input, summary text (row count + total), `IconTrash` delete (hidden if Approved)
- **Children slot:** The content (table on desktop, card stack on mobile — passed in by each editor)
- **Footer row:** `footerLeft` ("+ Add Row", "Split by Cost Code" links) + `footerRight` (column totals)

### 1c. CostCodeSubRows

**Create file:** `packages/ui/src/components/WorkOrder/CostCodeSubRows.tsx`

Reusable cost code breakdown rows used by both Labor and Equipment editors. Renders beneath a parent entry.

```typescript
interface ICostCodeSubRowsProps {
    className?: string | ClassNames;
    rows: ICostCodeRowData[];
    availableCostCodes: { id: string; code: string; name: string }[];
    onRowChange: (index: number, row: ICostCodeRowData) => void;
    onRowDelete: (index: number) => void;
    onAddRow: () => void;
    layout: "table" | "card";           // desktop vs mobile rendering
    // For table layout: how many value columns to render
    valueColumns?: { id: string; label: string }[];
    disabled?: boolean;
}

interface ICostCodeRowData {
    costCodeId: string;
    values: Record<string, number>;     // columnId → seconds (labor) or single duration (equipment)
}
```

- **Table layout (desktop):** Indented `<tr>` rows within the parent table. `↳` prefix + cost code combobox spanning label columns + value inputs matching parent columns + delete icon.
- **Card layout (mobile):** `border-left: 2px solid #e2e8f0; padding-left: 8px` — flex row with `↳` prefix + cost code combobox (flex:1) + total/duration display + delete icon.

### 1d. Shared types

**Create file:** `packages/ui/src/components/WorkOrder/types.ts`

Shared TypeScript interfaces used across all editors. These define the data shape that wrappers in each app must provide:

```typescript

### 1e. Visual conventions

- **Date group:** `border border-gray-200 rounded-lg overflow-hidden` with `bg-gray-50` header bar
- **Structured rows (desktop):** Normal table row styling within the date group
- **Structured rows (mobile):** Stacked card with CSS grid, separated by `border-bottom` within the date group
- **Cost code sub-rows (desktop):** Indented `<tr>` with `bg-gray-50`, `↳` prefix, smaller font
- **Cost code sub-rows (mobile):** `border-left: 2px` accent, `↳` prefix, flex row
- **Blank lines section:** Separated by uppercase `BLANK LINES` divider with `border-top`
- **Blank row cards:** `border-dashed border-gray-300 bg-white` rounded cards
- **Delete buttons:** `IconTrash` in danger color on every row and date group header
- **"+ Add Date"** link below all date groups (blue, `text-info`)

### 1f. Duration/hours utility

Use existing `convertHoursToSeconds` / `convertSecondsToHours` helpers if available. Hours stored as seconds internally, displayed as decimal hours (e.g., `8.0`). Rate label inputs use `step={0.25}` for quarter-hour increments.

## Step 2: LaborItemEditor (Shared UI)

**Create file:** `packages/ui/src/components/WorkOrder/LaborItemEditor.tsx`

Presentational component — **no GraphQL**. All data passed as props by the app-specific wrapper.

### Architecture

The LaborItemEditor renders two distinct types of labour entries:

1. **Structured (Log Time)** — Date-grouped layout for creating **TimeSheetRecord / TimeSheetDetailRecord** entries. On desktop: `<table>` with columns **User** | **Trade Level** | **Rate Label hour columns** | **Total** | Delete. On mobile: stacked card with CSS grid. Optional cost code sub-rows beneath each row.
2. **Blank lines** — Dashed-border cards below a "BLANK LINES" divider. Fields: Description, Workers, Hours, Rate ($/hr).

### Props

```typescript
interface ILaborItemEditorProps {
    className?: string | ClassNames;
    layout: "table" | "card";           // desktop vs mobile
    // Structured labour — date-grouped
    dateGroups: IDateGroup<ILaborTimeRowData>[];
    onDateGroupsChange: (groups: IDateGroup<ILaborTimeRowData>[]) => void;
    // Blank labour
    blankItems: IBlankLaborRowData[];
    onBlankItemsChange: (items: IBlankLaborRowData[]) => void;
    // Available data (provided by wrapper)
    availableUsers: { id: string; name: string }[];
    availableCostCodes: { id: string; code: string; name: string }[];
    // Callbacks for dynamic data loading
    onUserSelect: (userId: string, workDate: string) => Promise<{
        tradeLevels: { id: string; name: string }[];
        rateLabels: { id: string; name: string }[];
    }>;
    // Display
    disabled?: boolean;                 // read-only mode (Summary step)
}
```

The `onUserSelect` callback is key: when the user selects an employee in a row, the wrapper fetches `EmployeeAgreement` → active `EmployeeAgreementContract` for the date → returns available trade levels and rate labels. The shared component calls this and updates the row's `availableTradeLevels` / `availableRateLabels`.

### Structured section — date-grouped layout

Uses `DateGroupSection` (Step 1b) for each date group. Content rendering switches on `layout` prop:

**Desktop (`layout="table"`):** `<table>` within each `DateGroupSection`:

| Column | Width | Description |
|--------|-------|------------|
| User | 150px | Dropdown. On select, calls `onUserSelect(userId, workDate)` → wrapper fetches contract data → returns trade levels + rate labels for the row. |
| Trade Level | 130px | Dropdown per row. Same user can appear multiple times with different trade levels (maps to `overrideTradeLevelId` on TimeSheetDetailRecord). |
| Rate Label columns | 70px each | Dynamic columns from the row's `availableRateLabels`. E.g., "Wages 1x", "Wages 1.5x", "Wages 2x". Numeric inputs, `step={0.25}`, stored as seconds. |
| Total | 50px | Computed sum of all rate label hours for the row. Bold. |
| × | 24px | `IconTrash` delete button. |

Cost code sub-rows rendered via `CostCodeSubRows` component (Step 1c) with `layout="table"`.

**Mobile (`layout="card"`):** Stacked cards within each `DateGroupSection`:

```
┌─────────────────────────────────────┐
│  [User *        ▾] [Trade Level * ▾]│  ← grid-cols-2
│  [Wages 1x] [Wages 1.5x] [2x] Total│  ← grid-cols-3 + 50px total
│  ↳ CC-100 Mechanical          8.0  🗑│  ← CostCodeSubRows layout="card"
│  Split by Cost Code       🗑 Remove │
└─────────────────────────────────────┘
```

- Row 1: `grid-template-columns: 1fr 1fr` — User dropdown + Trade Level dropdown
- Row 2: `grid-template-columns: 1fr 1fr 1fr 50px` — Rate label inputs (9px label above each) + bold Total
- Cards separated by `border-bottom: 1px solid #f1f5f9` within the date group

**Footer within each group (both layouts):** "+ Add Row" (blue link) + "Split by Cost Code" (gray link). Desktop also shows column totals.

**Data loading is the wrapper's responsibility** (see Step 5). The wrapper queries TimeSheetRecords for the job, groups by `workDate`, maps to `IDateGroup<ILaborTimeRowData>[]`, and passes them in. Approved records → `isApproved: true` (all inputs disabled). The GraphQL queries are defined in the wrapper, not the shared component.

**"+ Add Date"** link below all date groups — adds a new empty date group defaulting to today.

### Blank lines section

Separated from structured section by an uppercase **"BLANK LINES"** divider (`border-top`, uppercase text, small font).

Each blank row is a dashed-border card:
- Description (flex:2, text input, required)
- Workers (width: 70px, number input)
- Hours (width: 80px, number input)
- Rate $/hr (width: 90px, number/currency input)
- `IconTrash` delete

### Subtotal footer

At the bottom of the entire editor:

```
Total Labor Hours: 28.0 hrs (3 timesheet rows · 1 blank)
```

Combines structured hours (sum of all rate label seconds across all date groups) + blank hours (`submittedDuration / 3600 * qtyOfWorkers`).

## Step 5: Desktop Wrappers (apps/frontend)

Thin wrapper components that handle GraphQL data fetching and pass props to the shared UI editors. Each wrapper lives in `apps/frontend/src/components/WorkOrder/` and renders the corresponding shared component with `layout="table"`.

### 5a. WOLaborEditor wrapper

**Create file:** `apps/frontend/src/components/WorkOrder/WOLaborEditor.tsx`

Responsibilities:
- **Load existing data on mount:** Query `TimeSheetRecords` for the job, group by `workDate`, map to `IDateGroup<ILaborTimeRowData>[]`. Query `WorkOrderLaborItems` for blank lines.
- **Provide `availableUsers`:** Query users with scheduling permissions for the job.
- **Implement `onUserSelect` callback:** When user selects an employee, fetch `EmployeeAgreement` → active `EmployeeAgreementContract` for the date → return `{ tradeLevels, rateLabels }`.
- **Provide `availableCostCodes`:** Query cost codes for the job.
- **Pass `layout="table"`** to the shared `LaborItemEditor`.

```graphql
query TimesheetRecordsForJob($jobId: String!) {
    timeSheetRecords(options: { where: { filter: { fieldName: "jobId", value: $jobId } } }) {
        data {
            ... on TimeSheetRecord {
                id
                workDate
                status
                TimeSheetDetailRecords {
                    id
                    overrideTradeLevelId
                    secondsAtService
                    Employee { id, firstName, lastName }
                    TradeLevelRate {
                        TradeLevel { id, name }
                        EmployeeAgreementRateLabel { id, name }
                    }
                }
            }
        }
    }
}
```

### 5b. WOMaterialEditor wrapper

**Create file:** `apps/frontend/src/components/WorkOrder/WOMaterialEditor.tsx`

Responsibilities:
- **Load existing data on mount:** Query `WorkOrderMaterialItems` for the job, map to `IMaterialRowData[]`.
- **Implement `onMaterialSearch`:** Use `useSearchCore` with Solr-indexed Material catalog.
- **Implement `onMaterialSelect`:** Fetch material details + `resolveMaterialSellPrice()` (LEM-3 cascade) → return `{ unitPrice, costPrice }`.
- **Pass `layout="table"`**.

### 5c. WOEquipmentEditor wrapper

**Create file:** `apps/frontend/src/components/WorkOrder/WOEquipmentEditor.tsx`

Responsibilities:
- **Load existing data on mount:** Query `EquipmentTimeEntries` for the job, group by `workDate`, map to `IDateGroup<IStructuredEquipmentRowData>[]`. Query `WorkOrderEquipmentItems` for blank lines.
- **Implement `onEquipmentSearch`:** Use `useSearchCore` with Solr-indexed Equipment catalog.
- **Implement `onEquipmentSelect`:** Fetch `EquipmentRateLabels` for the equipment's category → return `{ rateLabels }`.
- **Provide `availableCostCodes`:** Query cost codes for the job.
- **Pass `layout="table"`**.

```graphql
query EquipmentTimeEntriesForJob($jobId: String!) {
    equipmentTimeEntries(options: { where: { filter: { fieldName: "jobId", value: $jobId } } }) {
        data {
            ... on EquipmentTimeEntry {
                id
                workDate
                status
                submittedDuration
                per
                Equipment { id, name }
                EquipmentRateLabel { id, name }
                CostCodes { id, costCodeId, duration, CostCode { id, code, name } }
            }
        }
    }
}
```

Each wrapper manages its own state internally (date groups, blank items, etc.) and exposes the data for the form save handler via refs or callbacks.

### On form save

The save handler processes **four mutation calls** (labour and equipment save independently):

1. **Structured labour** — calls `editFullTimeRecord` with TimeSheetDetailRecordValues from the labor wrapper.
2. **Structured equipment** — calls `upsertManyEquipmentTimeEntries` with entries from the equipment wrapper.
3. **Blank labour + blank equipment + material** — calls `upsertWorkOrderLineItems` (from WO-2).
4. **Job record** — saved via DataModelForm's normal save.

Transform functions live in each wrapper (not in the shared UI package) since they map to GraphQL mutation input shapes.
