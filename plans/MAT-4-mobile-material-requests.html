# MAT-4: Mobile Material Requests (Field to Office) — Implementation Plan

## Overview

Field workers submit material requests from mobile. Office receives, triages, and acknowledges. Two new models: `MaterialRequest` and `MaterialRequestItem`.

**Estimated effort:** 5-7 days
**Risk:** Medium — 2 new models, mobile form, desktop inbox, notification integration
**Deps:** Material catalog (exists)

---

## Step 1: Prisma Schema

### 1a. MaterialRequest

```prisma
model MaterialRequest {
  id                String   @id @db.VarChar(21)
  isDeleted         Boolean  @default(false)
  isArchived        Boolean  @default(false)
  createdAt         DateTime @default(now())
  updatedAt         DateTime @default(now()) @updatedAt

  jobId             String   @db.VarChar(21)
  Job               Job      @relation(fields: [jobId], references: [id])

  requestedByUserId String   @db.VarChar(21)
  RequestedBy       User     @relation(fields: [requestedByUserId], references: [id])

  status            String   @db.VarChar(50) @default("Submitted")
  priorityId        String?  @db.VarChar(21)
  requiredByDate    DateTime?
  notes             String?  @db.Text

  fulfilledByUserId String?  @db.VarChar(21)
  fulfilledAt       DateTime?
  fulfilledMethod   String?  @db.VarChar(50)
  purchaseOrderId   String?  @db.VarChar(21)

  Items             MaterialRequestItem[]

  @@index([jobId, isDeleted])
  @@index([status, isDeleted])
}
```

Const-based statuses:
```typescript
export const MATERIAL_REQUEST_STATUSES = ["Submitted", "Acknowledged", "Fulfilled", "Cancelled"] as const;
export const MATERIAL_REQUEST_FULFILLMENT_METHODS = ["Inventory", "PurchaseOrder", "Other"] as const;
```

PropertyValue seed for priority: Urgent, Normal, Low under `propertyName: "material request priority"`.

### 1b. MaterialRequestItem

```prisma
model MaterialRequestItem {
  id                  String          @id @db.VarChar(21)
  isDeleted           Boolean         @default(false)
  createdAt           DateTime        @default(now())
  updatedAt           DateTime        @default(now()) @updatedAt

  materialRequestId   String          @db.VarChar(21)
  MaterialRequest     MaterialRequest @relation(fields: [materialRequestId], references: [id])

  materialId          String?         @db.VarChar(21)
  Material            Material?       @relation(fields: [materialId], references: [id])

  description         String?         @db.VarChar(500)
  quantity            Decimal?        @db.Decimal(10, 2)
  unit                String?         @db.VarChar(50)
  costCodeId          String?         @db.VarChar(21)
  status              String          @db.VarChar(50) @default("Pending")

  @@index([materialRequestId, isDeleted])
}
```

---

## Step 2: Model + GraphQL

**Create:** `apps/api/src/models/MaterialRequest.ts`, `apps/api/src/graphql/models/MaterialRequest.ts`

Key methods: createRequest, acknowledgeRequest, fulfillRequest, getInbox (filtered by status, job, priority, date).

---

## Step 3: Mobile — Request Form

**Create:** `apps/mobile/src/pages/job-sites/[id]/material-request/new.tsx`
**Create:** `apps/mobile/src/components/MaterialRequest/MobileMaterialRequestForm.tsx`

Features:
- Material picker from catalog (SelectionSlideup) or free-text description
- Photo attachment (camera capture for labels/part numbers)
- Quantity + unit entry per item
- Priority selector (Urgent/Normal/Low)
- Required-by date picker
- Notes field
- Multiple items per request

---

## Step 4: Desktop — Material Request Inbox

**Create:** `apps/frontend/src/pages/material-requests/index.tsx`
**Create:** `apps/frontend/src/components/MaterialRequests/MaterialRequestInbox.tsx`

Inbox view at `/material-requests`:
- Filterable by job, status, priority, date range
- Table: Request #, Job, Requested By, Items Count, Priority, Status, Date, Required By
- One-click acknowledge + assign to user
- Expand to see items detail
- Request history visible on Job detail page

---

## Step 5: Notifications

Push notification to office users when new request is submitted. Use existing notification infrastructure.

---

## Verification Checklist

- [ ] Mobile: field worker creates request from job site (catalog picker or free-text)
- [ ] Mobile: attach photo of what's needed
- [ ] Desktop: Material Request Inbox at `/material-requests` with filtering
- [ ] Desktop: one-click acknowledge + assign for manual fulfillment
- [ ] Notification to office on new request submission
- [ ] Request history visible on Job detail page
- [ ] Priority levels seeded as PropertyValue (Urgent/Normal/Low)
- [ ] Multiple items per request supported

(function() {
    var md = document.getElementById('plan-md').textContent;
    var target = document.getElementById('rendered');
    var html = md
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
            return '<pre><code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
        })
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr>');
    html = html.replace(/^- \[ \] (.+)$/gm, '<div class="check-item"><div class="check-box"></div><span>$1</span></div>');
    html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var headers = rows[0].split('|').filter(function(c) { return c.trim(); });
        var isSep = /^[\s|:\-]+$/.test(rows[1]);
        var start = isSep ? 2 : 1;
        var out = '<table><thead><tr>';
        headers.forEach(function(h) { out += '<th>' + h.trim() + '</th>'; });
        out += '</tr></thead><tbody>';
        for (var i = start; i < rows.length; i++) {
            var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
            out += '<tr>'; cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; }); out += '</tr>';
        }
        out += '</tbody></table>';
        return out;
    });
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    html = html.replace(/^(?!<[hultdps\/<]|<\/|<code|<pre|<hr|<div|<strong|<em)(.+)$/gm, '<p>$1</p>');
    target.innerHTML = html;
})();
</script>
