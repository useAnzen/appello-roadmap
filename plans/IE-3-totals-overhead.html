# IE-3: Estimate Totals & Overhead — Implementation Plan

## Overview

Add `Itemized` to `EstimateChangeOrderRecord.creationType`; extend `upsertFullEstimateChangeOrderRecord` to accept nested `EstimateLineItem[]` in one transaction; update `EstimateChangeOrderTotals.tsx` for itemized subtotals, overhead, contingency, and gross margin.

**Estimated effort:** 2-3 days  
**Spec:** `uis-IE-3-totals-overhead.html`  
**Requires:** IE-2

---

## Step 1: Prisma enum extension

- Add `Itemized` to `EstimateChangeOrderCreationType` (or equivalent enum name in codebase).
- Migrate.

---

## Step 2: API upsert

**Model:** `EstimateChangeOrderRecord` (or dedicated service)

- In `upsertFullEstimateChangeOrderRecord`, when payload includes line items:
  - Replace-or-merge child `EstimateLineItem` rows by id / order.
  - Use Prisma transaction; soft-delete removed lines.

---

## Step 3: Totals component

**File:** `EstimateChangeOrderTotals.tsx`

- If `creationType === Itemized`:
  - Cost subtotal = sum of line `totalCost`
  - Total markup = sum of line markup dollars
  - Customer bid = sum of line `price` plus record-level overhead/contingency as per UIS
  - Gross margin = `(bid - costSubtotal) / bid` when bid &gt; 0

---

## Step 4: Default markup action

- Button or menu: "Apply default markup %" to all lines lacking explicit override (define rules in model).

---

## Step 5: Frontend save path

- On Save from estimate detail, send full line array + totals fields in one mutation variables object.

---

## Checklist

- [ ] Switching creation type mid-edit shows confirm if data loss
- [ ] Totals reconcile with server response after save
- [ ] Permissions on mutation unchanged from parent estimate

---

| MODIFY | `apps/frontend/src/components/.../EstimateChangeOrderTotals.tsx` |
