# WO-7: WO → Invoice / CO Conversion — Implementation Plan

## Overview

Two mutations that convert an Approved Work Order's line items into either a Simple Invoice (JobBill) or a Change Order (EstimateChangeOrderRecord). Reuses existing rate resolution from LEM-1/2 and a shared `calculateQuantity` utility for equipment billing. One schema change: make accountItemId nullable on EstimateChangeOrderRecordValue.

**Estimated effort:** 3-4 days
**Risk:** Medium — modifies EstimateChangeOrderRecordValue schema, extends EstimateChangeOrderDetails UI
**Spec:** `tm-work-orders-uis/uis-20g-conversion.html`
**Requires:** WO-4 (Detail Page), WO-2 (Line Items), LEM-1/2

---

## Step 1: Schema — Make accountItemId Nullable

**File:** `apps/api/prisma/schema.prisma`

```prisma
// EstimateChangeOrderRecordValue — change:
accountItemId    String?     @db.VarChar(21)    // was: String (required)
AccountItem      AccountItem? @relation(...)     // was: AccountItem (required)
```

**Migration:**

```sql
ALTER TABLE `EstimateChangeOrderRecordValue`
    MODIFY COLUMN `accountItemId` VARCHAR(21) NULL;
```

This is backward compatible — existing records all have accountItemId set. Only WO-generated CO line items will have null.

## Step 2: Shared Line Item Resolution Helper

Both conversion paths need to resolve WO line items into description + rate + quantity. Create a shared helper on the Job model or as a utility.

**File:** `apps/api/src/models/WorkOrderConversion.ts` (new) or add to `Job.ts`

```typescript
interface IResolvedWOLineItem {
    description: string;
    rate: number;
    quantity: number;
    value: number;         // rate * quantity
    numericHours: number;  // hours for CO numeric field (0 for materials)
    sourceType: "labor" | "material" | "equipment";
}

async function resolveWorkOrderLineItems(
    jobId: string
): Promise<IResolvedWOLineItem[]> {
    const items: IResolvedWOLineItem[] = [];
    const job = await prisma.job.findUnique({ where: { id: jobId } });
    const dailyHours = job?.dailyHours ?? 8;

    // --- Labor ---
    const laborItems = await prisma.workOrderLaborItem.findMany({
        where: { jobId, isDeleted: false },
        include: {
            TradeLevelRate: {
                include: {
                    TradeLevel: true,
                    EmployeeAgreementRateLabel: true
                }
            }
        }
    });

    for (const item of laborItems) {
        const hours = item.submittedDuration / 3600;
        const totalHours = hours * item.qtyOfWorkers;

        if (item.tradeLevelRateId && item.TradeLevelRate) {
            // Structured: rate from TradeLevelRate.billableValue (LEM-1)
            const rate = item.TradeLevelRate.billableValue?.toNumber() ?? 0;
            items.push({
                description: `${item.TradeLevelRate.TradeLevel.name} — ${item.TradeLevelRate.EmployeeAgreementRateLabel.name}`,
                rate,
                quantity: totalHours,
                value: Number((rate * totalHours).toFixed(2)),
                numericHours: totalHours,
                sourceType: "labor"
            });
        } else {
            // Blank: rate from line item
            const rate = item.rate?.toNumber() ?? 0;
            items.push({
                description: item.description ?? "Labor",
                rate,
                quantity: totalHours,
                value: Number((rate * totalHours).toFixed(2)),
                numericHours: totalHours,
                sourceType: "labor"
            });
        }
    }

    // --- Materials ---
    const materialItems = await prisma.workOrderMaterialItem.findMany({
        where: { jobId, isDeleted: false },
        include: { Material: true }
    });

    for (const item of materialItems) {
        items.push({
            description: item.materialId
                ? item.Material?.name ?? item.description ?? "Material"
                : item.description ?? "Material",
            rate: item.unitPrice?.toNumber() ?? 0,
            quantity: item.quantity?.toNumber() ?? 0,
            value: item.total?.toNumber() ?? 0,
            numericHours: 0,  // no hour relationship
            sourceType: "material"
        });
    }

    // --- Equipment ---
    const equipmentItems = await prisma.workOrderEquipmentItem.findMany({
        where: { jobId, isDeleted: false },
        include: {
            Equipment: true,
            EquipmentRateLabel: true
        }
    });

    const rateValueModel = new EquipmentRateValueModel();

    for (const item of equipmentItems) {
        if (item.equipmentId && item.Equipment) {
            // Structured: rate from LEM-2
            const resolved = await rateValueModel.resolveEquipmentRate(
                item.equipmentId,
                item.equipmentRateLabelId,
                item.per ?? "HOUR",
                jobId,
                item.operatorIncluded,
                job?.dateOfWork
            );
            const rate = resolved?.amount ?? 0;
            const quantity = calculateQuantity(item, dailyHours);
            // Hours: only for HOUR per-unit
            const numericHours = item.per === "HOUR"
                ? item.submittedDuration / 3600
                : 0;

            items.push({
                description: `${item.Equipment.name} — ${item.EquipmentRateLabel?.name ?? "Standard"}`,
                rate,
                quantity,
                value: Number((rate * quantity).toFixed(2)),
                numericHours,
                sourceType: "equipment"
            });
        } else {
            // Blank: manual rate
            const rate = item.unitRate?.toNumber() ?? 0;
            const qty = item.quantity?.toNumber() ?? 0;
            items.push({
                description: item.description ?? "Equipment",
                rate,
                quantity: qty,
                value: Number((rate * qty).toFixed(2)),
                numericHours: 0,
                sourceType: "equipment"
            });
        }
    }

    return items;
}
```

`calculateQuantity` is a shared utility function — implement it in `apps/api/src/lib/equipment/calculateQuantity.ts`. Handles full-day vs prorated based on `isFullDayBilling` and `dailyHours`. If UIS-15B is built later, it imports from the same location.

## Step 3: generateInvoiceFromWorkOrder Mutation

**File:** `apps/api/src/models/JobBill.ts`

```typescript
public async generateInvoiceFromWorkOrder(
    jobId: string,
    currentUserId: string
): Promise<FullModel<IJobBill>> {
    // Validate WO is Approved
    const job = await prisma.job.findUnique({ where: { id: jobId } });
    // ... validate status is Approved

    // Resolve all line items
    const resolvedItems = await resolveWorkOrderLineItems(jobId);

    // Create Simple JobBill
    const bill = await this.customCreateItem(
        {
            jobId,
            template: "Simple",
            invoiceDate: new Date(),
            submittedByUserId: currentUserId
        },
        currentUserId
    );

    // Create JobBillLineItems
    const lineItemModel = new JobBillLineItemModel();
    for (const item of resolvedItems) {
        await lineItemModel.createItem(
            {
                jobBillId: bill.id,
                description: item.description,
                quantity: item.quantity,
                rate: item.rate,
                value: item.value
            },
            currentUserId
        );
    }

    // Update WO status to "Invoiced"
    const invoicedStatus = await prisma.propertyValue.findFirst({
        where: { propertyName: "workOrderStatus", slug: "invoiced" }
    });
    if (invoicedStatus) {
        await prisma.job.update({
            where: { id: jobId },
            data: { jobStatusId: invoicedStatus.id }
        });
    }

    return bill;
}
```

## Step 4: convertWorkOrderToChangeOrder Mutation

**File:** `apps/api/src/models/EstimateChangeOrderRecord.ts`

```typescript
public async convertWorkOrderToChangeOrder(
    jobId: string,
    currentUserId: string
): Promise<FullModel<IEstimateChangeOrderRecord>> {
    const job = await prisma.job.findUnique({ where: { id: jobId } });
    // ... validate status is Approved

    // Resolve all line items
    const resolvedItems = await resolveWorkOrderLineItems(jobId);

    // Calculate total bid
    const totalBid = resolvedItems.reduce((sum, item) => sum + item.value, 0);

    // Generate CO number
    const estimateNumber = await this.generateEstimateNumber(jobId, "ChangeOrder");

    // Get default "won" status for the CO
    const wonStatus = await prisma.propertyValue.findFirst({
        where: { propertyName: "estimateChangeOrderRecordStatus", slug: "won" }
    });

    // Create EstimateChangeOrderRecord
    const co = await this.createItem(
        {
            type: "ChangeOrder",
            title: `Work Order ${job.fullJobNumber}`,
            description: `Generated from Work Order ${job.fullJobNumber}`,
            estimateNumber,
            fullEstimateNumber: estimateNumber,
            jobId,
            statusId: wonStatus?.id,
            bid: totalBid,
            lineItemsTurnedOn: true,
            creationType: "Full"
        },
        currentUserId
    );

    // Create EstimateChangeOrderRecordValues
    for (const item of resolvedItems) {
        await prisma.estimateChangeOrderRecordValue.create({
            data: {
                id: nanoid(),
                estimateChangeOrderRecordId: co.id,
                description: item.description,
                estimate: item.value,
                numeric: item.numericHours,
                accountItemId: null  // no account hierarchy for WO-generated COs
            }
        });
    }

    return co;
}
```

**File:** `apps/api/src/graphql/models/EstimateChangeOrderRecord.ts`

    convertWorkOrderToChangeOrder(jobId: ID!): EstimateChangeOrderRecord

## Step 5: Update EstimateChangeOrderDetails for Null accountItemId

**File:** `apps/frontend/src/components/DetailsPage/EstimateChangeOrderDetails/` (or wherever the CO detail renders line items)

The CO detail page currently groups line items by AccountItem in a hierarchy. When `accountItemId` is null (WO-generated COs), it needs a fallback rendering.

### Approach

Check if ANY line item on the CO has `accountItemId = null`. If so, render all line items as a flat table instead of the account hierarchy:

```typescript
const hasAccountlessItems = lineItems.some(item => !item.accountItemId);

if (hasAccountlessItems) {
    // Flat table: Description | Estimate ($) | Hours
    return <FlatLineItemTable lineItems={lineItems} />;
} else {
    // Existing account hierarchy rendering
    return <AccountHierarchyView lineItems={lineItems} />;
}
```

The flat table shows:
- Description column (from `description`)
- Estimate column (from `estimate` — dollar value)
- Hours column (from `numeric` — only shown if > 0, blank for materials)

This is a minimal change — the existing hierarchy view continues to work for all traditional COs. Only WO-generated COs (where all items have null accountItemId) get the flat view.

    type: "invoice" | "changeOrder";

## Verification Checklist

- [ ] `accountItemId` nullable on EstimateChangeOrderRecordValue (migration applied, no existing data affected)
- [ ] `resolveWorkOrderLineItems` correctly processes all 6 line item types (structured/blank × labor/material/equipment)
- [ ] Structured labor: rate from TradeLevelRate.billableValue, qty = hours × workers
- [ ] Structured equipment: rate from resolveEquipmentRate (LEM-2), qty via calculateQuantity (handles full-day/prorated)
- [ ] Structured materials: sell price from `resolveMaterialSellPrice()` (LEM-3 cascade) via `unitPrice`
- [ ] Blank lines: rate/unitPrice from line item directly
- [ ] Material items: numericHours = 0 (no hour relationship)
- [ ] Equipment items: numericHours = actual hours for HOUR per-unit, 0 for non-hourly
- [ ] `generateInvoiceFromWorkOrder` creates Simple JobBill with correct line items
- [ ] After invoice generation: WO status → "Invoiced"
- [ ] `convertWorkOrderToChangeOrder` creates ChangeOrder with correct line items
- [ ] CO line items: accountItemId = null, description + estimate + numeric set
- [ ] CO bid = sum of all line item estimate values
- [ ] EstimateChangeOrderDetails renders flat table when accountItemId is null
- [ ] Flat table shows Description, Estimate ($), and Hours (blank for materials)
- [ ] "Generate Invoice" button visible on WO detail when status = Approved
- [ ] "Convert to CO" button visible on WO detail when status = Approved
- [ ] Confirmation modal shows line item count + total value before conversion
- [ ] After invoice: button disabled, status badge updates
- [ ] After CO: "Converted to CO" badge appears, Convert to CO button disabled
- [ ] Both conversions can be done independently on the same WO
- [ ] Existing EstimateChangeOrderRecords with accountItemId set render unchanged (no regression)
