# WO-3a: Schema & Form Foundation — Implementation Plan

## Overview

Add `dateOfWork` to Job, create the polymorphic `Signature` model, seed DocumentAttributeAssignments for WO-specific fields, and update job number generation to be classification-aware. This establishes the foundation that WO-3b (Line Item Editors) and WO-3c (Signatures & Submission) build on.

**Estimated effort:** 3-4 days
**Risk:** Medium — modifies Job model, new Signature model, DAA seed migration
**Spec:** `tm-work-orders-uis/uis-20c-1-schema-form-foundation.html`
**Requires:** WO-1 (JobClassification), WO-2 (Line Item Tables), PR #6831 (Job DataModel Refactor)

---

## Step 6: Signature GraphQL Resolver

**Create file:** `apps/api/src/graphql/models/Signature.ts`

```graphql
type Signature {
    id: ID!
    referenceModel: String!
    referenceId: String!
    assetId: String!
    Asset: Asset
    userId: String
    User: User
    signerName: String
    signerEmail: String
    signerCompany: String
    signedAt: DateTime!
    latitude: Float
    longitude: Float
    createdAt: DateTime
}

input CreateSignature {
    referenceModel: String!
    referenceId: String!
    assetId: String!
    userId: String
    signerName: String
    signerEmail: String
    signerCompany: String
    signedAt: DateTime
    latitude: Float
    longitude: Float
}

extend type Query {
    signatures(referenceModel: String!, referenceId: ID!): [Signature]
}

extend type Mutation {
    createSignature(data: CreateSignature!): Signature
    deleteSignature(id: ID!): Boolean
}
```

Resolvers:

```typescript
Resolvers: {
    Asset: (parent) => prisma.asset.findUnique({ where: { id: parent.assetId } }),
    User: (parent) => parent.userId
        ? prisma.user.findUnique({ where: { id: parent.userId } })
        : null
},
Query: {
    signatures: (_, args, context) =>
        prisma.signature.findMany({
            where: {
                referenceModel: args.referenceModel,
                referenceId: args.referenceId,
                isDeleted: false
            },
            orderBy: { signedAt: "asc" }
        })
},
Mutation: {
    createSignature: (_, args, context) =>
        new SignatureModel().createItem(args.data, context.userId()),
    deleteSignature: (_, args, context) =>
        new SignatureModel().deleteItem(args.id, context.userId())
}
```

Register in `apps/api/src/graphql/schema.ts` (5 places) and export from `models/index.ts`.

## Step 9: Update Job Number Generation

**File:** `apps/api/src/models/Job.ts`

**Important:** PR #6831 already updated `generateJobNumber` to handle the case where `projectId` is null. WO-3a extends those changes to make number generation classification-aware. The branching is based on `jobClassification` derived from `jobTypeId`, NOT on whether a project is attached (a WO can optionally be under a project).

### 9a. Resolve classification from jobTypeId

Add a helper or inline lookup that derives the classification. This is needed before number generation and before fullJobNumber formatting:

```typescript
// Helper — can be a private method on the Job model:
private async getJobClassification(jobTypeId?: string): Promise<string> {
    if (!jobTypeId) return "ProjectJob";
    const jobType = await prisma.propertyValue.findUnique({
        where: { id: jobTypeId },
        select: { jobClassification: true }
    });
    return jobType?.jobClassification ?? "ProjectJob";
}
```

### 9b. Extend generateJobNumber with classification parameter

The method signature from PR #6831 already accepts whatever params it needs for the project-optional case. Add `jobClassification` as a parameter (or derive it internally from `jobTypeId`):

```typescript
// Classification-aware numbering:
if (jobClassification === "WorkOrder") {
    // WO-specific numbering: auto-increment across all WorkOrder jobs
    const instance = await prisma.instance.findFirst();
    const pad = instance?.jobNumbering ?? 3;

    const existingWOs = await prisma.job.findMany({
        where: {
            isDeleted: false,
            jobType: { jobClassification: "WorkOrder" }
        },
        select: { number: true },
        orderBy: { createdAt: "desc" }
    });

    const numbers = existingWOs
        .map(j => parseInt(j.number?.replace(/\D/g, "") ?? "0"))
        .filter(n => !isNaN(n));
    const largest = numbers.length > 0 ? Math.max(...numbers) : 0;

    return (largest + 1).toString().padStart(pad, "0");
}

// ProjectJob numbering (existing logic from PR #6831)
// ... handles both with-project and without-project cases ...
```

## Step 11: Filter Job Type Options by Classification

When editing an existing job, the job type dropdown must only show types that match the job's current classification. A ProjectJob cannot be changed to a WorkOrder type (or vice versa) — the user must create a new job of the correct classification instead.

**Where:** The job type PropertyValue dropdown in the Job form (DataModelForm / JobAddEditForm)

**Logic:**

1. On **create**, the form knows which classification context it's in (opened from Jobs page = ProjectJob types, opened from Work Orders page = WorkOrder types). Filter the jobType PropertyValue options by `jobClassification`.
2. On **edit**, read the current job's `jobClassification` (derived from its current jobType). Filter the jobType dropdown to only show PropertyValues where `jobClassification` matches.

```typescript
// When fetching jobType options for the dropdown:
const jobTypeOptions = propertyValues.filter(pv =>
    pv.propertyName === "jobType" &&
    (pv.jobClassification ?? "ProjectJob") === currentClassification
);
```

The backend guard (WO-1, Step 5) rejects cross-classification changes at the API level. This frontend filtering is the UX layer that prevents the user from seeing invalid options.
