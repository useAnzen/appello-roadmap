# MAT-9: Discount Management — Implementation Plan

## Overview

Manage negotiated discount agreements with distributors at three scope levels: Global (blanket % off all products from a distributor), Category (% off products in a MaterialGroup), and Product (specific ManufacturerProduct override). Discounts cascade with most-specific-wins resolution, computed at query time.

**Estimated effort:** 3-4 days
**Risk:** Low-Medium — 1 new model, discount resolution logic, Company detail tab
**Deps:** MAT-0 (DistributorPrice must exist)

---

## Step 1: Prisma Schema

### 1a. DistributorDiscount

```prisma
model DistributorDiscount {
  id                      String              @id @db.VarChar(21)
  isDeleted               Boolean             @default(false)
  isArchived              Boolean             @default(false)
  createdAt               DateTime            @default(now())
  updatedAt               DateTime            @default(now()) @updatedAt

  distributorId           String              @db.VarChar(21)
  Distributor             Company             @relation(fields: [distributorId], references: [id])

  scope                   String              @db.VarChar(50)

  materialGroupId         String?             @db.VarChar(21)
  MaterialGroup           MaterialGroup?      @relation(fields: [materialGroupId], references: [id])

  manufacturerProductId   String?             @db.VarChar(21)
  ManufacturerProduct     ManufacturerProduct? @relation(fields: [manufacturerProductId], references: [id])

  discountPercent         Decimal             @db.Decimal(5, 2)
  effectiveFrom           DateTime?
  effectiveTo             DateTime?
  notes                   String?             @db.Text

  @@unique([distributorId, scope, materialGroupId, manufacturerProductId])
  @@index([distributorId, isDeleted])
}
```

Const-based scopes:
```typescript
export const DISTRIBUTOR_DISCOUNT_SCOPES = ["Global", "Category", "Product"] as const;
```

## Step 2: Model Class

**Create:** `apps/api/src/models/DistributorDiscount.ts`

Key methods:
- `getDiscountsForDistributor(distributorId)`: All active discounts for a distributor
- `resolveDiscount(distributorId, manufacturerProductId)`: Cascade resolution — Product > Category > Global > DistributorPrice.discountPercent fallback

### Discount Resolution Algorithm

```typescript
async resolveDiscount(
    distributorId: string,
    manufacturerProductId: string
): Promise<number | null> {
    const now = new Date();

    // 1. Product-specific discount
    const productDiscount = await prisma.distributorDiscount.findFirst({
        where: {
            distributorId,
            manufacturerProductId,
            scope: "Product",
            isDeleted: false,
            OR: [
                { effectiveTo: null },
                { effectiveTo: { gte: now } }
            ]
        }
    });
    if (productDiscount) return productDiscount.discountPercent.toNumber();

    // 2. Category discount (via ManufacturerProduct → Material → MaterialGroup)
    const mfgProduct = await prisma.manufacturerProduct.findUnique({
        where: { id: manufacturerProductId },
        include: { Material: { include: { MaterialGroup: true } } }
    });
    if (mfgProduct?.Material?.materialGroupId) {
        const categoryDiscount = await prisma.distributorDiscount.findFirst({
            where: {
                distributorId,
                materialGroupId: mfgProduct.Material.materialGroupId,
                scope: "Category",
                isDeleted: false,
                OR: [
                    { effectiveTo: null },
                    { effectiveTo: { gte: now } }
                ]
            }
        });
        if (categoryDiscount) return categoryDiscount.discountPercent.toNumber();
    }

    // 3. Global discount
    const globalDiscount = await prisma.distributorDiscount.findFirst({
        where: {
            distributorId,
            scope: "Global",
            isDeleted: false,
            OR: [
                { effectiveTo: null },
                { effectiveTo: { gte: now } }
            ]
        }
    });
    if (globalDiscount) return globalDiscount.discountPercent.toNumber();

    // 4. Fallback: no managed discount
    return null;
}
```

## Step 4: Effective Price on DistributorPrice

**Modify:** `apps/api/src/models/DistributorPrice.ts`

Add `resolveEffectivePrice()` method:
```typescript
async resolveEffectivePrice(distributorPriceId: string): Promise<{
    listPrice: number;
    discountPercent: number;
    effectivePrice: number;
}> {
    const dp = await prisma.distributorPrice.findUnique({...});
    const discount = await discountModel.resolveDiscount(
        dp.distributorId,
        dp.manufacturerProductId
    );
    const resolvedDiscount = discount ?? dp.discountPercent?.toNumber() ?? 0;
    const listPrice = dp.listPrice?.toNumber() ?? dp.unitPrice.toNumber();
    const effectivePrice = listPrice * (1 - resolvedDiscount / 100);
    return { listPrice, discountPercent: resolvedDiscount, effectivePrice };
}
```

    html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var headers = rows[0].split('|').filter(function(c) { return c.trim(); });
        var isSep = /^[\s|:\-]+$/.test(rows[1]);
        var start = isSep ? 2 : 1;
        var out = '<table><thead><tr>';
        headers.forEach(function(h) { out += '<th>' + h.trim() + '</th>'; });
        out += '</tr></thead><tbody>';
        for (var i = start; i < rows.length; i++) {
            var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
            out += '<tr>'; cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; }); out += '</tr>';
        }
        out += '</tbody></table>';
        return out;
    });
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    html = html.replace(/^(?!<[hultdps\/<]|<\/|<code|<pre|<hr|<div|<strong|<em)(.+)$/gm, '<p>$1</p>');
    target.innerHTML = html;
})();
