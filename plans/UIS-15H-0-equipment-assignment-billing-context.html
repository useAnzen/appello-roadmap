# UIS-15H-0: Equipment Assignment Billing Context + Override Permissions â€” Implementation Plan

## Overview

A small backend-only prerequisite plan that runs **directly before UIS-15H**. EQ-0 has already shipped `EquipmentTimeEntry`, `EquipmentTimeEntryCostCode`, and the base permission set. This plan adds the additional schema, permissions, and model behaviour that UIS-15H depends on but which are not part of EQ-0's scope:

1. Billing-context fields on the existing `EquipmentAssignment` model (`per`, `operatorIncluded`, `isFullDayBilling`) so the assignment becomes the source of truth for defaults.
2. Override columns on `EquipmentTimeEntry` (`overridePer`, `overrideOperatorIncluded`, `overrideIsFullDayBilling`) â€” mirrors the `overrideTravelValue` / `overrideBoardValue` / `overrideParkingValue` pattern on `TimeSheetRecord`.
3. Two new permissions: `EquipmentTimeEntry___OverridePresets` (who can write the override columns) and `EquipmentTimeEntry___LogTimeToUnassignedEquipment` (who can reference equipment with no active assignment).
4. Hydration + permission enforcement in `upsertEquipmentTimeEntry` / `upsertManyEquipmentTimeEntries`.

**No UI work** â€” UIS-15H consumes the schema and permissions. UIS-15C adds the billing-context controls to the `EquipmentAssignment` edit form alongside its Attachments multi-select.

**Estimated effort:** 1-1.5 days
**Risk:** Low â€” additive schema change on existing models, new permissions default-denied
**Spec:** `appello-sdlc/docs/uis-15h-equipment-timesheet-capture.html` â€” "Billing Context â€” Confirmed Decisions" section
**Requires:** EQ-0 (already shipped)
**Enables:** UIS-15H (Equipment Timesheet UI), UIS-15C (EquipmentAssignment form fields)

## Step 1: Prisma Schema Additions

**File:** `apps/api/prisma/schema.prisma`

### 1a. EquipmentAssignment â€” billing context fields

```prisma
model EquipmentAssignment {
  // ... existing fields (id, userId, equipmentId, checkoutJobId, checkoutDateTime, etc.) ...

  // Billing context â€” drives EquipmentTimeEntry defaults for rate resolution.
  // Nullable so existing rows back-fill cleanly; resolution falls back to
  // Job.equipmentFullDayBilling / LEM-2 defaults when unset.
  per                 String?   // HOUR | DAY | WEEK | MONTH | YEAR
  operatorIncluded    Boolean?
  isFullDayBilling    Boolean?
}
```

### 1b. EquipmentTimeEntry â€” override columns

```prisma
model EquipmentTimeEntry {
  // ... existing fields from EQ-0 (id, equipmentId, jobId, per, operatorIncluded, isFullDayBilling, ...) ...

  // Per-entry overrides of the assignment-level base values. Nullable =
  // "no override â€” use the inherited value stored in per / operatorIncluded /
  // isFullDayBilling on this row". Mirrors overrideTravelValue /
  // overrideBoardValue / overrideParkingValue on TimeSheetRecord.
  // Writes to these columns are gated by EquipmentTimeEntry___OverridePresets
  // in the model class (see Step 3).
  overridePer                   String?
  overrideOperatorIncluded      Boolean?
  overrideIsFullDayBilling      Boolean?
}
```

### 1c. Migration

Run `pnpm --filter api prisma:migrate`, name: `add_equipment_assignment_billing_context_and_overrides`.

Migration SQL shape:

```sql
ALTER TABLE `EquipmentAssignment`
    ADD COLUMN `per` VARCHAR(191) NULL,
    ADD COLUMN `operatorIncluded` TINYINT(1) NULL,
    ADD COLUMN `isFullDayBilling` TINYINT(1) NULL;

ALTER TABLE `EquipmentTimeEntry`
    ADD COLUMN `overridePer` VARCHAR(191) NULL,
    ADD COLUMN `overrideOperatorIncluded` TINYINT(1) NULL,
    ADD COLUMN `overrideIsFullDayBilling` TINYINT(1) NULL;
```

No backfill needed â€” all new columns are nullable and absence means "inherit / no override."

## Step 2: Permission Migration

**Create file:** `apps/api/prisma/migrations/[timestamp]_equipment_time_entry_override_permissions/migration.sql`

```sql
-- Allows the user to set overridePer / overrideOperatorIncluded /
-- overrideIsFullDayBilling on an EquipmentTimeEntry. Without this
-- permission, those columns stay null and the entry uses the
-- EquipmentAssignment's billing context as-is.
--
-- Allows the user to select ANY equipment when logging time. Without this
-- permission the equipment picker is restricted to equipment with an
-- active EquipmentAssignment to the selected job (or to the operator user
-- when no job is selected).
INSERT IGNORE INTO `Permission` (`id`, `name`, `slug`) VALUES
    (SUBSTRING(MD5(UUID()), 1, 21), 'EquipmentTimeEntry___OverridePresets', 'equipmenttimeentry___overridepresets'),
    (SUBSTRING(MD5(UUID()), 1, 21), 'EquipmentTimeEntry___LogTimeToUnassignedEquipment', 'equipmenttimeentry___logtimetounassignedequipment');

INSERT IGNORE INTO `RolePermission` (`id`, `roleId`, `permissionId`, `scope`, `createdAt`, `updatedAt`)
SELECT
    LEFT(md5(concat(uuid(), r.id, p.id)), 21),
    r.id,
    p.id,
    'ALL',
    NOW(),
    NOW()
FROM
    `Role` r
    CROSS JOIN `Permission` p
WHERE
    p.slug IN (
        'equipmenttimeentry___overridepresets',
        'equipmenttimeentry___logtimetounassignedequipment'
    )
    AND r.slug IN ('super-admin', 'admin')
;
```

**ID generation:** use `SUBSTRING(MD5(UUID()), 1, 21)` for the `Permission.id` values and `LEFT(md5(concat(uuid(), r.id, p.id)), 21)` for the `RolePermission.id` values â€” same pattern as the existing repo migrations (for example `20260415000000_add_override_trade_level_permission`). Never hardcode placeholder ID strings.

**Role assignment table:** write to `RolePermission` (the current table with scope support), **not** the deprecated `_PermissionToRole` join table. `RolePermission` requires `roleId`, `permissionId`, `scope` (`'ALL'` for plain capability permissions like these), `createdAt`, `updatedAt`.

**Target roles:** assign to both `super-admin` and `admin` so admins can configure the new permissions on other roles without needing a super-admin to enable it for them â€” matches the pattern used by `20260415000000_add_override_trade_level_permission`.

**Both new permissions are enforced on the backend AND the frontend.** The UI is not the only gate â€” the model class rejects spoofed writes (see Step 4).

## Step 3: Register Permissions in the Permission Map

**File:** `packages/ui/src/components/Permission/PermissionMap.ts`

The Roles/Permissions form in the admin UI renders its checkboxes from `permissionMap`. A permission that exists in the database but is not referenced here never appears in the form, so admins have no way to grant or revoke it. The EQ-0 migration seeds `equipmenttimeentry___create` / `___edit` / `___view` / `___approve` and `mobile___logequipmenttime` but those slugs are not yet registered in `permissionMap`. This plan registers them alongside the two new permissions so the whole EquipmentTimeEntry permission surface lands in one place.

### 3a. New "Equipment Time Entry" section under the Equipment main group

Locate the `Equipment` main group (currently ends around line 1226 of `PermissionMap.ts`, with `Equipment` and `Equipment Rates` sub-sections). Append a third section:

```typescript

        // ... existing "Equipment Rates" section (view/create-edit/delete) ...

                        "When disabled, the equipment picker is limited to equipment with an active EquipmentAssignment matching the selected job (or the operator user when no job is selected). When enabled, any equipment can be selected.",
                    requiredPermissions: ["equipmenttimeentry___create"],
                    permissionActions: [
                        {
                            permissionSlug: "equipmenttimeentry___logtimetounassignedequipment"
                        }
                    ]
                },
                {

                        "Allows overriding the per / operator included / full day billing values inherited from the EquipmentAssignment on an individual EquipmentTimeEntry. Desktop only â€” overrides are never exposed on mobile.",

Match the surrounding style:
- View-style permissions use `availableScopes: scopeOptions.allNone` (as the existing `equipment___view` and `equipmentrate___view` entries do).
- Plain capability permissions (create / edit / approve / override / unassigned-equipment) omit `availableScopes` â€” they're booleans on the role.
- `requiredPermissions` chains: each sub-group lists the slugs that must be enabled before the entry is meaningful (`equipment___view` for the view gate, then `equipmenttimeentry___view` â†’ `equipmenttimeentry___create` for the higher-order gates).

### 3b. Add the mobile Log Time toggle

`mobile___logequipmenttime` is seeded by EQ-0 but is not yet in `permissionMap`. Register it under the existing Mobile main group's **Timesheets** section (the same block that currently hosts `mobile___logtime`, `mobile___approvetimesheets`, `mobile___manualtimeentryoverride`, etc. â€” around lines 735â€“775). Append a new `permissionGroup` to that `permissionGroups` array:

```typescript
{
    label: "Log Equipment Time",
    description:
        "Allows the user to log equipment time from the mobile Equipment detail page and from the mobile timesheet flow.",
    permissionActions: [{ permissionSlug: "mobile___logequipmenttime" }]
}
```

No `availableScopes` â€” this is a plain capability toggle like `mobile___deleteTimesheet`.

### Slug-match notes

- The `permissionSlug` strings must exactly match the `slug` column values seeded in Step 2 and the EQ-0 migration (all lowercase, triple-underscore separator â€” `equipmenttimeentry___overridepresets`, not `equipment_time_entry___overridepresets`). The permission form looks up permissions by slug; a typo silently hides the checkbox.
- If a previous PR has already registered some of the base slugs (`equipmenttimeentry___view` / `create` / `edit` / `approve` or `mobile___logequipmenttime`) in `permissionMap`, skip the duplicate entries rather than creating a second sub-group â€” the goal is one "Equipment Time Entry" section, one Mobile toggle.

## Step 4: Model Class Updates

**File:** `apps/api/src/models/EquipmentTimeEntry.ts`

Extend the existing `upsertEquipmentTimeEntry` and `upsertManyEquipmentTimeEntries` methods with hydration + permission enforcement. Do not change the signatures for other callers â€” the new behaviour is internal.

### 3a. Hydrate billing context from EquipmentAssignment on create

When an insert is requested (no `id`) and the caller did not supply `per` / `operatorIncluded` / `isFullDayBilling`, look up an active `EquipmentAssignment` matching the entry's equipment + scope:

```typescript
// Pseudocode inside upsertEquipmentTimeEntry, before write
if (!input.id) {
    const assignment = await prisma.equipmentAssignment.findFirst({
        where: {
            equipmentId: input.equipmentId,
            isDeleted: false,
            OR: [
                // Scoped by job when jobId provided
                input.jobId ? { checkoutJobId: input.jobId } : undefined,
                // Otherwise scoped by operator user
                !input.jobId && input.operatorUserId
                    ? { userId: input.operatorUserId }
                    : undefined
            ].filter(Boolean),
            AND: [
                {
                    OR: [
                        { checkinDateTime: null },
                        { checkinDateTime: { gt: input.workDate } }
                    ]
                }
            ]
        }
    });

    input.per = input.per ?? assignment?.per ?? LEM2_DEFAULT_PER;
    input.operatorIncluded = input.operatorIncluded ?? assignment?.operatorIncluded ?? true;
    input.isFullDayBilling =
        input.isFullDayBilling ?? assignment?.isFullDayBilling ?? (await getJobEquipmentFullDayBilling(input.jobId)) ?? true;
}
```

### 3b. Permission: `EquipmentTimeEntry___OverridePresets`

```typescript
const hasOverrideAccess = hasPermissions(
    { equipmentTimeEntry: { overridePresets: true } },
    ctx.permissions
);
const touchesOverride =
    input.overridePer !== undefined ||
    input.overrideOperatorIncluded !== undefined ||
    input.overrideIsFullDayBilling !== undefined;

if (touchesOverride && !hasOverrideAccess) {
    throw new ForbiddenError(
        "EquipmentTimeEntry___OverridePresets permission required to set override fields."
    );
}
```

Applies on insert AND update â€” a caller without the permission cannot introduce, change, or clear any `override*` value.

### 3c. Permission: `EquipmentTimeEntry___LogTimeToUnassignedEquipment`

```typescript
const hasUnassignedAccess = hasPermissions(
    { equipmentTimeEntry: { logTimeToUnassignedEquipment: true } },
    ctx.permissions
);

if (!hasUnassignedAccess) {
    const hasActiveAssignment = await prisma.equipmentAssignment.count({
        where: {
            equipmentId: input.equipmentId,
            isDeleted: false,
            ...(input.jobId
                ? { checkoutJobId: input.jobId }
                : { userId: input.operatorUserId }),
            OR: [
                { checkinDateTime: null },
                { checkinDateTime: { gt: input.workDate } }
            ]
        }
    });
    if (hasActiveAssignment === 0) {
        throw new ForbiddenError(
            "EquipmentTimeEntry___LogTimeToUnassignedEquipment permission required to log time against equipment with no active assignment for this job/user."
        );
    }
}
```

### 3d. `getEffectiveBillingContext` helper

Add a pure helper that rate resolution and invoicing call instead of reading raw columns:

```typescript
export function getEffectiveBillingContext(entry: EquipmentTimeEntry) {
    return {
        per: entry.overridePer ?? entry.per,
        operatorIncluded: entry.overrideOperatorIncluded ?? entry.operatorIncluded,
        isFullDayBilling: entry.overrideIsFullDayBilling ?? entry.isFullDayBilling
    };
}
```

### 3e. Batch behaviour

`upsertManyEquipmentTimeEntries` applies 3aâ€“3c to every element of the batch. One unauthorized entry rejects the whole batch (do not partially write).
