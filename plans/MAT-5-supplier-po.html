# MAT-5: Supplier PO (CRUD + PDF + Email) — Implementation Plan

## Overview

Create outbound purchase orders to suppliers, generate PDFs, and email to vendor contacts. Uses the shared `PurchaseOrder` model from MAT-1 with `type: SupplierPO`. Line items auto-price from `DistributorPrice` with effective discounts from MAT-9.

**Estimated effort:** 5-7 days
**Risk:** Medium — extends shared PurchaseOrder model, PDF generation, email integration
**Deps:** MAT-0 (supply chain model), MAT-1 (shared PurchaseOrder model), MAT-9 (discount resolution for effective pricing)

---

## Step 1: Extend PurchaseOrder + PurchaseOrderLineItem

### 1a. Supplier PO Fields

Add to PurchaseOrder (or handle via type-specific fields):
- `supplierId` (FK to Company, type=Supplier) — can reuse `companyId` with type=SupplierPO
- `deliveryAddress` (Text)
- `deliveryDate` (DateTime)
- `shippingMethod` (VarChar 100)
- `taxRate` (Decimal 5,2)

### 1b. Extend PurchaseOrderLineItem

Add fields for supply chain linking:
- `manufacturerProductId` (FK to ManufacturerProduct)
- `materialRequestItemId` (optional FK to MaterialRequestItem — traces back to field request)
- `distributorSku` (VarChar 255 — auto-populated from DistributorPrice)

### 1c. Numbering

Supplier POs: SPO-#### auto-sequenced per instance (vs. CPO-#### for Customer POs).

---

## Step 2: Supplier PO Form

**Create:** `apps/frontend/src/components/Forms/SupplierPOForm/`

Form flow:
1. Select distributor (Company type=Supplier)
2. Add line items — shows ManufacturerProducts carried by that distributor
3. Auto-pricing from DistributorPrice with effective discounts (MAT-9 resolution)
4. Auto-populate distributor SKU + manufacturer SKU
5. Delivery address, date, terms, shipping method
6. Save as Draft or Issue

---

## Step 3: PO List Page

**Create:** `apps/frontend/src/pages/purchase-orders/index.tsx`

Combined PO list page filtered by type (Customer PO | Supplier PO | All). Reuses ListTableViews pattern.

---

## Step 4: PDF Generation

**Create:** `apps/frontend/src/components/DownloadablePDF/PurchaseOrder/SupplierPO.tsx`

PDF with:
- Company branding (logo, address)
- PO number, date, terms
- Supplier info (name, contact, address)
- Line items table (material, mfg SKU, dist SKU, qty, unit price, total)
- Subtotal, tax, grand total
- Delivery address + date

---

## Step 5: Email PO to Supplier

Use existing email infrastructure to send PO PDF to supplier contact. Entry point: "Send to Supplier" button on PO detail page.

---

## Step 6: Supplier PO Tab on Company Detail

Add Supplier PO list on Company detail page for Supplier-type companies. Shows all Supplier POs issued to this vendor.

---

## Verification Checklist

- [ ] Create Supplier PO from: Material Requests (batch by distributor), manually, or from Material Orders
- [ ] Pick distributor → line items show ManufacturerProducts → auto-pricing from DistributorPrice with MAT-9 discounts
- [ ] Auto-populate distributor SKU + manufacturer SKU on line items
- [ ] Generate PDF with company branding, line items, terms, delivery address
- [ ] Email PO to supplier contact
- [ ] PO status lifecycle: Draft → Sent → PartiallyReceived → FullyReceived → Closed
- [ ] Supplier PO tab on Company detail page
- [ ] SPO-#### auto-sequenced numbering
- [ ] PO list page with type filter (Customer PO / Supplier PO / All)

---

<script>
(function() {
    var md = document.getElementById('plan-md').textContent;
    var target = document.getElementById('rendered');
    var html = md
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
            return '<pre><code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
        })
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr>');
    html = html.replace(/^- \[ \] (.+)$/gm, '<div class="check-item"><div class="check-box"></div><span>$1</span></div>');
    html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var headers = rows[0].split('|').filter(function(c) { return c.trim(); });
        var isSep = /^[\s|:\-]+$/.test(rows[1]);
        var start = isSep ? 2 : 1;
        var out = '<table><thead><tr>';
        headers.forEach(function(h) { out += '<th>' + h.trim() + '</th>'; });
        out += '</tr></thead><tbody>';
        for (var i = start; i < rows.length; i++) {
            var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
            out += '<tr>'; cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; }); out += '</tr>';
        }
        out += '</tbody></table>';
        return out;
    });
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    html = html.replace(/^(?!<[hultdps\/<]|<\/|<code|<pre|<hr|<div|<strong|<em)(.+)$/gm, '<p>$1</p>');
    target.innerHTML = html;
})();
</script>
