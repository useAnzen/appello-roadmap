# IE-1: ItemizedEstimateChangeOrderRecordLineItem Schema & Model — Implementation Plan

## Overview

Add `ItemizedEstimateChangeOrderRecordLineItem` plus the `EstimateLineItemType` and `PriceReferenceModel` enums to Prisma; wire a `BaseAuditableModel` subclass and thin GraphQL resolver; expose `resolveItemizedLineItemUnitCost` for UI auto-fill. Only relevant when `EstimateChangeOrderRecord.creationType = Itemized` (enum value added by IE-3). Depends on LEM-1 (billable labor rates) and LEM-2 (`EquipmentRateValue` + `resolveEquipmentRate`).

**Estimated effort:** 3-4 days
**Risk:** Low — additive model, no changes to existing records
**Spec:** `tm-work-orders-uis/uis-IE-1-schema-model.html`
**Requires:** SD-1 (`Discount` + `DiscountAssignment`), LEM-1 (`TradeLevelRate` + labor billable-value resolver), LEM-2 (`EquipmentRateValue` + `resolveEquipmentRate`)
**Enables:** IE-2 (editor UI), IE-3 (`Itemized` creationType + totals), IE-5 (invoice conversion)

### Key design decisions (mirrors spec §3)

- **Polymorphic price reference.** Instead of hard FKs to `TradeLevelRate` / `MaterialAttributePrice` / `EquipmentRateValue`, the line item stores `priceReferenceModel` (enum) + `priceReferenceId` (scalar). Extensible to new price sources (subcontractor quotes, vendor POs, job overrides) without future migrations; matches the pattern LEM-2 uses for `EquipmentRateValue.referenceModel` / `referenceId`. **Tradeoffs accepted:** no DB-level FK on `priceReferenceId` (enforced in app code), no Prisma `include` join for the price-source row (GraphQL resolver branches on `priceReferenceModel`).
- **No `instanceId`.** Single-tenant app; add only if multi-tenancy arrives.
- **Price reference points at rate-level rows, not entity-level.** Rates live on `TradeLevelRate.baseValue`, `MaterialAttributePrice.value`, `EquipmentRateValue.baseValue` — not on `TradeLevel` / `Material` / `Equipment`.
- **`userId` stays separate** from the pricing reference — it is Labor worker identity (who), orthogonal to which rate was used (how much). Optional on `Labor` lines; **forbidden** on every other `lineItemType`. When provided on a `Labor` line, the resolver applies that worker's active employee agreement for a billable rate; when absent, it returns the base rate on the `TradeLevelRate`'s contract.
- **Tax surface mirrors `JobBillLineItem`.** Many-to-many `TaxType` relation (supports stacked / compound taxes) + cached `taxValue`. Tax base is `price` (post-markup) — industry standard. `taxValue` is a **write-time snapshot**: recomputed when `price`, markup fields, the `TaxType` set, **or any line-level `DiscountAssignment`** changes; **never** recomputed when a `TaxTypeItem` rate is edited. Preserves estimates as point-in-time documents and makes IE-5 invoice conversion a straight copy. `excludeTax` is intentionally skipped — legacy on `JobBillLineItem` with no active consumers.
- **Sections & subsections via single polymorphic table.** IE-2's canvas has `+ Section` / `+ Sub` nested groupers where sections and priced lines are siblings at any depth. Modeled as one self-referential table with a `nodeType` discriminator (`Section` | `LineItem`) + `parentId`. **Tree depth capped at 3** from the ECR root (pending Corey/Chris confirmation — see spec §3 callout). Section nodes reject every priced/tax/reference field; `parentId` must point at a `Section`. Section rollups (subtotals, numbering) are **computed at read time**, never stored — IE-3 remains the single source of total math.
- **Discounts live in SD-1, not on this model.** Per-line, estimate-level, company-level, and job-level discounts all attach via SD-1's `DiscountAssignment` polymorphic join (`referenceModel = "ItemizedEstimateChangeOrderRecordLineItem"` or `"EstimateChangeOrderRecord"`). IE-1 adds zero discount-related columns; instead, the line's `taxValue` recompute triggers grow by one entry (any line-level `DiscountAssignment` change), and IE-3 consumes discounts for total math.
- **All schema work for itemized estimates is consolidated in IE-1.** The `Itemized` value on `EstimateChangeOrderRecordCreationType` lives here (not in IE-3 as the original roadmap had it) so that every DB-touching change for this feature ships together in one migration. IE-3 becomes frontend + totals engine only. IE-1 also enforces the project-wide "never switch creation types" rule: `canEdit: false` on `EstimateChangeOrderRecord.creationType`, plus a gate validator that rejects `ItemizedEstimateChangeOrderRecordLineItem` writes when the parent ECR is `BidFirst` or `Full`.

## Step 1: Prisma Schema — Enums + Model + Relations

**File:** `apps/api/prisma/schema.prisma`

### 1a. Extend existing enum

Add `Itemized` to the existing `EstimateChangeOrderRecordCreationType` enum. This used to live in IE-3; consolidating here so every schema change for itemized estimates is in one migration.

```prisma
enum EstimateChangeOrderRecordCreationType {
  BidFirst
  Full
  Itemized     // NEW
}
```

### 1b. New enums

```prisma
enum EstimateLineItemType {
  Labor
  Material
  Equipment
  Custom
}

enum PriceReferenceModel {
  TradeLevelRate
  MaterialAttributePrice
  EquipmentRateValue
}

enum LineItemNodeType {
  Section   // grouper only — no price, no tax, no price reference; holds title via `description`
  LineItem  // priced / taxable row
}
```

### 1c. New model

```prisma
model ItemizedEstimateChangeOrderRecordLineItem {
  id                          String                    @id @db.VarChar(21)
  isDeleted                   Boolean                   @default(false)
  isArchived                  Boolean                   @default(false)
  createdAt                   DateTime                  @default(now())
  updatedAt                   DateTime                  @default(now()) @updatedAt

  estimateChangeOrderRecordId String                    @db.VarChar(21)

  // Tree structure — sections and lines share this table; parent chain length
  // from ECR root capped at 3 (Section → Subsection → LineItem). Validated in app code.
  nodeType                    LineItemNodeType          @default(LineItem)
  parentId                    String?                   @db.VarChar(21)

  lineItemType                EstimateLineItemType?     // null on Section nodes

  // Polymorphic price reference — null for Custom, matched pair for other types.
  // Always null on Section nodes.
  // No DB FK on priceReferenceId; integrity enforced in application code (Step 3b).
  priceReferenceModel         PriceReferenceModel?
  priceReferenceId            String?                   @db.VarChar(21)

  // Labor worker identity — independent of pricing.
  userId                      String?                   @db.VarChar(21)

  description                 String?                   @db.VarChar(500)
  quantity                    Decimal?                  @db.Decimal(10, 4)
  unit                        String?                   @db.VarChar(50)
  unitCost                    Decimal?                  @db.Decimal(10, 2)
  totalCost                   Decimal?                  @db.Decimal(10, 2)
  markupPercent               Decimal?                  @db.Decimal(10, 2)
  markupDollarValue           Decimal?                  @db.Decimal(10, 2)
  price                       Decimal?                  @db.Decimal(10, 2)

  // Write-time snapshot of total tax on `price`. Not recomputed when a
  // TaxTypeItem rate changes — the estimate is a point-in-time document.
  taxValue                    Decimal?                  @db.Decimal(10, 2)

  orderNo                     Int                       @default(0)

  EstimateChangeOrderRecord   EstimateChangeOrderRecord @relation(fields: [estimateChangeOrderRecordId], references: [id])
  User                        User?                     @relation(fields: [userId], references: [id])
  TaxType                     TaxType[]                 @relation("ItemizedEstimateLineItemToTaxType")
  Parent                      ItemizedEstimateChangeOrderRecordLineItem?  @relation("NodeTree", fields: [parentId], references: [id], onDelete: NoAction, onUpdate: NoAction)
  Children                    ItemizedEstimateChangeOrderRecordLineItem[] @relation("NodeTree")

  @@index([estimateChangeOrderRecordId], map: "ItemizedEstimateLineItem_ecrId_fkey")
  @@index([userId], map: "ItemizedEstimateLineItem_userId_fkey")
  @@index([priceReferenceModel, priceReferenceId], map: "ItemizedEstimateLineItem_priceRef_idx")
  @@index([parentId], map: "ItemizedEstimateLineItem_parentId_fkey")
}
```

### 3b. Write-side validation (paying back the missing DB FK)

Invoke from any create/edit path. This replaces the DB-level FK on `priceReferenceId`.

```typescript
private static readonly priceReferenceDelegate = {
    TradeLevelRate: prisma.tradeLevelRate,
    MaterialAttributePrice: prisma.materialAttributePrice,
    EquipmentRateValue: prisma.equipmentRateValue
} as const;

private static readonly lineTypeToReferenceModel: Record<
    Exclude<EstimateLineItemType, "Custom">,
    PriceReferenceModel
> = {
    Labor: "TradeLevelRate",
    Material: "MaterialAttributePrice",
    Equipment: "EquipmentRateValue"
};

/**
 * @param existing — pass the already-persisted row when validating an edit.
 *                   `canEdit: false` strips `nodeType` / `lineItemType` from
 *                   the edit payload, so those values must be resolved from
 *                   the existing record for the shape rules to fire correctly.
 */
public async validatePayload(
    input: Partial<IItemizedEstimateChangeOrderRecordLineItem>,
    existing?: IItemizedEstimateChangeOrderRecordLineItem
): Promise<void> {
    const {
        nodeType = existing?.nodeType ?? "LineItem",
        parentId,
        lineItemType = existing?.lineItemType ?? undefined,
        priceReferenceModel,
        priceReferenceId,
        userId,
        quantity,
        unit,
        unitCost,
        totalCost,
        markupPercent,
        markupDollarValue,
        price,
        taxValue,
        estimateChangeOrderRecordId
    } = input;

    // 0a. Section nodes: reject every priced/tax/reference field.
    if (nodeType === "Section") {
        const forbidden: Array<[string, unknown]> = [
            ["lineItemType", lineItemType],
            ["priceReferenceModel", priceReferenceModel],
            ["priceReferenceId", priceReferenceId],
            ["userId", userId],
            ["quantity", quantity],
            ["unit", unit],
            ["unitCost", unitCost],
            ["totalCost", totalCost],
            ["markupPercent", markupPercent],
            ["markupDollarValue", markupDollarValue],
            ["price", price],
            ["taxValue", taxValue]
        ];
        const offender = forbidden.find(([, v]) => v != null);
        if (offender) {
            throw new BadUserInputError(
                `Section nodes must not set ${offender[0]}.`
            );
        }
        // Sections require a title (stored in description).
        if (!input.description?.trim()) {
            throw new BadUserInputError("Section nodes require a title (description).");
        }
        // Parent / depth checks (0b) still run below.
        await this.validateParentAndDepth(parentId, nodeType, estimateChangeOrderRecordId);
        return;
    }

    // 0b. LineItem nodes: parent must be a Section on the same ECR, and depth cap holds.
    await this.validateParentAndDepth(parentId, nodeType, estimateChangeOrderRecordId);

    if (!lineItemType) {
        throw new BadUserInputError("lineItemType is required on LineItem nodes.");
    }

    // 1. Null-shape
    if (lineItemType === "Custom") {
        if (priceReferenceModel || priceReferenceId) {
            throw new BadUserInputError(
                "Custom line items must not set priceReferenceModel or priceReferenceId."
            );
        }
        return;
    }
    if (!priceReferenceModel || !priceReferenceId) {
        throw new BadUserInputError(
            "Non-Custom line items require both priceReferenceModel and priceReferenceId."
        );
    }

    // 2. Type ↔ model map
    const expected =
        ItemizedEstimateChangeOrderRecordLineItem.lineTypeToReferenceModel[
            lineItemType as Exclude<EstimateLineItemType, "Custom">
        ];
    if (priceReferenceModel !== expected) {
        throw new BadUserInputError(
            `lineItemType=${lineItemType} requires priceReferenceModel=${expected}, got ${priceReferenceModel}.`
        );
    }

    // 3. userId is Labor-only (never required, but never allowed elsewhere)
    if (userId && lineItemType !== "Labor") {
        throw new BadUserInputError(
            `userId is only permitted on Labor line items; got lineItemType=${lineItemType}.`
        );
    }

    // 4a. Creation-type gate — parent ECR must be Itemized.
    // Blocks writes against Full / BidFirst records at the earliest layer.
    if (estimateChangeOrderRecordId) {
        const parent = await prisma.estimateChangeOrderRecord.findFirst({
            where: { id: estimateChangeOrderRecordId, isDeleted: false, isArchived: false },
            select: { creationType: true }
        });
        if (!parent) {
            throw new BadUserInputError(
                `estimateChangeOrderRecordId ${estimateChangeOrderRecordId} does not resolve.`
            );
        }
        if (parent.creationType !== "Itemized") {
            throw new BadUserInputError(
                `ItemizedEstimateChangeOrderRecordLineItem can only attach to ECRs with creationType = Itemized (got ${parent.creationType}).`
            );
        }
    }

    // 4b. Existence check — id resolves to a live row in the right table
    // (falls through to delegate lookup below)
    const delegate =
        ItemizedEstimateChangeOrderRecordLineItem.priceReferenceDelegate[priceReferenceModel];
    // eslint-disable-next-line @typescript-eslint/no-explicit-any
    const exists = await (delegate as any).findFirst({
        where: { id: priceReferenceId, isDeleted: false, isArchived: false },
        select: { id: true }
    });
    if (!exists) {
        throw new BadUserInputError(
            `priceReferenceId ${priceReferenceId} does not resolve in ${priceReferenceModel}.`
        );
    }
}
```

**Extensibility:** new price source later = one entry in `priceReferenceDelegate`, one entry in `lineTypeToReferenceModel`, one enum value. No rewrite.

### Tree validation helper

```typescript
private static readonly MAX_TREE_DEPTH = 3; // ECR root → Section → Subsection → LineItem
// Bump this constant if product confirms a deeper hierarchy.

private async validateParentAndDepth(
    parentId: string | null | undefined,
    nodeType: LineItemNodeType,
    estimateChangeOrderRecordId: string | undefined
): Promise<void> {
    if (!parentId) return; // root-level node is always fine

    const parent = await this.prisma.findFirst({
        where: { id: parentId, isDeleted: false, isArchived: false },
        select: { id: true, nodeType: true, parentId: true, estimateChangeOrderRecordId: true }
    });
    if (!parent) {
        throw new BadUserInputError(`parentId ${parentId} does not resolve to a live node.`);
    }
    if (parent.nodeType !== "Section") {
        throw new BadUserInputError("parentId must reference a Section node.");
    }
    if (
        estimateChangeOrderRecordId &&
        parent.estimateChangeOrderRecordId !== estimateChangeOrderRecordId
    ) {
        throw new BadUserInputError("parentId must belong to the same EstimateChangeOrderRecord.");
    }

    // Walk up the ancestor chain to enforce the depth cap.
    // Depth 1 = direct child of ECR root, Depth N = N-levels deep.
    // We're about to insert a child of `parent`, so the new depth = parent.depth + 1.
    let depth = 1;
    let cursor: { parentId: string | null } | null = { parentId: parent.parentId };
    while (cursor?.parentId) {
        depth += 1;
        if (depth >= ItemizedEstimateChangeOrderRecordLineItem.MAX_TREE_DEPTH) {
            // Reading the new node's depth = depth + 1; stop before exceeding cap.
            throw new BadUserInputError(
                `Tree depth cap (${ItemizedEstimateChangeOrderRecordLineItem.MAX_TREE_DEPTH}) exceeded.`
            );
        }
        const next = await this.prisma.findUnique({
            where: { id: cursor.parentId },
            select: { parentId: true }
        });
        cursor = next;
    }
}
```

### 3c. Pricing resolution

```typescript
public async resolveUnitCost(input: {
    estimateChangeOrderRecordId: string;
    lineItemType: EstimateLineItemType;
    priceReferenceModel: PriceReferenceModel | null;
    priceReferenceId: string | null;
    userId: string | null;
    quantity: number | null;
    unit: string | null;
}): Promise<number | null> {
    switch (input.lineItemType) {
        case "Labor": {
            if (!input.priceReferenceId) return null;
            const rate = await prisma.tradeLevelRate.findFirstOrThrow({
                where: {
                    id: input.priceReferenceId,
                    isDeleted: false,
                    isArchived: false
                },
                select: { id: true }
            });
            // LEM-1: if userId is present, apply that worker's active employee agreement
            // to derive the billable rate. If absent, fall back to the base rate from the
            // contract attached to the TradeLevelRate. Delegates to the same service
            // used by timesheets — do not inline the logic here.
            return resolveLaborBillableValue({
                userId: input.userId ?? null,
                tradeLevelRateId: rate.id
            });
        }
        case "Equipment": {
            if (!input.priceReferenceId) return null;
            await prisma.equipmentRateValue.findFirstOrThrow({
                where: {
                    id: input.priceReferenceId,
                    isDeleted: false,
                    isArchived: false
                },
                select: { id: true }
            });
            // LEM-2: resolver handles period conversion (HOUR/DAY/WEEK/…).
            return resolveEquipmentRate({
                equipmentRateValueId: input.priceReferenceId,
                unit: input.unit
            });
        }
        case "Material": {
            if (!input.priceReferenceId) return null;
            const price = await prisma.materialAttributePrice.findFirstOrThrow({
                where: {
                    id: input.priceReferenceId,
                    isDeleted: false,
                    isArchived: false
                },
                select: { value: true }
            });
            // LEM-3 tiered pricing (by quantity) folded in here once that service lands;
            // interim: return the stored cell value directly.
            return price.value?.toNumber() ?? null;
        }
        case "Custom":
            return null;
    }
}
```

> **Resolver dependencies.** `resolveLaborBillableValue` (LEM-1) and `resolveEquipmentRate` (LEM-2) must exist before IE-1 ships. If a dependency is not yet available, stub with `return null` and add a `// TODO: LEM-X` comment — do **not** silently fall back to entity-level lookups (`TradeLevel`, `Equipment`, `Material`), which would contradict the polymorphic design decision.

### 3d. Tax helpers + recompute

Follows the `JobBillLineItem.ts` pattern exactly — `taxTypeIds` is stripped from the base payload and applied via `connectTaxTypes` / `disconnectTaxTypes` helpers after the base write. `taxValue` is recomputed in the same step.

```typescript
public async connectTaxTypes(
    id: string,
    taxTypeIds: string[],
    _currentUserId: string
): Promise<void> {
    await this.prisma.update({
        where: { id },
        data: { TaxType: { connect: taxTypeIds.map((id) => ({ id })) } }
    });
}

public async disconnectTaxTypes(
    id: string,
    taxTypeIds: string[],
    _currentUserId: string
): Promise<void> {
    await this.prisma.update({
        where: { id },
        data: { TaxType: { disconnect: taxTypeIds.map((id) => ({ id })) } }
    });
}

/**
 * Write-time tax snapshot.
 *
 * Base = line.price (industry standard — tax on post-markup sell). Loops
 * the connected TaxTypes, picks the most recent TaxTypeItem whose
 * effectiveDate <= now, and stacks compound taxes per the same ordering
 * rule JobBillLineItem uses at invoice time.
 *
 * Intentional non-behavior: this is never called when a TaxTypeItem rate
 * is edited — the estimate stays pinned to the rate that was effective
 * when it was saved.
 */
public async recomputeTaxValue(id: string, _currentUserId: string): Promise<void> {
    const line = await this.prisma.findUniqueOrThrow({
        where: { id },
        select: {
            price: true,
            TaxType: {
                where: { isDeleted: false, isArchived: false },
                select: {
                    id: true,
                    isCompound: true,
                    TaxTypeItem: {
                        where: { isDeleted: false, isArchived: false, effectiveDate: { lte: new Date() } },
                        orderBy: { effectiveDate: "desc" },
                        take: 1,
                        select: { rate: true }
                    }
                }
            }
        }
    });

    if (!line.price) {
        await this.prisma.update({ where: { id }, data: { taxValue: null } });
        return;
    }

    const base = line.price.toNumber();
    let running = base;
    let totalTax = 0;
    for (const t of line.TaxType) {
        const rate = t.TaxTypeItem[0]?.rate?.toNumber();
        if (rate == null) continue;
        const taxed = t.isCompound ? running * (rate / 100) : base * (rate / 100);
        totalTax += taxed;
        if (t.isCompound) running += taxed;
    }
    await this.prisma.update({
        where: { id },
        data: { taxValue: totalTax }
    });
}

/** Convenience wrapper used by resolvers. */
public async createItemWithTax(
    data: Partial<IItemizedEstimateChangeOrderRecordLineItem & { taxTypeIds: string[] }>,
    currentUserId: string
) {
    const { taxTypeIds, ...rest } = data;
    const record = await this.createItem(rest, currentUserId);
    if (taxTypeIds?.length) {
        await this.connectTaxTypes(record.id, taxTypeIds, currentUserId);
    }
    await this.recomputeTaxValue(record.id, currentUserId);
    return this.getItem(record.id);
}

public async editItemWithTax(
    id: string,
    data: Partial<IItemizedEstimateChangeOrderRecordLineItem & { taxTypeIds: string[] }>,
    currentUserId: string
) {
    const { taxTypeIds, ...rest } = data;
    const record = await this.editItem(id, rest, currentUserId);
    if (taxTypeIds) {
        const existing = await this.prisma.findUniqueOrThrow({
            where: { id },
            select: { TaxType: { select: { id: true } } }
        });
        const existingIds = existing.TaxType.map((t) => t.id);
        const toConnect = taxTypeIds.filter((id) => !existingIds.includes(id));
        const toDisconnect = existingIds.filter((id) => !taxTypeIds.includes(id));
        if (toConnect.length) await this.connectTaxTypes(id, toConnect, currentUserId);
        if (toDisconnect.length) await this.disconnectTaxTypes(id, toDisconnect, currentUserId);
    }
    await this.recomputeTaxValue(id, currentUserId);
    return this.getItem(record.id);
}
```

> **Snapshot invariant.** `recomputeTaxValue` is called from create/edit paths only. Do not wire it to `TaxTypeItem` change events. If business later needs "restamp a whole estimate to today's rates," that's a deliberate action (new revision), not automatic.

## Handoff notes to IE-2

- **Spec contract.** `tm-work-orders-uis/uis-IE-1-schema-model.html` §3's field-to-column matrix and example-rows-per-type are the contract IE-2 binds against. Keep them in lockstep with any post-merge Prisma rename.
- **Resolver input per line type** (for `ResolveItemizedLineItemUnitCostInput`):
    - **Labor:** `lineItemType=Labor`, `priceReferenceModel=TradeLevelRate`, `priceReferenceId`; optional `userId` (Labor-only; applies the worker's agreement when present, otherwise falls back to the contract base rate).
    - **Material:** `lineItemType=Material`, `priceReferenceModel=MaterialAttributePrice`, `priceReferenceId`; optional `quantity` for tiered pricing.
    - **Equipment:** `lineItemType=Equipment`, `priceReferenceModel=EquipmentRateValue`, `priceReferenceId`, `unit` (hr/day/…).
    - **Custom:** resolver not called; UI sends manual `unitCost`.
- **Creation-type gate.** Lives in `validatePayload` (Step 3b, rule 4a) — rejects line item writes against non-`Itemized` ECRs. Paired with the `canEdit: false` on `EstimateChangeOrderRecord.creationType` (Step 3e) that prevents a saved `Itemized` ECR from ever being flipped back to `Full` / `BidFirst`. No IE-3 hand-off needed anymore — IE-1 is self-sufficient on the schema side.
- **Tree rollups belong to IE-3.** Section subtotals, numbered row labels, and the grand-total rollup are **computed at read time**, not stored on `Section` rows. IE-3's totals panel is the canonical owner of that math. IE-1 exposes the raw tree via `itemizedEstimateChangeOrderRecordLineItems`; the consumer traverses `parentId`.
- **Open question for product (see spec §3 callout).** Tree depth is currently capped at 3 (`Section → Subsection → LineItem`). If Corey / Chris relax this, bump `MAX_TREE_DEPTH` in the model — no other code changes required.
- **Discount hook (SD-1 integration).** Line-level and estimate-level discounts are SD-1's `DiscountAssignment` rows, **not** fields on this model. When the model's create/edit path completes, if the caller provided discount data (e.g., IE-2's inline ad-hoc %) the resolver then calls SD-1's `createAdHocDiscountAndAttach` or `attachDiscount`. `recomputeTaxValue` must be invoked whenever a line-level `DiscountAssignment` is added / edited / removed; wire this via a post-commit hook in SD-1's mutations (SD-1's plan §3b has the seam — after `DiscountAssignment.create`/`edit`/`delete` where `referenceModel = "ItemizedEstimateChangeOrderRecordLineItem"`, call back into `ItemizedEstimateChangeOrderRecordLineItem.recomputeTaxValue`).
