# MAT-6: Receiving Workflow + Three-Way Match — Implementation Plan

## Overview

Receive deliveries against Supplier POs, track partial/complete receipts, and provide three-way match visibility (PO quantity vs. received quantity vs. supplier invoice amount). Two new models: `PurchaseOrderReceipt` and `ReceiptLineItem`.

**Estimated effort:** 4-5 days
**Risk:** Medium — new models, PO status auto-transitions, three-way match logic
**Deps:** MAT-5 (Supplier PO must exist)

---

## Step 1: Prisma Schema

### 1a. PurchaseOrderReceipt

```prisma
model PurchaseOrderReceipt {
  id                String        @id @db.VarChar(21)
  isDeleted         Boolean       @default(false)
  createdAt         DateTime      @default(now())
  updatedAt         DateTime      @default(now()) @updatedAt

  purchaseOrderId   String        @db.VarChar(21)
  PurchaseOrder     PurchaseOrder @relation(fields: [purchaseOrderId], references: [id])

  receivedByUserId  String        @db.VarChar(21)
  receivedDate      DateTime
  packingSlipNumber String?       @db.VarChar(100)
  notes             String?       @db.Text
  status            String        @db.VarChar(50)

  LineItems         ReceiptLineItem[]

  @@index([purchaseOrderId, isDeleted])
}
```

Const-based statuses:
```typescript
export const RECEIPT_STATUSES = ["Partial", "Complete"] as const;
```

### 1b. ReceiptLineItem

```prisma
model ReceiptLineItem {
  id                        String               @id @db.VarChar(21)
  isDeleted                 Boolean              @default(false)
  createdAt                 DateTime             @default(now())
  updatedAt                 DateTime             @default(now()) @updatedAt

  receiptId                 String               @db.VarChar(21)
  Receipt                   PurchaseOrderReceipt @relation(fields: [receiptId], references: [id])

  purchaseOrderLineItemId   String               @db.VarChar(21)
  PurchaseOrderLineItem     PurchaseOrderLineItem @relation(fields: [purchaseOrderLineItemId], references: [id])

  receivedQty               Decimal              @db.Decimal(10, 2)
  damagedQty                Decimal?             @db.Decimal(10, 2)
  notes                     String?              @db.Text

  @@index([receiptId, isDeleted])
}
```

### 1c. Extend PurchaseOrderLineItem

Add tracking fields:
- `receivedQty` (Decimal 10,2 — total received across all receipts)
- `backOrderQty` (Decimal 10,2 — ordered minus received)

---

## Step 2: Model + GraphQL

**Create:** `apps/api/src/models/PurchaseOrderReceipt.ts`, `apps/api/src/graphql/models/PurchaseOrderReceipt.ts`

Key methods:
- `receiveAgainstPO(purchaseOrderId, lineItems)`: Create receipt, update line item received quantities
- `calculateReceivedTotals(purchaseOrderId)`: Sum received quantities across all receipts per line item
- Auto-transition PO status: Sent → PartiallyReceived → FullyReceived based on receipt totals

---

## Step 3: Frontend — Receiving Form

**Create:** `apps/frontend/src/components/Receiving/ReceivingForm.tsx`

Receive against PO:
- Select PO (or navigate from PO detail)
- Line items table showing: ordered qty, previously received, receiving now, damaged
- Packing slip number entry
- Notes per line item
- Submit creates PurchaseOrderReceipt + ReceiptLineItems

---

## Step 4: Three-Way Match View

Add to PO detail page — "Receiving" tab:
- Table: Line Item | Ordered | Received | Back-Ordered | Invoiced (from future AP integration)
- Visual indicators: green (fully received), yellow (partial), red (back-ordered)
- Receipt history log with dates, packing slips, receiving user

---

## Step 5: P&L Integration (Cross-Cutting Update #2)

**File:** `apps/api/src/services/JobFinancialSummaryService.ts`

Add Supplier PO committed costs:
- Open Supplier PO amounts (ordered but not yet received/expensed) as "committed" column
- Received amounts feed material cost actuals

---

## Verification Checklist

- [ ] Receive against PO: mark line items received (full/partial/damaged)
- [ ] Three-way match: PO qty vs. received qty vs. supplier invoice amount
- [ ] Back-order tracking: unfulfilled quantities flagged
- [ ] Receipt history on PO detail page
- [ ] PO status auto-transitions: Sent → PartiallyReceived → FullyReceived
- [ ] PurchaseOrderLineItem.receivedQty and backOrderQty updated on receipt
- [ ] Committed material costs appear in Job Financial Summary
- [ ] Packing slip number captured per receipt

<script>
(function() {
    var md = document.getElementById('plan-md').textContent;
    var target = document.getElementById('rendered');
    var html = md
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
            return '<pre><code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
        })
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr>');
    html = html.replace(/^- \[ \] (.+)$/gm, '<div class="check-item"><div class="check-box"></div><span>$1</span></div>');
    html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var headers = rows[0].split('|').filter(function(c) { return c.trim(); });
        var isSep = /^[\s|:\-]+$/.test(rows[1]);
        var start = isSep ? 2 : 1;
        var out = '<table><thead><tr>';
        headers.forEach(function(h) { out += '<th>' + h.trim() + '</th>'; });
        out += '</tr></thead><tbody>';
        for (var i = start; i < rows.length; i++) {
            var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
            out += '<tr>'; cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; }); out += '</tr>';
        }
        out += '</tbody></table>';
        return out;
    });
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    html = html.replace(/^(?!<[hultdps\/<]|<\/|<code|<pre|<hr|<div|<strong|<em)(.+)$/gm, '<p>$1</p>');
    target.innerHTML = html;
})();
</script>
