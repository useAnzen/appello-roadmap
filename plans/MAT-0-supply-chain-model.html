# MAT-0: Three-Level Supply Chain Model — Implementation Plan

## Overview

Create the foundational three-level supply chain data model that connects manufacturers and distributors to products. Without this, Price Book Import, Supplier POs, and supplier-aware pricing cannot function.

**Estimated effort:** 5-7 days
**Risk:** Medium — 2 new models, new Company type seed, frontend tabs on Company + Material detail pages
**Deps:** None (ROOT — enables everything downstream)

---

## Step 1: Prisma Schema — 2 New Models + Seed

### 1a. ManufacturerProduct

**File:** `apps/api/prisma/schema.prisma`

```prisma
model ManufacturerProduct {
  id                String   @id @db.VarChar(21)
  isDeleted         Boolean  @default(false)
  isArchived        Boolean  @default(false)
  createdAt         DateTime @default(now())
  updatedAt         DateTime @default(now()) @updatedAt

  materialId        String   @db.VarChar(21)
  Material          Material @relation(fields: [materialId], references: [id])

  manufacturerId    String   @db.VarChar(21)
  Manufacturer      Company  @relation("ManufacturerProducts", fields: [manufacturerId], references: [id])

  manufacturerSku   String   @db.VarChar(255)
  msrp              Decimal? @db.Decimal(10, 2)
  upc               String?  @db.VarChar(50)
  description       String?  @db.Text
  packageQty        Decimal? @db.Decimal(10, 2)
  packageUnit       String?  @db.VarChar(50)
  isActive          Boolean  @default(true)

  DistributorPrices DistributorPrice[]

  @@unique([materialId, manufacturerId, manufacturerSku])
  @@index([materialId, isDeleted])
  @@index([manufacturerId, isDeleted])
}
```

### 1b. DistributorPrice

```prisma
model DistributorPrice {
  id                      String              @id @db.VarChar(21)
  isDeleted               Boolean             @default(false)
  isArchived              Boolean             @default(false)
  createdAt               DateTime            @default(now())
  updatedAt               DateTime            @default(now()) @updatedAt

  manufacturerProductId   String              @db.VarChar(21)
  ManufacturerProduct     ManufacturerProduct @relation(fields: [manufacturerProductId], references: [id])

  distributorId           String              @db.VarChar(21)
  Distributor             Company             @relation("DistributorPrices", fields: [distributorId], references: [id])

  distributorSku          String              @db.VarChar(255)
  unitPrice               Decimal             @db.Decimal(10, 2)
  listPrice               Decimal?            @db.Decimal(10, 2)
  discountPercent         Decimal?            @db.Decimal(5, 2)
  effectiveFrom           DateTime?
  effectiveTo             DateTime?
  minQty                  Int?
  leadTimeDays            Int?
  isPreferred             Boolean             @default(false)
  isInStock               Boolean?
  notes                   String?             @db.Text

  @@unique([manufacturerProductId, distributorId, distributorSku])
  @@index([distributorId, isDeleted])
  @@index([manufacturerProductId, isDeleted])
}
```

### 1c. Seed: "Manufacturer" Company Type

```sql
INSERT INTO PropertyValue (id, propertyName, propertyNameLabel, label, slug, orderNo, isDeleted, isArchived, createdAt, updatedAt)
VALUES (nanoid(), 'company type', 'Company Type', 'Manufacturer', 'company-type-manufacturer', 5, false, false, NOW(), NOW());

INSERT INTO CompanyPayableType (propertyValueId, AccountPayable, AccountReceivable)
VALUES (<manufacturer_pv_id>, false, false);
```

### 1d. Relations on existing models

```prisma
// On Company:
ManufacturerProducts    ManufacturerProduct[]  @relation("ManufacturerProducts")
DistributorPrices       DistributorPrice[]     @relation("DistributorPrices")

// On Material:
ManufacturerProducts    ManufacturerProduct[]

// On MaterialOrder (optional FKs):
distributorId           String?  @db.VarChar(21)
Distributor             Company? @relation("MaterialOrderDistributor", fields: [distributorId], references: [id])
```

### 1e. Migration

Create migration with `pnpm --filter api prisma:migrate` named `add_supply_chain_model`.

## Step 2: Model Classes

### 2a. ManufacturerProduct Model

**Create file:** `apps/api/src/models/ManufacturerProduct.ts`

Standard BaseModel with modelFields: `materialId` (required, filterable), `manufacturerId` (required, filterable), `manufacturerSku` (required), `msrp` (float), `upc`, `description`, `packageQty` (float), `packageUnit`, `isActive` (boolean).

### 2b. DistributorPrice Model

**Create file:** `apps/api/src/models/DistributorPrice.ts`

Standard BaseModel with modelFields: `manufacturerProductId` (required, filterable), `distributorId` (required, filterable), `distributorSku` (required), `unitPrice` (float, required), `listPrice` (float), `discountPercent` (float), `effectiveFrom` (date), `effectiveTo` (date), `minQty` (int), `leadTimeDays` (int), `isPreferred` (boolean), `isInStock` (boolean), `notes`.

---

## Step 3: GraphQL Resolvers

### 3a. ManufacturerProduct Resolver

**Create file:** `apps/api/src/graphql/models/ManufacturerProduct.ts`

```graphql
type ManufacturerProduct {
    id: ID!
    materialId: String!
    Material: Material
    manufacturerId: String!
    Manufacturer: Company
    manufacturerSku: String!
    msrp: Float
    upc: String
    description: String
    packageQty: Float
    packageUnit: String
    isActive: Boolean!
    DistributorPrices: [DistributorPrice!]
}

input CreateManufacturerProductInput {
    materialId: String!
    manufacturerId: String!
    manufacturerSku: String!
    msrp: Float
    upc: String
    description: String
    packageQty: Float
    packageUnit: String
}

extend type Query {
    manufacturerProducts(materialId: String, manufacturerId: String): [ManufacturerProduct!]!
    manufacturerProduct(id: ID!): ManufacturerProduct
}

extend type Mutation {
    createManufacturerProduct(input: CreateManufacturerProductInput!): ManufacturerProduct!
    editManufacturerProduct(id: ID!, input: CreateManufacturerProductInput!): ManufacturerProduct!
    deleteManufacturerProduct(id: ID!): Boolean!
}
```

### 3b. DistributorPrice Resolver

**Create file:** `apps/api/src/graphql/models/DistributorPrice.ts`

Similar pattern with type, inputs, queries (by manufacturerProductId, by distributorId), and CRUD mutations.

### 3c. Register in schema.ts

**File:** `apps/api/src/graphql/schema.ts`

Add both resolvers: import, type resolvers, Query, Mutation, typeDefs.

## Step 4: Frontend — Company Detail Tabs

### 4a. Manufacturer Products Tab

**Create file:** `apps/frontend/src/components/DetailsPage/CompanyDetailsPage/Tabs/ManufacturerProducts.tsx`

Table of ManufacturerProduct rows where `manufacturerId` = this company.
Columns: Material (link), Manufacturer SKU, MSRP, Package Qty, Active.
Actions: Link Product (Material catalog picker), Edit, Deactivate.

### 4b. Distributor Pricing Tab

**Create file:** `apps/frontend/src/components/DetailsPage/CompanyDetailsPage/Tabs/DistributorPricing.tsx`

Table of DistributorPrice rows where `distributorId` = this company.
Columns: Material, Manufacturer, Mfg SKU, Dist SKU, Unit Price, List Price, Discount %, Lead Time, Preferred, Effective Dates.
Actions: Add Product, Import Price Book, Edit, Remove.

### 4c. Register tabs conditionally

**File:** `apps/frontend/src/components/DetailsPage/CompanyDetailsPage/index.tsx`

Show "Products" tab for Manufacturer-type companies, "Products & Pricing" tab for Supplier-type companies. Use company type from `companyTypeId` PropertyValue lookup.

(function() {
    var md = document.getElementById('plan-md').textContent;
    var target = document.getElementById('rendered');
    var html = md
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
            return '<pre><code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
        })
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr>');
    html = html.replace(/^- \[ \] (.+)$/gm, '<div class="check-item"><div class="check-box"></div><span>$1</span></div>');
    html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var headers = rows[0].split('|').filter(function(c) { return c.trim(); });
        var isSep = /^[\s|:\-]+$/.test(rows[1]);
        var start = isSep ? 2 : 1;
        var out = '<table><thead><tr>';
        headers.forEach(function(h) { out += '<th>' + h.trim() + '</th>'; });
        out += '</tr></thead><tbody>';
        for (var i = start; i < rows.length; i++) {
            var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
            out += '<tr>'; cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; }); out += '</tr>';
        }
        out += '</tbody></table>';
        return out;
    });
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    html = html.replace(/^(?!<[hultdps\/<]|<\/|<code|<pre|<hr|<div|<strong|<em)(.+)$/gm, '<p>$1</p>');
    target.innerHTML = html;
})();
</script>
