# WO-10: WO â†’ Change Order Conversion â€” Implementation Plan

## Overview

Convert an Approved Work Order's line items into a Change Order (`EstimateChangeOrderRecord` of type `ChangeOrder`). Extracted from the original WO-7 so it can be delivered after we confirm how CO creation from a WO fits into existing estimate/billing/progress-report workflows.

**Assumption:** One CO per Work Order. When the Job's `jobClassification` is `"WorkOrder"`, the Job's `id` acts as the `sourceWorkOrderJobId` for detection purposes (the generated CO is linked via `jobId`).

**Depends on:** WO-7 (ships the shared `resolveWorkOrderLineItems` helper and the generic `WOConversionConfirmModal`)

**Estimated effort:** 2-3 days
**Risk:** Medium â€” modifies `EstimateChangeOrderRecordValue` schema and touches the EstimateChangeOrderDetails UI
**Spec:** `tm-work-orders-uis/uis-20g-conversion.html`

<div class="callout warn">
<strong>Open questions to resolve before starting:</strong>
<ul>
<li>How does a WO-generated CO interact with existing estimate/progress-report workflows? (CO rollups into Job value, progress reporting, change-order approvals pipeline.)</li>
<li>What status should the generated CO start in â€” <code>won</code> (committed work, the assumption in the original plan) or a pending/review status?</li>
<li>Should the Job's <code>bid</code> / value roll up the generated CO automatically (<code>includeInJobValue</code> default)?</li>
<li>Do we want a real FK on <code>EstimateChangeOrderRecord</code> like <code>sourceWorkOrderJobId</code> for clearer reporting, or is the <code>jobId</code>-and-classification heuristic sufficient?</li>
</ul>
</div>

## Step 1: Schema â€” Make accountItemId Nullable

**File:** `apps/api/prisma/schema.prisma`

```prisma

AccountItem      AccountItem? @relation(fields: [accountItemId], references: [id])
```

**Migration:** new file under `apps/api/prisma/migrations/NNNN_eco_record_value_account_item_nullable/migration.sql`

```sql

Backward compatible â€” existing records all have `accountItemId` set. Only WO-generated CO line items will have null.

## Step 2: convertWorkOrderToChangeOrder Mutation

Reuses the shared `resolveWorkOrderLineItems` helper from WO-7.

**File:** `apps/api/src/models/EstimateChangeOrderRecord.ts`

```typescript
public async convertWorkOrderToChangeOrder(
    jobId: string,
    currentUserId: string
): Promise<FullModel<IEstimateChangeOrderRecord>> {
    const job = await prisma.job.findUnique({
        where: { id: jobId },
        include: { jobStatus: true, jobType: true }
    });
    // ... validate job.jobStatus?.slug === "approved"
    // ... validate job.jobType?.jobClassification === "WorkOrder"

    // Guard: one CO per WO
    const existingCO = await prisma.estimateChangeOrderRecord.findFirst({
        where: { jobId, type: "ChangeOrder", isDeleted: false }
    });
    if (existingCO) {
        throw new Error("A Change Order has already been generated for this Work Order.");
    }

    // Resolve all line items using the shared helper from WO-7
    const resolvedItems = await resolveWorkOrderLineItems(jobId);

    // Calculate total bid â€” the final dollar value presented to the client
    const totalBid = resolvedItems.reduce((sum, item) => sum + item.value, 0);

    // Generate CO number (existing helper on EstimateChangeOrderRecord model)
    const estimateNumber = await this.generateEstimateNumber(jobId, "ChangeOrder");

    // TBD: starting status â€” see open questions. Using "won" for now.
    const wonStatus = await prisma.propertyValue.findFirst({
        where: { propertyName: "estimateChangeOrderRecordStatus", slug: "won" }
    });

    const co = await this.createItem(
        {
            type: "ChangeOrder",
            title: `Work Order ${job?.fullJobNumber ?? ""}`.trim(),
            description: `Generated from Work Order ${job?.fullJobNumber ?? ""}`.trim(),
            estimateNumber,
            fullEstimateNumber: estimateNumber,
            jobId,
            statusId: wonStatus?.id,
            bid: totalBid,
            lineItemsTurnedOn: true,
            creationType: "Full"
        },
        currentUserId
    );

    for (const item of resolvedItems) {
        await prisma.estimateChangeOrderRecordValue.create({
            data: {
                id: nanoid(),
                estimateChangeOrderRecordId: co.id,
                description: item.description,
                estimate: item.value,
                numeric: item.numericHours,
                accountItemId: null  // no account hierarchy for WO-generated COs
            }
        });
    }

    return co;
}
```

### GraphQL

**File:** `apps/api/src/graphql/models/EstimateChangeOrderRecord.ts`

```graphql
extend type Mutation {
    convertWorkOrderToChangeOrder(jobId: ID!): EstimateChangeOrderRecord
}
```

Thin resolver â€” delegates to `new EstimateChangeOrderRecordModel().convertWorkOrderToChangeOrder(jobId, userId)`.

## Step 3: Update EstimateChangeOrderDetails for Null accountItemId

**File:** `apps/frontend/src/components/DetailsPage/EstimateChangeOrderDetails/` (or wherever the CO detail renders line items)

The CO detail page currently groups line items by AccountItem in a hierarchy. When `accountItemId` is null (WO-generated COs), it needs a fallback flat-table rendering.

### Approach

Check if ANY line item on the CO has `accountItemId = null`. If so, render all line items as a flat table instead of the account hierarchy:

```typescript
const hasAccountlessItems = lineItems.some((item) => !item.accountItemId);

if (hasAccountlessItems) {
    // Flat table: Description | Estimate ($) | Hours
    return <FlatLineItemTable lineItems={lineItems} />;
} else {
    // Existing account hierarchy rendering
    return <AccountHierarchyView lineItems={lineItems} />;
}
```

The flat table shows:
- Description column (from `description`)
- Estimate column (from `estimate` â€” dollar value)
- Hours column (from `numeric` â€” only shown if > 0, blank for materials)

This is a minimal change â€” the existing hierarchy view continues to work for all traditional COs. Only WO-generated COs (where all items have null accountItemId) get the flat view.

## Step 4: Frontend â€” WO Detail "Convert to CO" Button

**File:** `apps/frontend/src/components/DetailsPage/WorkOrderDetailPage/index.tsx`

Extends the WO-7 header with a second button.

```typescript
const isApproved = job?.jobStatus?.slug === "approved";
const hasExistingCO = (changeOrders ?? []).some((co) => co.type === "ChangeOrder");

{isApproved && !hasExistingCO && (
    <Button
        color="white"
        onClick={() => openModal(
            <WOConversionConfirmModal
                type="changeOrder"
                jobId={jobId}
                onConfirm={handleConvertToCO}
            />
        )}
    >
        Convert to CO
    </Button>
)}
```

The `WOConversionConfirmModal` introduced in WO-7 already accepts a `jobId` and a single `onConfirm`. This step adds a `type: "invoice" | "changeOrder"` prop so the modal copy can differ (e.g., "This will create a Change Order with X line items...") and the parent passes the corresponding mutation.
