**Spec:** `tm-work-orders-uis/uis-20c-1-schema-form-foundation.html`
**Requires:** WO-1 (JobClassification), WO-2 (Line Item Tables), PR #6831 (Job DataModel Refactor)

## Step 6: Signature GraphQL Resolver

**Create file:** `apps/api/src/graphql/models/Signature.ts`

```graphql
type Signature {
    id: ID!
    referenceModel: String!
    referenceId: String!
    assetId: String!
    Asset: Asset
    userId: String
    User: User
    signerName: String
    signerEmail: String
    signerCompany: String
    signedAt: DateTime!
    latitude: Float
    longitude: Float
    createdAt: DateTime
}

input CreateSignature {
    referenceModel: String!
    referenceId: String!
    assetId: String!
    userId: String
    signerName: String
    signerEmail: String
    signerCompany: String
    signedAt: DateTime
    latitude: Float
    longitude: Float
}

extend type Query {
    signatures(referenceModel: String!, referenceId: ID!): [Signature]
}

extend type Mutation {
    createSignature(data: CreateSignature!): Signature
    deleteSignature(id: ID!): Boolean
}
```

Resolvers:

```typescript
Resolvers: {
    Asset: (parent) => prisma.asset.findUnique({ where: { id: parent.assetId } }),
    User: (parent) => parent.userId
        ? prisma.user.findUnique({ where: { id: parent.userId } })
        : null
},
Query: {
    signatures: (_, args, context) =>
        prisma.signature.findMany({
            where: {
                referenceModel: args.referenceModel,
                referenceId: args.referenceId,
                isDeleted: false
            },
            orderBy: { signedAt: "asc" }
        })
},
Mutation: {
    createSignature: (_, args, context) =>
        new SignatureModel().createItem(args.data, context.userId()),
    deleteSignature: (_, args, context) =>
        new SignatureModel().deleteItem(args.id, context.userId())
}
```

Register in `apps/api/src/graphql/schema.ts` (5 places) and export from `models/index.ts`.

## Step 8: Migration — Backfill Existing DAAs + Duplicate Shared + Create WO DAAs

**Create file:** `apps/api/prisma/migrations/[timestamp]_wo_3a_daa_setup/migration.sql`

**Pattern:** Follows the Expense separation migration (`20241209145000_expense_document_attribute_complete_separation`) exactly. NO comma-delimited subModel values — single values only. Shared fields are DUPLICATED into both `PROJECT_JOB` and `WORK_ORDER` sets.

This migration does four things:
1. Backfills all existing Job DAAs to `subModel = "PROJECT_JOB"`
2. Backfills all existing Job DocumentSections to `subModel = "PROJECT_JOB"`
3. Creates WO DocumentSections with `subModel = "WORK_ORDER"`
4. Duplicates shared Job DAAs into the WO sections + creates WO-only DAAs

### 8a. Backfill existing Job DAAs and sections to PROJECT_JOB

```sql
-- All existing Job DAAs become PROJECT_JOB
UPDATE `DocumentAttributeAssignment`
SET `subModel` = 'PROJECT_JOB'
WHERE `referenceModel` = 'Job'
AND (`subModel` IS NULL OR `subModel` = '');

-- All existing Job sections become PROJECT_JOB
UPDATE `DocumentSection`
SET `subModel` = 'PROJECT_JOB'
WHERE `referenceModel` = 'Job'
AND (`subModel` IS NULL OR `subModel` = '');
```

After this, existing PROJECT_JOB forms work exactly as before — the form passes `subModel = "PROJECT_JOB"` and gets the same DAAs it always did.

## Step 9: Update Job Number Generation

**File:** `apps/api/src/models/Job.ts`

**Important:** PR #6831 already updated `generateJobNumber` to handle the case where `projectId` is null. WO-3a extends those changes to make number generation classification-aware. The branching is based on `jobClassification` derived from `jobTypeId`, NOT on whether a project is attached (a WO can optionally be under a project).

### 9a. Resolve classification from jobTypeId

Add a helper or inline lookup that derives the classification. This is needed before number generation and before fullJobNumber formatting:

```typescript
// Helper — can be a private method on the Job model:
private async getJobClassification(jobTypeId?: string): Promise<string> {
    if (!jobTypeId) return "PROJECT_JOB";
    const jobType = await prisma.propertyValue.findUnique({
        where: { id: jobTypeId },
        select: { jobClassification: true }
    });
    return jobType?.jobClassification ?? "PROJECT_JOB";
}
```

### 9b. Extend generateJobNumber with classification parameter

The method signature from PR #6831 already accepts whatever params it needs for the project-optional case. Add `jobClassification` as a parameter (or derive it internally from `jobTypeId`):

```typescript
// Classification-aware numbering:
if (jobClassification === "WORK_ORDER") {
    // WO-specific numbering: auto-increment across all WORK_ORDER jobs
    const instance = await prisma.instance.findFirst();
    const pad = instance?.jobNumbering ?? 3;

    const existingWOs = await prisma.job.findMany({
        where: {
            isDeleted: false,
            jobType: { jobClassification: "WORK_ORDER" }
        },
        select: { number: true },
        orderBy: { createdAt: "desc" }
    });

    const numbers = existingWOs
        .map(j => parseInt(j.number?.replace(/\D/g, "") ?? "0"))
        .filter(n => !isNaN(n));
    const largest = numbers.length > 0 ? Math.max(...numbers) : 0;

    return (largest + 1).toString().padStart(pad, "0");
}

// PROJECT_JOB numbering (existing logic from PR #6831)
// ... handles both with-project and without-project cases ...
```
