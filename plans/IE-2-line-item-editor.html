# IE-2: Itemized Estimate Line Item Editor ‚Äî Implementation Plan

## Overview

Build the hierarchical line item editor (`EstimateLineItemEditor.tsx`) consumed by `EstimateChangeOrderDetails` when `creationType = Itemized`. No new backend work ‚Äî IE-2 is a pure frontend consumer of IE-1 (line items) and SD-1 (discounts).

**Estimated effort:** 5-7 days
**Risk:** Medium ‚Äî tree rendering + nested stacked sub-rows is non-trivial React state work
**Spec:** `tm-work-orders-uis/uis-IE-2-line-item-editor.html`
**Canvas reference:** `tm-work-orders-uis/uis-IE-2-canvas-itemized-estimate.html` (interactive prototype ‚Äî treat as the behavioral contract)
**Requires:** IE-1 (line item model + resolver + CRUD), SD-1 (`Discount` + `DiscountAssignment` + suggestions), LEM-1 (labor rates), LEM-2 (equipment rates)
**Enables:** IE-3 (totals / overhead / grand total), IE-4 (PDF), IE-5 (invoice conversion)

### Key design decisions (mirrors spec ¬ß2 / ¬ß3)

- **No mode toggle.** Editor mounts only when `creationType = Itemized`. `Full` and `BidFirst` ECRs render the legacy GL worksheet ‚Äî no user-facing switch ever. The two paths are schema-divergent (IE-1's `ItemizedEstimateChangeOrderRecordLineItem` vs the existing `EstimateChangeOrderRecordValue`).
- **Type-first add flow.** Clicking `+ Add item` inserts a blank row with a Type dropdown (Labor / Material / Equipment / Custom). Other cells stay disabled until Type is picked. Once picked, a type-specific progressive cascade renders inline on the row and resolves a single rate-level row:
    - **Labor:** `TradeLevel` ‚Üí `EmployeeAgreementRateLabel` ‚Üí `TradeLevelRate`
    - **Material:** `Material` ‚Üí X ‚Üí Y ‚Üí (Z when defined) ‚Üí `MaterialAttributePrice`
    - **Equipment:** `Equipment` ‚Üí `Per` ‚Üí `RateLabel` ‚Üí Operator Included ‚Üí `EquipmentRateValue`
    - **Custom:** free-text description
- **No manual rate override.** On catalog-linked rows (Labor/Mat/Eq), `unit`, `unitCost`, `totalCost`, and `price` render as read-only. Corrections happen at the rate source, not on the line. Custom lines are the only path for manual values.
- **Immutability after first save.** `lineItemType` and `nodeType` are `canEdit: false` in IE-1. The UI presents them as badges/read-only; delete + re-add is the change path. Catalog link is similarly locked after first save.
- **Stacked tax + discount sub-rows per line.** Mirrors `apps/frontend/src/components/DetailsPage/JobDetailsPage/Tabs/Billing/SimpleInvoice.tsx` lines 335‚Äì491: a dropdown + amount + remove per entry, with `+ Add Another‚Ä¶` on its own line. IE-1's M2M `TaxType` relation absorbs tax stacking; SD-1's `DiscountAssignment` absorbs discount stacking.
- **Suggested discounts + ad-hoc inline.** The line's discount picker merges SD-1's `suggestedDiscountsForLine` (Job ‚à™ Company, de-duped, filtered to non-ad-hoc and in effective window) with an "Ad-hoc" option that captures a `%` / `$` toggle + value and calls SD-1's `createAdHocDiscountAndAttach`.
- **Estimate-level discount stack.** Same sub-row UX in the totals strip against `referenceModel = "EstimateChangeOrderRecord"`; `orderNo` drives application order. IE-3 owns the math; IE-2 just stores.
- **Markup seeding from `ECR.estimateMarkup`.** New priced lines seed their `markupPercent` from the ECR's existing `estimateMarkup` column at insert time. The column is semantically overloaded by creationType: on Full / BidFirst it's an applied multiplier on the document total; on Itemized it's a per-line seed that never drives Itemized totals directly (line-level `markupPercent` does). No new column ‚Äî reuses the existing Instance ‚Üí ECR seeding cascade (`Instance.defaultEstimateMarkup` / `defaultChangeOrderMarkup` ‚Üí `ECR.estimateMarkup` at ECR create). Later changes to the ECR seed do **not** retroactively re-price existing lines; the explicit "Apply to all lines now" bulk action in IE-3's default-markup modal is the only way to propagate.
- **Section tree with per-section controls.** Each section row carries inline `+ Sub` / `+ Line` / `‚Üë ‚Üì` / delete buttons. Root-level `+ Section` / `+ Line` live on the worksheet toolbar. Depth cap 3 enforced against IE-1's `MAX_TREE_DEPTH` ‚Äî `+ Sub` disables when adding would exceed.
- **Local tree state, save-through-parent-form.** The editor holds the in-progress tree in local state (same pattern as `SimpleInvoice.tsx`'s `lineItems` record) and commits via IE-1 mutations on parent-form save. Until IE-3's `upsertItemizedEstimateChangeOrderRecordLineItems` lands, save walks the tree and fires individual `createItem` / `editItem` / `deleteItem` calls.

## Step 2: GraphQL operations

No new backend work. Add frontend query/mutation files and generate hooks via `pnpm run codegen`.

### 2a. From IE-1

**Queries** (`apps/frontend/src/graphql/queries/itemizedEstimateLineItems.graphql`):

```graphql
query ItemizedEstimateChangeOrderRecordLineItems($options: GetListOptions) {
  itemizedEstimateChangeOrderRecordLineItems(options: $options) {
    ... on ItemizedEstimateChangeOrderRecordLineItem {
      id
      nodeType
      parentRecordId
      estimateChangeOrderRecordId
      lineItemType
      priceReferenceModel
      priceReferenceId
      userId
      description
      quantity
      unit
      unitCost
      totalCost
      markupPercent
      markupDollarValue
      price
      taxValue
      orderNo
      TaxType { id abbreviation rate isCompound }
    }
  }
}

query ResolveItemizedLineItemUnitCost($input: ResolveItemizedLineItemUnitCostInput!) {
  resolveItemizedLineItemUnitCost(input: $input)
}
```

**Mutations** (`apps/frontend/src/graphql/mutations/itemizedEstimateLineItems.graphql`):

Wire every operation from IE-1's surface ‚Äî `createItem` / `createMany` / `editItem` / `editMany` / `deleteItem` / `deleteMany` / `archiveMany` / `restoreMany`. Full generated hooks are the consumer contract for the save path.

### 2b. From SD-1

**Queries:**

```graphql
query SuggestedDiscountsForLine($itemizedEstimateChangeOrderRecordLineItemId: ID!) {
  suggestedDiscountsForLine(
    itemizedEstimateChangeOrderRecordLineItemId: $itemizedEstimateChangeOrderRecordLineItemId
  ) {
    id name type value effectiveFrom effectiveTo
  }
}

query DiscountsForEntity($referenceModel: String!, $referenceId: ID!) {
  discountsForEntity(referenceModel: $referenceModel, referenceId: $referenceId) {
    id orderNo discountId
    Discount { id name type value isAdHoc effectiveFrom effectiveTo }
  }
}
```

**Mutations:** `attachDiscount`, `detachDiscount`, `createAdHocDiscountAndAttach`, `reorderDiscountAssignments`, `promoteAdHocDiscount`.

### 2c. Catalog pickers for cascades

No new queries ‚Äî use existing TableFeed surfaces for each catalog:

| Cascade step | Query |
|---|---|
| Labor ‚Üí TradeLevel | Existing `TradeLevel` TableFeed (Settings ‚Üí Trades) |
| Labor ‚Üí EmployeeAgreementRateLabel | Active `EmployeeAgreementRateLabel` rows for the instance's default contract (filtered server-side by whether a `TradeLevelRate` exists for the picked trade) |
| Labor worker | `useGetTableDataRecordSetQuery` (User) filtered to active users |
| Material ‚Üí Material | Material TableFeed |
| Material attributes | Per-material `MaterialAttributePrice` attribute value query ‚Äî returns available X / Y / Z values already on priced cells (avoids showing combinations with no price) |
| Equipment ‚Üí Equipment | Equipment TableFeed |
| Equipment ‚Üí Per / RateLabel / Operator | `EquipmentRateValue` rows for the picked equipment's category, grouped by `Per` + `RateLabel` + operator flag |
| TaxType (sub-row) | Existing `taxTypes` query (already used by `SimpleInvoice.tsx`) |

> **If any of those "available values" queries doesn't exist yet, add it alongside the cascade component that needs it.** Prefer server-side filtering over loading the whole matrix and filtering client-side ‚Äî for large material catalogs this matters.

## Step 4: Root editor + state hook

**File:** `apps/frontend/src/components/Estimates/LineItems/EstimateLineItemEditor.tsx`

Mounts on `creationType = Itemized`. Owns the tree, exposes a save method to the parent form.

```tsx
import { FC, useMemo } from "react";
import { ClassNames } from "@useanzen/shared-utils";
import { SectionRow } from "./SectionRow";
import { LineRow } from "./LineRow";
import { useEstimateLineItemTree } from "./hooks/useEstimateLineItemTree";

interface IEstimateLineItemEditorProps {
    estimateChangeOrderRecordId: string;
    isEditMode: boolean;
    className?: string | ClassNames;
}

const EstimateLineItemEditor: FC<IEstimateLineItemEditorProps> = ({
    estimateChangeOrderRecordId,
    isEditMode,
    className = ""
}) => {
    // State
    const {
        tree,
        addRootSection,
        addRootLine,
        addSectionChild,
        addLineChild,
        editRow,
        deleteRow,
        moveRow,
        maxTreeDepth
    } = useEstimateLineItemTree({ estimateChangeOrderRecordId });

    // Constants
    const flatRendered = useMemo(() => flattenForRender(tree), [tree]);

    return (
        <div className={new ClassNames("w-full").add(className).list()}>
            <div className="flex items-center justify-between gap-2 p-2 mb-2 bg-gray-50 rounded">
                <div className="flex gap-2">
                    <button type="button" onClick={addRootSection} disabled={!isEditMode}>+ Section</button>
                    <button type="button" onClick={addRootLine} disabled={!isEditMode}>+ Line</button>
                </div>
                <input type="search" placeholder="Filter rows / sections‚Ä¶" />
            </div>
            <table>
                <thead>{/* column headers per ¬ß4 field spec */}</thead>
                <tbody>
                    {flatRendered.map((node) =>
                        node.kind === "section" ? (
                            <SectionRow
                                key={node.id}
                                section={node}
                                isEditMode={isEditMode}
                                maxTreeDepth={maxTreeDepth}
                                onEdit={editRow}
                                onAddSub={addSectionChild}
                                onAddLine={addLineChild}
                                onMove={moveRow}
                                onDelete={deleteRow}
                            />
                        ) : (
                            <LineRow
                                key={node.id}
                                line={node}
                                isEditMode={isEditMode}
                                onEdit={editRow}
                                onDelete={deleteRow}
                            />
                        )
                    )}
                </tbody>
            </table>
        </div>
    );
};

export { EstimateLineItemEditor };
```

### 4a. `useEstimateLineItemTree` hook

**File:** `apps/frontend/src/components/Estimates/LineItems/hooks/useEstimateLineItemTree.ts`

Responsibilities:

- Load initial tree via `itemizedEstimateChangeOrderRecordLineItems(options: { where: { estimateChangeOrderRecordId } })` and hydrate each line's `discountAssignments` via `discountsForEntity` (parallel fetch).
- Maintain the tree as a flat array with `parentRecordId` / `orderNo` (same shape the canvas uses; easier for diffing than a recursive tree).
- Expose mutation methods that update local state optimistically and flag rows with `_dirty`.
- Enforce tree depth cap: expose `maxTreeDepth = 3` and a `canAddSubAt(parentSectionId)` helper used by `SectionRow` to disable `+ Sub`.
- **Save method** (called by parent-form `onSubmit`):
    1. Validate every dirty row via the same rules in IE-1's `validatePayload` (client-side pre-check for snappy errors; server is still authoritative).
    2. Walk dirty rows: `create` ‚Üí `edit` ‚Üí `delete` in order.
    3. For each written line, sync its tax set (diff `taxTypeIds`) and discount set (diff via SD-1 `attachDiscount` / `detachDiscount` / `createAdHocDiscountAndAttach`).
    4. Refetch the tree from server; reconcile client ids.
- **No** auto-save on every keystroke ‚Äî batched on parent save (matches `SimpleInvoice.tsx`'s pattern).

## Step 5: `SectionRow` ‚Äî section header + controls

**File:** `apps/frontend/src/components/Estimates/LineItems/SectionRow.tsx`

```tsx
import { FC, memo, useCallback } from "react";
import { ClassNames } from "@useanzen/shared-utils";
import { IconTrash } from "@useanzen/ui";
import { FormControl } from "~root/components/Forms/_FormControls/FormControl";

interface ISectionRowProps {
    section: { id: string; title: string; parentRecordId: string | null; depth: number };
    isEditMode: boolean;
    maxTreeDepth: number;
    onEdit: (id: string, patch: { title: string }) => void;
    onAddSub: (parentRecordId: string) => void;
    onAddLine: (parentRecordId: string) => void;
    onMove: (id: string, delta: -1 | 1) => void;
    onDelete: (id: string) => void;
}

const SectionRow: FC<ISectionRowProps> = ({
    section, isEditMode, maxTreeDepth, onEdit, onAddSub, onAddLine, onMove, onDelete
}) => {
    // Constants
    const canGoDeeper = section.depth < maxTreeDepth;
    const depthClass = `depth-${Math.min(3, section.depth)}`;

    // Functions
    const handleDelete = useCallback(() => {
        if (confirm("Delete this section and all its children?")) onDelete(section.id);
    }, [onDelete, section.id]);

    return (
        <tr className="section-row">
            <td colSpan={11}>
                <div className={new ClassNames("section-inner").add(depthClass).list()}>
                    <span className="section-tag">{section.depth === 1 ? "Section" : "Sub"}</span>
                    <FormControl
                        name={`section-${section.id}-title`}
                        value={section.title}
                        onChange={(e: ChangeEvent<HTMLInputElement>) =>
                            onEdit(section.id, { title: e.target.value })
                        }
                        disabled={!isEditMode}
                    />
                    <div className="section-actions">
                        <button type="button" onClick={() => onMove(section.id, -1)} disabled={!isEditMode}>‚Üë</button>
                        <button type="button" onClick={() => onMove(section.id, 1)} disabled={!isEditMode}>‚Üì</button>
                        <button
                            type="button"
                            onClick={() => onAddSub(section.id)}
                            disabled={!isEditMode || !canGoDeeper}
                            title={canGoDeeper ? "Add subsection" : "Depth cap reached"}
                        >
                            + Sub
                        </button>
                        <button type="button" onClick={() => onAddLine(section.id)} disabled={!isEditMode}>
                            + Line
                        </button>
                        <button type="button" onClick={handleDelete} disabled={!isEditMode}>
                            <IconTrash />
                        </button>
                    </div>
                </div>
            </td>
        </tr>
    );
};

export { SectionRow: memo(SectionRow) };
```

## Step 6: `LineRow` ‚Äî priced row + sub-rows

**File:** `apps/frontend/src/components/Estimates/LineItems/LineRow.tsx`

Responsibility: render the main priced cells + the two sub-rows (tax, discount). Delegates the cascade UI to `AddLineCascade`. All cascade picks call back through `onEdit(id, patch)` which the root hook funnels into IE-1's `resolveItemizedLineItemUnitCost` when the cascade is complete.

Key rules from ¬ß4:

- **Type** ‚Äî blank row: `FormControl type="select"` with `EstimateLineItemType` options. Once set: read-only badge (`canEdit: false` in IE-1).
- **Selected item / description** ‚Äî rendered by `AddLineCascade` while the cascade is incomplete; collapses to a read-only summary once the rate-level row is resolved. Custom is always free-text.
- **Qty / Markup %  / Markup $** ‚Äî inputs, always editable.
- **Unit / Unit cost** ‚Äî editable only when `lineItemType === "Custom"`; read-only otherwise.
- **Total cost / Line price** ‚Äî always derived, never input.
- **Delete** ‚Äî soft-delete; confirm optional.

Below the main `<tr>`, the component renders two more `<tr>` elements:

```tsx
<>
    <tr className="line-row">{/* main cells */}</tr>
    <LineTaxSubRow line={line} isEditMode={isEditMode} onEdit={onEdit} />
    <LineDiscountSubRow line={line} isEditMode={isEditMode} onEdit={onEdit} />
</>
```

## Step 7: `AddLineCascade` ‚Äî progressive dropdowns

**File:** `apps/frontend/src/components/Estimates/LineItems/AddLineCascade.tsx`

Dispatches to the right sub-component based on `line.lineItemType`. Whenever a cascade completes and the resolver returns a `unitCost`, the wrapper **also** seeds the line's `markupPercent` from `ECR.estimateMarkup` if the line's markup hasn't already been explicitly touched ‚Äî one-shot at first resolution, not on every change (so re-opening the cascade doesn't blow away a user's override).

```tsx
switch (line.lineItemType) {
    case "Labor":     return <LaborCascade line={line} onEdit={onEdit} />;
    case "Material":  return <MaterialCascade line={line} onEdit={onEdit} />;
    case "Equipment": return <EquipmentCascade line={line} onEdit={onEdit} />;
    case "Custom":    return <CustomCascade line={line} onEdit={onEdit} />;
    default:          return <TypeDropdown line={line} onEdit={onEdit} />;
}
```

### 7a. `LaborCascade`

Two `FormControl type="select"` fields side-by-side:

- `TradeLevel` dropdown (active trades).
- `EmployeeAgreementRateLabel` dropdown ‚Äî disabled until `TradeLevel` is picked; options filtered to labels that have a `TradeLevelRate` row for the picked trade + default agreement.

After both are picked, calls `useResolveUnitCost({ lineItemType: "Labor", priceReferenceModel: "TradeLevelRate", priceReferenceId: <resolved tradeLevelRateId>, userId })` to seed `unit` = `hr` and `unitCost`. When complete, cascade collapses to `"<TradeLevel.name> ¬∑ <RateLabel.name>"` read-only summary + an inline optional Worker picker (`TaskFeed`-backed User dropdown, Labor-only).

### 7b. `MaterialCascade`

Four (or three) dropdowns:

- `Material`, then X, then Y, then Z (only rendered when the picked material defines a Z axis).
- Each subsequent dropdown is disabled until the previous is picked, and its options are filtered server-side to values that exist on a `MaterialAttributePrice` row (avoids surfacing combinations with no price).
- After the final pick, calls `useResolveUnitCost` with `priceReferenceModel: "MaterialAttributePrice"` + the resolved `MaterialAttributePrice.id`.

### 7c. `EquipmentCascade`

Three dropdowns + one checkbox:

- `Equipment` ‚Üí `Per` (`EquipmentRatePer` ‚Äî HOUR / DAY / WEEK / ‚Ä¶) ‚Üí `Rate Type` (`EquipmentRateLabel`) ‚Üí Operator Included (`FormControl type="checkbox"`).

## Step 8: `LineTaxSubRow` ‚Äî stacked tax picker

**File:** `apps/frontend/src/components/Estimates/LineItems/LineTaxSubRow.tsx`

Pattern: `SimpleInvoice.tsx` lines 335‚Äì491. One `<tr className="tax-row">` with `<td colSpan>`; inside, a right-aligned inline flex column of entries plus a right-aligned "+ Add Another Tax Rate" button on its own line.

Each entry:

```tsx
<div className="sub-item">
    <FormControl
        type="select"
        value={taxTypeId}
        options={availableTaxTypes.map((t) => ({
            label: `${t.abbreviation} ‚Äî ${t.rate}%${t.isCompound ? " (compound)" : ""}`,
            value: t.id
        }))}
        onChange={(opt) => onEditTax(line.id, /* fromId */ taxTypeId, /* toId */ opt.value)}
    />
    <span className="sub-amt">{formatValueAsCurrency(amountForEntry, true)}</span>
    <Button onClick={() => onRemoveTax(line.id, taxTypeId)} noStyles><IconTrash /></Button>
</div>
```

Rules:

- Same `TaxType` cannot stack twice on one line ‚Äî dropdown filters out already-picked ids.
- Amount computation lives in a small pure helper (shared with IE-3's totals) ‚Äî does not mutate state.
- Compound ordering: non-compound taxes stack on base first; compound applies to `base + sum(non-compound taxes)`.
- **Add-another button** disabled when no un-picked `TaxType` remains.
- Change to the set triggers a re-compute of the line's `taxValue` in the local form state (optimistic); server canonical recompute happens at save time via IE-1's `recomputeTaxValue` hook.

## Step 9: `LineDiscountSubRow` ‚Äî stacked discount picker

**File:** `apps/frontend/src/components/Estimates/LineItems/LineDiscountSubRow.tsx`

Same shape as the tax sub-row but each entry carries three modes:

1. **Suggested** (from SD-1 `suggestedDiscountsForLine`): dropdown shows named discounts with `‚Äî 7.5%` or `‚Äî $250` label and `(Company)` / `(Job)` source tag; picking one sets `discountId` + freezes the type/value to the discount's definition.
2. **Ad-hoc** (selecting "Enter ad-hoc‚Ä¶" from the dropdown): reveals inline `%` / `$` toggle + value input. On blur / commit, calls SD-1's `createAdHocDiscountAndAttach` to persist both the `Discount` row (with `isAdHoc: true`) and the assignment in one call. Before server commit (e.g., while the line itself is still unsaved), a placeholder local record holds the data.
3. **Existing assignment** being edited: user can swap the dropdown to a different discount (detach old, attach new ‚Äî two mutations) or change the ad-hoc value inline (edit the `Discount` row).

Rules:

- Same `Discount` cannot attach twice on one line (SD-1 unique constraint).
- Removing an entry detaches via `detachDiscount` (soft-delete the assignment; the `Discount` row is left alone unless `isAdHoc`).
- Amount display: `Percent ‚Üí lineSellBeforeDiscount √ó value / 100`; `FixedAmount ‚Üí value`.

## Step 12: Validation

Client-side validation runs on keystroke/blur for snappy feedback; IE-1 is still authoritative on save. Mirror IE-1's `validatePayload` rules:

| Rule | UI treatment |
|---|---|
| Blank-row Type unset | Other cells disabled; save blocked |
| Labor cascade incomplete (missing TradeLevel or RateLabel) | Save blocked; open picker flags the unset step |
| Material cascade incomplete | Same |
| Equipment cascade incomplete | Same |
| Custom without `description` / `quantity` / `unit` / `unitCost` | Inline red border on missing fields |
| `Qty ‚â§ 0` on priced row | Inline error |
| `userId` on non-Labor line | Ad-hoc UI shouldn't allow this; defensive validation if data arrives weird |
| Duplicate TaxType on one line | `+ Add Another Tax Rate` disabled when exhausted; the picker filters |
| Duplicate Discount on one line | Dropdown filters already-attached |
| Depth cap exceeded on `+ Sub` | Button disabled with tooltip "Depth cap reached" |
| Section title empty | Inline error on save |
| Resolver error on catalog line | Row banner "Rate unavailable ‚Äî fix at source"; **no fallback to manual** (use Custom for manual entries) |

## Handoff to IE-3

IE-3 consumes from IE-2's tree:

- **Subtotals by branch** ‚Äî IE-3 reads the tree via `itemizedEstimateChangeOrderRecordLineItems` and walks `parentRecordId` for section rollups. IE-2 does not persist section subtotals.
- **Estimate-level discount list** ‚Äî `discountsForEntity("EstimateChangeOrderRecord", <id>)` is IE-3's input for the "step 2 ‚Üí step 3" math (line % ‚Üí line sell ‚Üí estimate-level on pre-tax ‚Üí proportional tax split).
- **Tax aggregates** ‚Äî IE-3 reads each line's cached `taxValue` (IE-1 snapshot) + its `TaxType[]` set, aggregates by `TaxType`, re-computes under proportional discount split.
- **Overhead %** ‚Äî stays on `EstimateChangeOrderRecord.overheadMarkup` (existing). IE-3 owns policy for how overhead is applied (pre-/post-tax, per line, etc.).
- **`creationType = Itemized`** ‚Äî IE-3 adds this enum value and the gate; IE-2's `EstimateLineItemEditor` should compile against it.
