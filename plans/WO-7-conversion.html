# WO-7: WO → Invoice Conversion — Implementation Plan

## Overview

A single mutation that converts an Approved Work Order's line items into a Simple Invoice (JobBill). Reuses existing rate resolution from LEM-1/2 for structured labor and equipment, and a shared `calculateQuantity` utility for equipment billing.

**Assumption:** One invoice per Work Order. If additional billing is needed after invoicing, users create a new Work Order.

**Scope split:** CO conversion has been pulled out of WO-7 and is now tracked separately in `WO-10-co-conversion`. WO-7 is invoice-only.

**Estimated effort:** 2-3 days
**Risk:** Low — additive mutation, no schema changes, no other-workflow modifications
**Spec:** `tm-work-orders-uis/uis-20g-conversion.html`
**Requires:** WO-4 (Detail Page), WO-2 (Line Items), LEM-1/2

---

## Data Model Clarifications (verified against current schema)

Before writing the helper, a few schema facts were nailed down on the branch `task/Q21030-11107/equipment-rates`:

- **Structured labor:** `TimeSheetDetailRecord` has no `secondsAtService`. Duration lives on child `TimeSheetDetailRecordValue` rows (`approvedDuration`, `tradeLevelRateId`). Aggregate values by `tradeLevelRateId` and resolve description via `TradeLevelRate → TradeLevel` + `EmployeeAgreementRateLabel`. Employee name comes from `TimeSheetDetailRecord.TimeSheetRecord.Employee` (User).
- **Structured equipment:** `EquipmentTimeEntry` has `submittedDuration` / `approvedDuration` (no `duration`). Each entry has its own `workDate` — pass that per-entry to `resolveEquipmentRate` instead of a job-level `dateOfWork`.
- **Duration to bill (labor + equipment):** use `approvedDuration` throughout. Admins may override what the worker submitted, and WO approval confirms the approved values are final.
- **Blank/unstructured labor:** `WorkOrderLaborItem` has no category/trade-level reference — it only has `rate`, `qtyOfWorkers`, `submittedDuration`, `description`. Use these values directly; no rate lookup.
- **Blank/unstructured equipment:** `WorkOrderEquipmentItem` has `unitRate`, `quantity`, `description` — use these directly; no rate lookup.
- **Materials:** `WorkOrderMaterialItem` stores `unitPrice` and `total` directly on the record. Use the stored `unitPrice` — no re-resolution against material price books at conversion time.
- **`calculateQuantity` does not yet exist** — create it in `apps/api/src/lib/equipment/calculateQuantity.ts`.
- **WO status transition:** Do NOT auto-transition the WO status to "Invoiced". Statuses are customer-controlled, allow internal review workflows (generate → review → send → transition), and we have no workflow builder today.
- **Duplicate prevention:** detect "already invoiced" on the frontend by checking if any `JobBill` exists for this `jobId` (one invoice per WO).

## Step 1: Shared Line Item Resolution Helper

**File:** `apps/api/src/models/WorkOrderConversion.ts` (new)

```typescript
interface IResolvedWOLineItem {
    description: string;
    rate: number;
    quantity: number;
    value: number;         // rate * quantity
    numericHours: number;  // hours (reserved for future CO conversion; not used by invoice)
    sourceType: "labor" | "material" | "equipment";
}

async function resolveWorkOrderLineItems(
    jobId: string
): Promise<IResolvedWOLineItem[]> {
    const items: IResolvedWOLineItem[] = [];
    const job = await prisma.job.findUnique({ where: { id: jobId } });
    const dailyHours = job?.dailyHours ?? 8;

    // --- Labor: Structured (TimeSheetDetailRecordValue) ---
    const tsDetailValues = await prisma.timeSheetDetailRecordValue.findMany({
        where: {
            isDeleted: false,
            TimeSheetDetailRecord: { jobId, isDeleted: false }
        },
        include: {
            TimeSheetDetailRecord: {
                include: {
                    TimeSheetRecord: { include: { Employee: true } }
                }
            },
            tradeLevelRate: {
                include: {
                    TradeLevel: true,
                    EmployeeAgreementRateLabel: true
                }
            }
        }
    });

    // Aggregate by (userId, tradeLevelRateId) so one invoice line per employee per rate
    const laborAgg = new Map<string, {
        employeeName: string;
        tradeLevelName: string;
        rateLabelName: string;
        billableRate: number;
        totalSeconds: number;
    }>();

    for (const val of tsDetailValues) {
        if (!val.tradeLevelRateId) continue;
        const employee = val.TimeSheetDetailRecord?.TimeSheetRecord?.Employee;
        const key = `${employee?.id ?? "unknown"}::${val.tradeLevelRateId}`;
        const existing = laborAgg.get(key);
        if (existing) {
            existing.totalSeconds += val.approvedDuration ?? 0;
        } else {
            laborAgg.set(key, {
                employeeName: employee
                    ? `${employee.firstName ?? ""} ${employee.lastName ?? ""}`.trim()
                    : "",
                tradeLevelName: val.tradeLevelRate?.TradeLevel?.name ?? "Labor",
                rateLabelName: val.tradeLevelRate?.EmployeeAgreementRateLabel?.name ?? "",
                billableRate: val.tradeLevelRate?.billableValue?.toNumber() ?? 0,
                totalSeconds: val.approvedDuration ?? 0
            });
        }
    }

    for (const agg of laborAgg.values()) {
        if (agg.totalSeconds <= 0) continue;
        const hours = agg.totalSeconds / 3600;
        const descParts = [agg.employeeName, agg.tradeLevelName, agg.rateLabelName].filter(Boolean);
        items.push({
            description: descParts.join(" — "),
            rate: agg.billableRate,
            quantity: hours,
            value: Number((agg.billableRate * hours).toFixed(2)),
            numericHours: hours,
            sourceType: "labor"
        });
    }

    // --- Labor: Blank/unstructured (WorkOrderLaborItem) ---
    const blankLaborItems = await prisma.workOrderLaborItem.findMany({
        where: { jobId, isDeleted: false }
    });

    for (const item of blankLaborItems) {
        const hoursPerWorker = (item.submittedDuration ?? 0) / 3600;
        const totalHours = hoursPerWorker * (item.qtyOfWorkers ?? 1);
        const rate = item.rate?.toNumber() ?? 0;
        items.push({
            description: item.description ?? "Labor",
            rate,
            quantity: totalHours,
            value: Number((rate * totalHours).toFixed(2)),
            numericHours: totalHours,
            sourceType: "labor"
        });
    }

    // --- Materials (unitPrice stored on record) ---
    const materialItems = await prisma.workOrderMaterialItem.findMany({
        where: { jobId, isDeleted: false },
        include: { Material: true }
    });

    for (const item of materialItems) {
        const description = item.materialId
            ? item.Material?.name ?? item.description ?? "Material"
            : item.description ?? "Material";
        items.push({
            description,
            rate: item.unitPrice?.toNumber() ?? 0,
            quantity: item.quantity?.toNumber() ?? 0,
            value: item.total?.toNumber() ?? 0,
            numericHours: 0,
            sourceType: "material"
        });
    }

    // --- Equipment: Structured (EquipmentTimeEntry) ---
    const equipmentEntries = await prisma.equipmentTimeEntry.findMany({
        where: { jobId, isDeleted: false },
        include: { Equipment: true, EquipmentRateLabel: true }
    });

    const rateValueModel = new EquipmentRateValueModel();

    for (const entry of equipmentEntries) {
        const resolved = await rateValueModel.resolveEquipmentRate(
            entry.equipmentId,
            entry.equipmentRateLabelId,
            entry.per ?? "HOUR",
            jobId,
            entry.operatorIncluded,
            entry.workDate
        );
        const rate = resolved?.amount ?? 0;
        const quantity = calculateQuantity(entry, dailyHours);
        const numericHours = entry.per === "HOUR"
            ? (entry.approvedDuration ?? 0) / 3600
            : 0;

        items.push({
            description: `${entry.Equipment?.name ?? "Equipment"} — ${entry.EquipmentRateLabel?.name ?? "Standard"}`,
            rate,
            quantity,
            value: Number((rate * quantity).toFixed(2)),
            numericHours,
            sourceType: "equipment"
        });
    }

    // --- Equipment: Blank/unstructured (WorkOrderEquipmentItem) ---
    const blankEquipmentItems = await prisma.workOrderEquipmentItem.findMany({
        where: { jobId, isDeleted: false }
    });

    for (const item of blankEquipmentItems) {
        const rate = item.unitRate?.toNumber() ?? 0;
        const qty = item.quantity?.toNumber() ?? 0;
        items.push({
            description: item.description ?? "Equipment",
            rate,
            quantity: qty,
            value: Number((rate * qty).toFixed(2)),
            numericHours: 0,
            sourceType: "equipment"
        });
    }

    return items;
}
```

`calculateQuantity` lives in `apps/api/src/lib/equipment/calculateQuantity.ts`. It converts an `EquipmentTimeEntry` into a billable quantity based on `per` (`HOUR` / `DAY`), `isFullDayBilling`, and `approvedDuration` (in seconds). `dailyHours` is passed in from the Job so the helper stays pure and reusable.

<div class="callout">
<strong>Why the helper is shared:</strong> WO-10 will reuse <code>resolveWorkOrderLineItems</code> unchanged. Writing it once here keeps both conversion flows consistent and avoids drift.
</div>

## Step 2: generateInvoiceFromWorkOrder Mutation

**File:** `apps/api/src/models/JobBill.ts`

```typescript
public async generateInvoiceFromWorkOrder(
    jobId: string,
    currentUserId: string
): Promise<FullModel<IJobBill>> {
    // Validate WO is Approved
    const job = await prisma.job.findUnique({
        where: { id: jobId },
        include: { jobStatus: true, jobType: true }
    });
    // ... validate job.jobStatus?.slug === "approved" (and jobType.jobClassification === "WorkOrder")

    // Guard: one invoice per WO
    const existing = await prisma.jobBill.findFirst({
        where: { jobId, isDeleted: false }
    });
    if (existing) {
        throw new Error("An invoice has already been generated for this Work Order.");
    }

    // Resolve all line items using the shared helper
    const resolvedItems = await resolveWorkOrderLineItems(jobId);

    // Create Simple JobBill
    const bill = await this.customCreateItem(
        {
            jobId,
            template: "Simple",
            invoiceDate: new Date(),
            submittedByUserId: currentUserId
        },
        currentUserId
    );

    // Create JobBillLineItems
    const lineItemModel = new JobBillLineItemModel();
    for (const item of resolvedItems) {
        await lineItemModel.createItem(
            {
                jobBillId: bill.id,
                description: item.description,
                quantity: item.quantity,
                rate: item.rate,
                value: item.value
            },
            currentUserId
        );
    }

    // NOTE: Do NOT transition WO status here. Status is customer-controlled.

    return bill;
}
```

## Step 4: Confirmation Modal

**Create file:** `apps/frontend/src/components/WorkOrder/WOConversionConfirmModal.tsx`

```typescript
interface IWOConversionConfirmModalProps {
    jobId: string;
    onConfirm: () => void;
}
```

The modal:
1. Queries WO line items to show a summary (count by source type + total value)
2. Shows: "This will create a Simple Invoice with X line items totaling $Y,YYY.YY"
3. Shows a note that the WO status will remain unchanged and must be transitioned manually
4. "Confirm" / "Cancel" buttons
5. On confirm: calls the `generateInvoiceFromWorkOrder` mutation, closes modal, parent navigates to the created invoice

## Verification Checklist

- [ ] `resolveWorkOrderLineItems` correctly processes labor from two sources (TimeSheetDetailRecordValue aggregated by tradeLevelRateId + WorkOrderLaborItem blanks), plus materials and equipment line items
- [ ] Structured labor: rate from `TradeLevelRate.billableValue`, qty = `approvedDuration`/3600 aggregated per (employee, tradeLevelRate)
- [ ] Structured equipment: rate from `resolveEquipmentRate` (LEM-2) using per-entry `workDate`, qty via `calculateQuantity` (handles full-day/prorated), uses `approvedDuration`
- [ ] Structured materials: `unitPrice` read directly from `WorkOrderMaterialItem` (no cascade re-resolution)
- [ ] Blank labor: rate from `WorkOrderLaborItem.rate` × `qtyOfWorkers` × hours
- [ ] Blank equipment: `unitRate` × `quantity` directly
- [ ] `generateInvoiceFromWorkOrder` creates Simple JobBill with correct line items
- [ ] Guard: generating a second invoice for the same WO throws an error
- [ ] WO status is NOT auto-transitioned after invoice generation (verify status badge on WO detail is unchanged)
- [ ] "Generate Invoice" button visible on WO detail when status = Approved AND no existing invoice
- [ ] "Generate Invoice" button hidden/disabled when an invoice already exists for this WO
- [ ] Confirmation modal shows line item count + total value before conversion
- [ ] After invoice: parent navigates to the new JobBill detail page
- [ ] Existing JobBill flows (non-WO) unaffected — no regressions
