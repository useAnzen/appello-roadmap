# WO-8b: Collect Signatures — Implementation Plan

## Overview

Two signature collection workflows for submitted work orders: **Request Signature** (send notification to internal Appello user, they open WO and sign — mirrors form ACK pattern) and **Collect In-Person** (hand device to external person who signs on-screen without an account). Both use the polymorphic `Signature` model from WO-3a and the `readOnlySummary` renderers from WO-8a.

**Estimated effort:** 3-4 days
**Risk:** Medium — new SignatureRequest model, notification integration, device handoff UX
**Spec:** `tm-work-orders-uis/uis-20h-2-collect-signatures.html`
**Requires:** WO-3a (Signature model with signerName/signerEmail/signerCompany), WO-3c (signature canvas), WO-4 (detail page), WO-8a (readOnlySummary renderers)

---

## Step 1: Prisma Schema — SignatureRequest Model

**File:** `apps/api/prisma/schema.prisma`

```prisma
model SignatureRequest {
    id              String    @id @db.VarChar(21)
    isDeleted       Boolean   @default(false)
    isArchived      Boolean   @default(false)
    createdAt       DateTime  @default(now())
    updatedAt       DateTime  @default(now()) @updatedAt

    referenceModel  String                         // "Job"
    referenceId     String    @db.VarChar(21)      // the WO's job ID

    requestedById   String    @db.VarChar(21)
    RequestedBy     User      @relation("SignatureRequestedBy", fields: [requestedById], references: [id])

    requestedUserId String    @db.VarChar(21)
    RequestedUser   User      @relation("SignatureRequestedUser", fields: [requestedUserId], references: [id])

    status          String    @default("PENDING")  // PENDING | SIGNED | DECLINED

    signatureId     String?   @db.VarChar(21)
    Signature       Signature? @relation(fields: [signatureId], references: [id])
    signedAt        DateTime?

    @@index([referenceModel, referenceId, isDeleted])
    @@index([requestedUserId, status, isDeleted])
}
```

### Add relations on existing models

```prisma

SignatureRequestsMade      SignatureRequest[] @relation("SignatureRequestedBy")
SignatureRequestsReceived  SignatureRequest[] @relation("SignatureRequestedUser")

// On Signature — add back-relation:

### Migration

**Create file:** `apps/api/prisma/migrations/[timestamp]_wo_8b_signature_request/migration.sql`

```sql
CREATE TABLE `SignatureRequest` (
    `id` VARCHAR(21) NOT NULL,
    `isDeleted` BOOLEAN NOT NULL DEFAULT false,
    `isArchived` BOOLEAN NOT NULL DEFAULT false,
    `createdAt` DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3),
    `updatedAt` DATETIME(3) NOT NULL,
    `referenceModel` VARCHAR(191) NOT NULL,
    `referenceId` VARCHAR(21) NOT NULL,
    `requestedById` VARCHAR(21) NOT NULL,
    `requestedUserId` VARCHAR(21) NOT NULL,
    `status` VARCHAR(191) NOT NULL DEFAULT 'PENDING',
    `signatureId` VARCHAR(21) NULL,
    `signedAt` DATETIME(3) NULL,
    PRIMARY KEY (`id`),
    INDEX `SignatureRequest_ref_idx` (`referenceModel`, `referenceId`, `isDeleted`),
    INDEX `SignatureRequest_user_idx` (`requestedUserId`, `status`, `isDeleted`),
    CONSTRAINT `SignatureRequest_requestedById_fkey` FOREIGN KEY (`requestedById`) REFERENCES `User`(`id`),
    CONSTRAINT `SignatureRequest_requestedUserId_fkey` FOREIGN KEY (`requestedUserId`) REFERENCES `User`(`id`),
    CONSTRAINT `SignatureRequest_signatureId_fkey` FOREIGN KEY (`signatureId`) REFERENCES `Signature`(`id`)
);
```

### GraphQL Resolver

**Create file:** `apps/api/src/graphql/models/SignatureRequest.ts`

The base model class provides standard CRUD (`createItem`, `editItem`, `getItem`, `getList`) and filtering via `modelFields`. The GraphQL layer follows the same pattern as all other models — standard `create`/`edit` mutations that delegate to the model class methods.

```graphql
type SignatureRequest {
    id: ID!
    referenceModel: String!
    referenceId: String!
    requestedById: String!
    RequestedBy: User
    requestedUserId: String!
    RequestedUser: User
    status: String!
    signatureId: String
    Signature: Signature
    signedAt: DateTime
    createdAt: DateTime
}

input CreateSignatureRequest {
    referenceModel: String!
    referenceId: String!
    requestedUserId: String!
}

input EditSignatureRequest {
    status: String
    signatureId: String
    signedAt: DateTime
}

extend type Mutation {
    createSignatureRequest(data: CreateSignatureRequest!): SignatureRequest
    editSignatureRequest(id: ID!, data: EditSignatureRequest!): SignatureRequest
}
```

The `createSignatureRequest` resolver sets `requestedById` from `context.userId()` before passing to `model.createItem()`. Validation (duplicate request check, already-signed check) belongs in the model class `beforeCreate` hook — not custom prisma queries in the resolver.

After `createItem`, call `handleRequestNotification()`. After `editItem` when status transitions to `"SIGNED"`, call `handleSignedNotification()`. Both notification methods live on the model class (see Step 3).

Register in `apps/api/src/graphql/schema.ts` (5 places) and export from `models/index.ts`.

## Step 3: Notification — Request Signature

**File:** `apps/api/src/models/SignatureRequest.ts`

Add `handleRequestNotification` method following the `Acknowledge.handleAckNotification` pattern:

Both methods follow the `Acknowledge.handleAckNotification` pattern:

1. Fetch the related Job via `new JobModel().getItem()`
2. Fetch the user via `new UserModel().getItem()`
3. Push to activity feed via `super.pushToActivityFeed()`
4. Create notification + notification status via the existing `NotificationModel` and `NotificationStatusModel` methods
5. Send push notification via `NotificationModel.sendPushNotification()`

### `handleRequestNotification` (called after `createItem`)

- Pushes "Signature Requested" to the requested user's activity feed
- Creates a `SIGNATURE_REQUEST` notification for the requested user
- Sends FCM push: `"[Requester] requested your signature on [WO Number]"`

### `handleSignedNotification` (called after `editItem` when status = SIGNED)

- Sends `SIGNATURE_COMPLETED` push to the original requester: `"[Signer] signed [WO Number]"`

### Add Notification Types

**File:** `apps/api/src/types/Notification.types.ts`

Add `SIGNATURE_REQUEST` and `SIGNATURE_COMPLETED` to the `NotificationType` enum.

### Signatures section component

1. **Action buttons** (top right of section header):

   - "Collect In-Person" — opens the signing view (Workflow B)

## Step 5: Frontend — Request Signature Flyout (Workflow A)

**Create file:** `apps/frontend/src/components/WorkOrders/RequestSignatureFlyout.tsx`

```typescript
interface IRequestSignatureFlyoutProps {
    className?: string;
    jobId: string;
    existingSignatures: GqlSignature[];
    existingRequests: GqlSignatureRequest[];
    onRequestSent: () => void;
    onClose: () => void;
}
```

### Component behavior

1. Opens as a standard flyout via `openFlyout()`
2. Contains a `CustomCombobox` searching active Users in the organization
3. Filters out users who:
   - Already have a Signature on this WO (`existingSignatures` with matching userId)
   - Already have a pending SignatureRequest (`existingRequests` with status = PENDING)
4. On "Send Request", calls `createSignatureRequest` mutation
5. On success, shows toast confirmation and closes flyout
6. Parent refetches the WO detail query to update the signatures section

## Step 6: Frontend — WO Signing View (Shared Component)

**Create file:** `apps/frontend/src/components/WorkOrders/WOSigningView.tsx`

This is the shared component used by both Workflow A ("Sign Now" from notification) and Workflow B ("Collect In-Person").

```typescript
interface IWOSigningViewProps {
    className?: string;
    jobId: string;
    mode: "internal" | "external";
    signatureRequestId?: string;  // Workflow A: to update request status on sign
    onComplete: () => void;
    onCancel: () => void;
}
```

### Component structure

1. **Read-only WO content** — Fetches the WO data and renders it using the `readOnlySummary` renderers from WO-8a's SteppedFormSummary. Each section displays in the same compact read-only format. This includes existing signatures (shown as thumbnail + name).

2. **Signer info area** (below WO content):
   - **Internal mode:** Signer name auto-populated from the current user's name (read-only display). No email/company fields.
   - **External mode:** Text inputs for Full Name (required), Email (optional), Company (optional).

3. **Signature canvas** — Uses `react-signature-canvas` (same component from `@useanzen/ui` used in WO-3c). Clear button to reset.

4. **GPS capture** — On canvas interaction, request browser geolocation. Store latitude/longitude.

5. **"Confirm Signature" button** — Validates (name required, canvas not empty), then:

```typescript
const handleConfirmSignature = async () => {
    // 1. Convert canvas to PNG blob
    const signatureBlob = signatureCanvasRef.current.toBlob();

    // 2. Upload as Asset
    const asset = await createAsset({ ... });
    await uploadToSignedUrl(asset.uploadUrl, signatureBlob);

    // 3. Create Signature record
    const signature = await createSignature({
        referenceModel: "Job",
        referenceId: jobId,
        assetId: asset.id,
        userId: mode === "internal" ? currentUser.id : null,
        signerName: mode === "internal"
            ? `${currentUser.firstName} ${currentUser.lastName}`
            : signerNameInput,
        signerEmail: mode === "external" ? signerEmailInput : null,
        signerCompany: mode === "external" ? signerCompanyInput : null,
        latitude: gpsCoords?.latitude,
        longitude: gpsCoords?.longitude,
    });

    // 4. If Workflow A, update SignatureRequest status
    if (signatureRequestId) {
        await editSignatureRequest({
            id: signatureRequestId,
            status: "SIGNED",
            signatureId: signature.id,
            signedAt: new Date(),
        });

        // 5. Send signed confirmation notification back to requester
        // This is handled server-side in the editSignatureRequest mutation
    }

    onComplete();
};
```

### Opening the signing view

- **Workflow A ("Sign Now" button):** Opens as a full-screen flyout. Passes `mode="internal"` and the `signatureRequestId`.
- **Workflow B ("Collect In-Person" button):** Opens as a full-screen flyout. Passes `mode="external"`. No signatureRequestId.
