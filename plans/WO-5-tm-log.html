# WO-5: T&M Work Order Log — Implementation Plan

## Overview

Extract the existing Jobs list page into a shared `JobList` component, then reuse it for the Work Orders list with different subModel and status configuration. Also adds the Work Orders sidebar navigation entry, a `jobClassification` computed column for TableFeed filtering, `subModelForSave` support in ListTableViews for Board separation, and the DAA backfill/seeding migration (moved from WO-3a) to set up WorkOrder-specific form sections and fields.

**Sequence:** Immediately after WO-1. This is the first frontend work item — it gives Work Orders a visible home in the app.

**Estimated effort:** 2-3 days
**Risk:** Low — refactoring existing working code into a shared component
**Spec:** `tm-work-orders-uis/uis-20e-tm-log.html`
**Requires:** WO-1 (JobClassification enum, WO statuses seeded, Board seeded with tableConfiguration, SQL view with jobClassification column)

---

## Step 1: Extract SharedJobListView

**Create file:** `apps/frontend/src/components/SharedListViews/SharedJobListView.tsx`

Extract the entire `JobListTable` component body from `pages/jobs/index.tsx` into this shared component. Replace all hardcoded values with props.

### What moves out of `pages/jobs/index.tsx`:

- All `useState` hooks (kanbanColumns)
- `useGetJobLazyQuery` for edit handler
- Status query (`GetJobStatus` / `GetStatusProperty`) — parameterize `propertyName`
- `updateJobStatus` mutation
- `updateCardOrder` mutation
- `archiveJobs` / `deleteJobs` / `restoreJobs` mutations
- `relatedDeleteCount` query
- `updateStatus` handler
- `handleEdit` handler
- The `ListTableViews` component with all its props

### Props interface

```typescript
interface ISharedJobListViewProps {
    className?: string;
    subModel: string;
    statusPropertyName: string;
    tableName: string;
    label: string;
    createButtonText: string;
    searchPlaceholder: string;
    detailsRoute: string;
    breadcrumbs: Array<{ name: string; onClick: () => void }>;
    sessionFilterName: string;
}
```

### Key parameterizations in the extracted component

```typescript
// ListTableViews props that change:
<ListTableViews<GqlJob>
    referenceModel="Job"
    subModel={subModel}                    // was hardcoded "Job"
    tableName={tableName}                  // was "Jobs"
    label={label}                          // was "Jobs"
    searchPlaceholder={searchPlaceholder}  // was job-focused text
    createButtonText={createButtonText}    // was "Create Job"
    sessionFilterName={sessionFilterName}  // was "jobs"
    // ... rest unchanged
/>

// Status query — parameterize propertyName:
useQuery(GET_STATUS_PROPERTY, {
    variables: { propertyName: statusPropertyName }  // was "job status"
});

// Kanban card detailsLink:
cardContentLayout={(item) => ({
    title: `${item.fullJobNumber} - ${item.name}`,
    content: (...),
    detailsLink: `${detailsRoute}/${item.id}?tab=overview`  // was `/jobs/${item.id}`
})}

// Create button — open DataModelForm with correct subModel:
createButtonClick={(callback) =>
    openFlyout(
        <JobAddEditForm
            formType={"CREATE" as GqlDataModelFormType}
            subModel={subModel}        // NEW — determines which DAAs load
            onCanceled={closeFlyout}
            onSaved={() => {
                closeFlyout();
                callback();
            }}
        />
    )
}
```

### JobNowClosedModal consideration

The existing Jobs page uses `JobNowClosedModal` for archive confirmation and status-change-to-done handling. This should still work for Work Orders since it operates on the Job model. However, if the modal text is job-specific ("Job is now complete"), it may need parameterization. Evaluate during implementation — for v1 the same text is fine.

## Step 6: TableFeed jobClassification Computed Column

**File:** `apps/api/src/graphql/models/TableFeed/ConfigureColumnsData/job.ts`

The table feed uses the `Job` model for both ProjectJob and WorkOrder lists. To filter by classification, add a `jobClassification` computed column to the Job table feed config:

```typescript
{
    id: "jobClassification",
    label: "Job Classification",
    type: "computed-value",
    isUnique: false,
    isForeignKey: false,
    selectRecordSet: (record) => Prisma.sql`
        SELECT COALESCE(pv.jobClassification, 'ProjectJob') AS value
        FROM Job j
        LEFT JOIN PropertyValue pv ON pv.id = j.jobTypeId
        WHERE j.id = ${record.id}
    `,
    whereIdIn: (value) => {
        const classifications = asArray(value);
        return Prisma.sql`(
            SELECT DISTINCT j.id FROM Job j
            LEFT JOIN PropertyValue pv ON pv.id = j.jobTypeId
            WHERE COALESCE(pv.jobClassification, 'ProjectJob') IN (${Prisma.join(classifications)})
            AND j.isDeleted = false
        )`;
    },
    facetValues: () => Promise.resolve(
        jobClassifications.map((c) => ({ label: c, value: c }))
    )
}
```

The `JobList` component passes `queryVariableDefaultFilters={{ jobClassification: subModel }}` so each list only shows records matching its classification.

## Step 7: subModelForSave Support in ListTableViews

**File:** `apps/frontend/src/components/ListTableViews/ListTableViews.tsx`

The `subModel` prop serves double duty: it's used as the `TableDataName` for the table feed AND for Board filtering. Since `"ProjectJob"` and `"WorkOrder"` are not valid `TableDataName` values (only `"Job"` is), the component needs:

- `subModel="Job"` — for table feed queries (valid enum value)
- `subModelForSave="ProjectJob"` or `"WorkOrder"` — for Board filtering and saving

Add `subModelForSave` to `IListTableViewProps` and pass it through to `ViewTabs`, `TableViewAddEdit` (edit and duplicate), and `ListTableViewTabs`.

## Step 8: Migration — Backfill Existing DAAs + Duplicate Shared + Create WO DAAs

> **Note:** This step was originally in WO-3a but was moved here because the Board edit form needs the correct DAA columns to display for each subModel.

**Create file:** `apps/api/prisma/migrations/[timestamp]_wo_3a_daa_setup/migration.sql`

**Pattern:** Follows the Expense separation migration (`20241209145000_expense_document_attribute_complete_separation`) exactly. NO comma-delimited subModel values — single values only. Shared fields are DUPLICATED into both `ProjectJob` and `WorkOrder` sets.

This migration does four things:
1. Backfills all existing Job DAAs to `subModel = "ProjectJob"`
2. Backfills all existing Job DocumentSections to `subModel = "ProjectJob"`
3. Creates WO DocumentSections with `subModel = "WorkOrder"`
4. Duplicates shared Job DAAs into the WO sections + creates WO-only DAAs

### 8a. Backfill existing Job DAAs and sections to ProjectJob

```sql
UPDATE `DocumentAttributeAssignment`
SET `subModel` = 'ProjectJob'
WHERE `referenceModel` = 'Job'
AND (`subModel` IS NULL OR `subModel` = '');

UPDATE `DocumentSection`
SET `subModel` = 'ProjectJob'
WHERE `referenceModel` = 'Job'
AND (`subModel` IS NULL OR `subModel` = '');
```

### 8b. Create WO DocumentSections

```sql
INSERT INTO `DocumentSection` (`id`, `createdAt`, `updatedAt`, `referenceModel`, `subModel`, `name`, `label`, `orderNo`)
VALUES
    (SUBSTRING(MD5(UUID()), 1, 21), NOW(), NOW(), 'Job', 'WorkOrder', 'Work Order Info', 'Work Order Info', 0),
    (SUBSTRING(MD5(UUID()), 1, 21), NOW(), NOW(), 'Job', 'WorkOrder', 'Labor', 'Labor', 1),
    (SUBSTRING(MD5(UUID()), 1, 21), NOW(), NOW(), 'Job', 'WorkOrder', 'Materials', 'Materials', 2),
    (SUBSTRING(MD5(UUID()), 1, 21), NOW(), NOW(), 'Job', 'WorkOrder', 'Equipment', 'Equipment', 3),
    (SUBSTRING(MD5(UUID()), 1, 21), NOW(), NOW(), 'Job', 'WorkOrder', 'Signatures', 'Signatures', 4);
```

### 8c. Duplicate shared Job DAAs into WO "Work Order Info" section

```sql
INSERT INTO `DocumentAttributeAssignment` (...)
SELECT
    SUBSTRING(MD5(UUID()), 1, 21),
    NOW(), NOW(),
    'Job', 'WorkOrder',
    daa.orderNo,
    (SELECT id FROM DocumentSection WHERE referenceModel = 'Job' AND subModel = 'WorkOrder' AND name = 'Work Order Info' LIMIT 1),
    daa.defaultAttribute, daa.defaultAttributeLabel, daa.defaultAttributeType,
    daa.defaultAttributeIsRequired, daa.defaultAttributeIsDerived, daa.slug, daa.referenceColumn
FROM DocumentAttributeAssignment daa
WHERE daa.referenceModel = 'Job' AND daa.subModel = 'ProjectJob'
AND daa.defaultAttribute IN (
    'job-number', 'job-name', 'job-description', 'job-rate-type',
    'job-wage-region', 'job-purchase-order', 'job-status', 'job-type',
    'job-customer', 'job-contact', 'job-location'
);
```

### 8d. Create WO-only DAAs

New DAAs for `wo-date-of-work` (date), `wo-labor-items` (objects), `wo-material-items` (objects), `wo-equipment-items` (objects), `wo-signatures` (objects) — each assigned to their respective WO DocumentSection.
