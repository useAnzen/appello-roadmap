# WO-3b: Line Item Editors — Implementation Plan

## Overview

A new shared **TimeEntryTable** component (extracted from `TimesheetModification`) plus three custom input components (LaborItemEditor, MaterialItemEditor, EquipmentItemEditor) that replace the `<p>` tag placeholders in the DataModelForm's `customFormControl` from WO-3a. `TimeEntryTable` provides the tabular rate-label hour entry with optional cost code breakdown — shared between the existing timesheet form and the new WO labour editor. Both the LaborItemEditor and EquipmentItemEditor follow the same dual-source pattern: **structured entries** via the existing timesheet infrastructure (TimeSheetRecord for labour, EquipmentTimeSheetRecordValue for equipment) plus **blank lines** for ClearStory-style flexible entry.

**Estimated effort:** 7-9 days
**Risk:** Medium-High — extracting TimeEntryTable from TimesheetModification requires careful refactoring to avoid regression; structured labour and equipment editors integrate with scheduling permissions and timesheet infrastructure
**Spec:** `tm-work-orders-uis/uis-20c-2-line-item-editors.html`
**Requires:** WO-3a (DAA positions + customFormControl), WO-2 (blank-line models + upsertWorkOrderLineItems mutation), EQ-0 (EquipmentTimeSheetRecordValue model + mutations), PR #6831 (DataModelForm)

---

## Step 1: Shared Patterns and Utilities

Before building the three editors, establish shared patterns they all use.

### 1a. AddLineDropdown component

Material and Equipment editors use the same "+ Add [Type] ▾" dropdown with "Structured Line" and "Blank Line" options. The Labor editor uses a similar dropdown but with "Log Time" (creates TimeSheetRecord) and "Blank Line" (creates WorkOrderLaborItem) options.

**Create file:** `apps/frontend/src/components/WorkOrder/AddLineDropdown.tsx`

```typescript
interface IAddLineDropdownProps {
    label: string;  // "Labor", "Material", "Equipment"
    onAddStructured: () => void;
    onAddBlank: () => void;
    structuredLabel?: string;  // default "Structured Line", override to "Log Time" for labor
    structuredHelper?: string; // helper text for the structured option
    blankHelper?: string;      // helper text for the blank option
}
```

- Uses `Popover` from `@headlessui/react` (existing dependency) or a simple dropdown state
- Two options: structured option with helper text + "Blank Line" with helper text
- Green button styling matching the mockups

### 1b. Line item row visual convention

- Structured rows: solid `border` + `bg-gray-50` background
- Blank rows: dashed `border-dashed border-gray-300` + white background
- Delete button: `IconTrash` icon, red, right-aligned, on every row
- Each row is a self-contained card with padding

### 1c. Duration/hours utility

Use the existing `convertHoursToSeconds` / `convertSecondsToHours` helpers if they exist in the codebase. Only create new ones if not already available.

## Step 2: Shared TimeEntryTable Component

Extract the tabular rate-label entry, trade-level row management, and cost code sub-row logic from `TimesheetModification` into a reusable component.

**Create file:** `apps/frontend/src/components/Forms/TimeEntryTable/TimeEntryTable.tsx`

### Props

```typescript
interface ITimeEntryTableProps {
    className?: string | ClassNames;
    jobId: string;
    viewOnly?: boolean;
    // Date-grouped data
    dateGroups: ITimeEntryDateGroup[];
    onDateGroupsChange: (groups: ITimeEntryDateGroup[]) => void;
    // Cost code support
    costCodes?: GqlCostCode[];     // available cost codes for the job
    showCostCodes?: boolean;       // enables "Split by Cost Code" button
}

interface ITimeEntryDateGroup {
    workDate: string;               // YYYY-MM-DD
    rows: ITimeEntryRow[];
    isApproved?: boolean;           // true if TimeSheetRecord for this date is Approved → all rows read-only
}

interface ITimeEntryRow {
    id?: string;                    // temp ID or persisted
    userId: string;                 // which user this entry is for
    tradeLevelId: string;           // selected trade level for this entry
    hours: Record<string, number>;  // rateLabelId → seconds
    costCodeRows?: ICostCodeRow[];  // reuse from types.ts
    // Derived per-row (loaded when user is selected):
    // - EmployeeAgreement (from user)
    // - Active EmployeeAgreementContract (from agreement + parent group's workDate)
    // - Available TradeLevels + RateLabels (from contract, filtered by wage region)
}
```

### What it renders

**Date-grouped layout.** A WO may span multiple days, so entries are grouped by work date. Each date group is a collapsible section with its own table of rows.

**Date group header:**
- Date display (e.g., "Apr 7, 2026") with date picker to change
- Row count and total hours for the group
- `IconTrash` to remove the entire date group (if not Approved)

**Table within each date group:**
- **Header row:** User | Trade Level | [Rate Label columns] | Total | ×
- **User column:** User dropdown per row. Selecting a user loads their `EmployeeAgreement`. Combined with the group's work date, the active `EmployeeAgreementContract` is resolved to populate the Trade Level and Rate Label columns.
- **Trade Level column:** Dropdown per row, populated from the user's active contract for the group's work date. Users may work at different trade levels depending on the task (e.g., Journeyman on one entry, Foreman on another). Maps to the optional `tradeLevelId` on `TimeSheetDetailRecord` (WO-2 Step 0).
- **Rate label columns:** Populated from the user's active contract + wage region. Numeric inputs (`step={0.25}`, stored as seconds). Total column is computed sum. `IconTrash` delete button per row.
- **Cost code sub-rows:** Indented beneath the parent row. Cost code combobox + same rate label columns. Added via "Split by Cost Code" link.
- **Footer:** "+ Add Row" link + "Split by Cost Code" link + column totals for the group

**Global footer:** "+ Add Date" button to add a new date group (defaults to today or next available date).

### Reusing existing pieces

- `TimesheetRateLabelColumns.tsx` — reuse directly for the rate label input cells (already takes `getValue`/`onChange` callbacks)
- `TimesheetCostCodeRow.tsx` / `TimesheetCostCodeSection.tsx` — reuse for cost code sub-rows
- `helpers.ts` — reuse `validateJobCostCodes()`, `calculateCostCodeRowTotal()`, `autoAssignHoursToSingleRow()`

### Refactoring TimesheetModification

**Modify file:** `apps/frontend/src/components/Forms/TimesheetAddEditForm/TimesheetModification.tsx`

Refactor to wrap `TimeEntryTable` instead of inline implementation:
- `TimesheetModification` continues to handle: submitted times, check-in columns, zone travel, unscheduled job selector, the imperative ref API (`getData`, `validateCostCodes`, `getCostCodeData`)
- The core table rendering (trade level rows + rate label inputs + cost code sub-rows) delegates to `TimeEntryTable`
- No UI or functional regression — existing timesheet form must work identically

## Step 3: LaborItemEditor

**Create file:** `apps/frontend/src/components/WorkOrder/LaborItemEditor.tsx`

### Architecture

The LaborItemEditor manages two distinct types of labour entries:

1. **Structured (Log Time)** — Embeds the existing log-time interface to create **TimeSheetRecord / TimeSheetDetailRecord** entries for the WO job. Uses the existing scheduling and unscheduled-job workflow based on user permissions. These entries roll up into timesheets, scheduling, and payroll automatically.
2. **Blank lines** — Free-form entries stored as **WorkOrderLaborItem** records (description, rate, hours, qty). ClearStory-style flexible entry for ad-hoc labour.

### Props

```typescript
interface ILaborItemEditorProps {
    className?: string | ClassNames;
    jobId: string;
    items: ILaborRow[];
    setItems: (items: ILaborRow[]) => void;
}

type ILaborRow = ITimesheetLaborRow | IBlankLaborRow;

// Represents a TimeSheetRecord entry for the WO job
interface ITimesheetLaborRow {
    type: "timesheet";
    timeSheetRecordId?: string;  // set when viewing existing entries
    // Display fields loaded from the TimeSheetRecord:
    employeeName?: string;
    tradeLevelName?: string;
    date?: string;
    totalHours?: number;
}

// Represents a WorkOrderLaborItem (blank/unstructured line)
interface IBlankLaborRow {
    id?: string;  // set when editing existing
    type: "blank";
    orderNo: number;
    description: string;
    qtyOfWorkers: number;
    submittedDuration: number;  // seconds
    rate: number;
}
```

### Structured (Log Time) section

Renders the `TimeEntryTable` component (from Step 2) inline with date-grouped layout. Existing timesheet entries for the WO job are loaded and grouped by `TimeSheetRecord.workDate` on mount. New date groups added via "+ Add Date", new rows within a group added via "+ Add Row".

**Data loading on mount:** Query existing TimeSheetRecords for the WO job and group by workDate:
```graphql
query TimesheetRecordsForJob($jobId: String!) {
    timeSheetRecords(options: { where: { jobId: $jobId } }) {
        id
        workDate
        status
        TimeSheetDetailRecords {
            id
            tradeLevelId
            secondsAtService
            Employee { firstName, lastName }
            TradeLevelRate {
                TradeLevel { name }
                EmployeeAgreementRateLabel { name }
            }
        }
    }
}
```

Each `TimeSheetRecord` (one per user per workDate per job) maps to rows within a date group. Multiple users on the same date appear as rows within the same date group.

**Inline editing:**
- Entries grouped by work date — each date group is a collapsible section with its own table
- Within each group: rows for User, Trade Level, rate label hour columns, cost code sub-rows
- Selecting a **user** loads their EmployeeAgreement. Combined with the group's work date, the active EmployeeAgreementContract is resolved, populating available trade levels and rate labels for that row
- Date groups from Approved timesheets render read-only (all inputs disabled)
- Scheduling permissions apply: if the user is not scheduled to the WO job and lacks permission for unscheduled jobs, the "Log Time" option shows a permission message
- **No "Save Entry" button** — all structured rows save together with the form on Save Draft / Submit

### Blank row rendering

Simpler layout (unchanged from prior plan):
- Description (text input, required)
- Workers qty (number input)
- Hours (number input, single column)
- Rate (CurrencyInput)

### Adding rows

The "+ Add Labor" dropdown has two options:
- **"Log Time"** — adds a new editable row to the TimeEntryTable (User, Trade Level, rate label columns). Row is in local state until form save.
- **"Blank Line"** — adds a new blank row (description, workers, hours, rate).

### Subtotal

At the bottom of the editor, show total hours across both sources:

```typescript
// Structured hours from TimeSheetRecords
const timesheetHours = timesheetRecords.reduce((sum, record) => {
    const recordHours = record.TimeSheetDetailRecords.reduce(
        (s, detail) => s + (detail.secondsAtService / 3600), 0
    );
    return sum + recordHours;
}, 0);

// Blank line hours from WorkOrderLaborItems
const blankHours = items
    .filter(item => item.type === "blank")
    .reduce((sum, item) => sum + ((item.submittedDuration / 3600) * item.qtyOfWorkers), 0);

const totalHours = timesheetHours + blankHours;
```

Display: `Total Labor Hours: 30.0 hrs (2 timesheet entries · 1 blank)`

## Step 5: EquipmentItemEditor

**Create file:** `apps/frontend/src/components/WorkOrder/EquipmentItemEditor.tsx`

### Architecture

Same dual-source pattern as the LaborItemEditor:

1. **Structured equipment** — Creates `EquipmentTimeSheetRecordValue` entries (from EQ-0) linked to the WO job's TimeSheetDetailRecords. Tabular layout mirroring the TimeEntryTable pattern. All rows are editable inputs, saved together with the form on Save Draft / Submit.
2. **Blank lines** — Free-form entries stored as `WorkOrderEquipmentItem` records (description, quantity, unit rate). Also saved on form submit.

### Props

```typescript

    className?: string | ClassNames;
    jobId: string;
    dateGroups: IEquipmentDateGroup[];
    onDateGroupsChange: (groups: IEquipmentDateGroup[]) => void;
    blankItems: IBlankEquipmentRow[];
    setBlankItems: (items: IBlankEquipmentRow[]) => void;
}

interface IEquipmentDateGroup {
    workDate: string;               // YYYY-MM-DD
    rows: IStructuredEquipmentRow[];
    isApproved?: boolean;           // true if TimeSheetRecord for this date is Approved → all rows read-only
}

interface IStructuredEquipmentRow {
    id?: string;  // EquipmentTimeSheetRecordValue ID when editing existing
    equipmentId: string;
    equipmentName?: string;
    equipmentRateLabelId: string;
    per: string;
    operatorIncluded: boolean;
    isFullDayBilling: boolean;
    submittedDuration: number;  // seconds
    meterStart?: number;
    meterEnd?: number;
    costCodeRows?: ICostCodeRow[];  // reuse from TimesheetAddEditForm/types.ts

### Structured equipment (date-grouped tabular entry)

Same date-grouped pattern as the LaborItemEditor. Entries grouped by work date — each date group is a collapsible section with its own table of equipment rows. Existing EquipmentTimeSheetRecordValues loaded and grouped by `TimeSheetRecord.workDate` on mount.

**Date group header:** Date display with date picker, row count, total duration, `IconTrash` to remove group (if not Approved).

**Table within each date group:**

| Column | Description |
|--------|------------|
| Equipment | `CustomCombobox` searching Equipment catalog (Solr-indexed). On select, loads `EquipmentRateLabels` for the category. |
| Rate Type | Dropdown from loaded EquipmentRateLabels (Standard, Standby, OT, etc.) |
| Per | Dropdown (Hour, Day, Week, Month, Year) |
| Duration | Number input labeled by `per`, stored in seconds. Auto-calculated from meter readings for hour-meter equipment. |
| Meter Start / End | Optional numeric inputs (shown based on equipment meter type configuration) |
| `IconTrash` | Delete button per row |

**Cost code sub-rows:** Same pattern as the TimeEntryTable — "Split by Cost Code" adds sub-rows beneath an equipment row. Each sub-row has a cost code selector + duration. Uses the existing `EquipmentTimeSheetRecordCostCodeValue` model from EQ-0. Same validation (cost code hours must sum to parent row duration) and auto-assignment logic.

**Adding:** "+ Add Row" within a date group adds a new equipment row. "+ Add Date" adds a new date group. "+ Add Equipment" dropdown also has "Blank Line" option for unstructured entries.

**No "Save Entry" button** — all structured rows save together with the form.

### Blank row

- Description: text input (required)
- Qty: number input
- Rate: `CurrencyInput`

### Subtotal

Show combined totals from both sources:
`Total Equipment: 8.0 hrs + 2 days (2 structured · 1 blank)`

        // Load existing blank labour items (WorkOrderLaborItem)

### On form save

Intercept the DataModelForm's save handler to save all line items together. The save handler processes **three mutation calls**:

1. **Structured labour + equipment** — calls `editFullTimeRecord` (from EQ-0 extensions) with both labour values (TimeSheetDetailRecordValues) and equipment values (EquipmentTimeSheetRecordValues). This creates/updates the TimeSheetRecord for the WO job with all structured entries.
2. **Blank labour + blank equipment + material** — calls `upsertWorkOrderLineItems` (from WO-2) with blank WorkOrderLaborItems, WorkOrderMaterialItems, and blank WorkOrderEquipmentItems.
3. **Job record** — saved via DataModelForm's normal save.

```typescript
const handleSave = async (formData) => {
    // 1. Save the Job via DataModelForm's normal save
    const savedJob = await saveJob(formData);

    // 2. Save structured labour + equipment via timesheet mutation
    //    This creates/updates TimeSheetRecord + TimeSheetDetailRecords
    //    with both labour values and equipment values for the WO job
    const structuredLaborValues = transformStructuredLaborToTimesheetValues(laborItems);
    const structuredEquipValues = transformStructuredEquipToTimesheetValues(equipmentItems);

    if (structuredLaborValues.length > 0 || structuredEquipValues.length > 0) {
        await editFullTimeRecord({
            variables: {
                record: { /* TimeSheetRecord for this job/date/user */ },
                values: structuredLaborValues,
                equipmentValues: structuredEquipValues,
                costCodeRecords: transformCostCodeRecords(laborItems),
                // equipmentCostCodeRecords handled within equipmentValues
            }
        });
    }

    // 3. Save blank items via WO line item upsert
    const blankLaborInput = transformBlankLaborRowsToInput(laborItems);
    const materialInput = transformMaterialRowsToInput(materialItems);
    const blankEquipInput = transformBlankEquipmentRowsToInput(equipmentItems);

    await upsertWorkOrderLineItems({
        variables: {
            input: {
                jobId: savedJob.id,
                laborItems: blankLaborInput,
                materialItems: materialInput,
                equipmentItems: blankEquipInput
            }
        }
    });
};
```

### Transform functions

```typescript
// Structured labour → TimeSheetDetailRecordValue inputs
function transformStructuredLaborToTimesheetValues(rows: ILaborRow[]) {
    return rows
        .filter(row => row.type === "timesheet" && !row.isApproved)
        .flatMap(row => /* transform to EditOrCreateTimeSheetDetailRecordValue[] */);
}

// Structured equipment → UpsertEquipmentTimeSheetRecordValueInput[]
function transformStructuredEquipToTimesheetValues(rows: IStructuredEquipmentRow[]) {
    return rows
        .filter(row => !row.isApproved)
        .map(row => ({
            id: row.id,
            equipmentId: row.equipmentId,
            equipmentRateLabelId: row.equipmentRateLabelId,
            per: row.per,
            operatorIncluded: row.operatorIncluded,
            isFullDayBilling: row.isFullDayBilling,
            submittedDuration: row.submittedDuration,
            meterStart: row.meterStart,
            meterEnd: row.meterEnd
        }));
}

// Blank labour → UpsertWorkOrderLaborItemInput[]
function transformBlankLaborRowsToInput(rows: ILaborRow[]) {
    return rows
        .filter((row): row is IBlankLaborRow => row.type === "blank")
        .map(row => ({
            id: row.id,
            rate: row.rate,
            qtyOfWorkers: row.qtyOfWorkers,
            submittedDuration: row.submittedDuration,
            description: row.description,
            orderNo: row.orderNo
        }));
}

// Blank equipment → UpsertWorkOrderEquipmentItemInput[]
function transformBlankEquipmentRowsToInput(rows: IBlankEquipmentRow[]) {
    return rows.map(row => ({
        id: row.id,
        unitRate: row.unitRate,
        quantity: row.quantity,
        description: row.description,
        orderNo: row.orderNo
    }));
}
```
