# EQ-0: Equipment Time Schema — Implementation Plan

## Overview

Standalone equipment time tracking as a first-class entity. Equipment time is decoupled from the labour timesheet system — entries do not require a user or a `TimeSheetDetailRecord`. This handles all real-world scenarios: operator-logged time, unattended equipment (generators, pumps), dry hire, overhead/shop use, and foreman-logged entries for crew.

This plan creates two new Prisma models (`EquipmentTimeEntry`, `EquipmentTimeEntryCostCode`), TypeScript types, model classes, GraphQL resolvers, permission seeds, and approval mutations. **No UI work** — UIS-15H (Equipment Timesheet UI) and WO-3b (Line Item Editors) consume these models.

**Decision:** Option B from the [data model options analysis](EQ-0-data-model-options.html) — standalone `EquipmentTimeEntry` with optional operator, optional job, own approval status.

**Estimated effort:** 3-4 days
**Risk:** Medium — new standalone model with its own approval flow
**Spec:** `appello-sdlc/docs/uis-15h-equipment-timesheet-capture.html` (full spec, this plan covers backend only)
**Requires:** LEM-2 (EquipmentRateLabel, EquipmentRateValue, EquipmentRateSchedule, resolveEquipmentRate)
**Enables:** UIS-15H (Equipment Timesheet UI), WO-2 (structured equipment on Work Orders)

---

## Step 1: Prisma Schema — 2 New Models

**File:** `apps/api/prisma/schema.prisma`

### 1a. EquipmentTimeEntry

```prisma
model EquipmentTimeEntry {
  id                    String              @id @db.VarChar(21)
  isDeleted             Boolean             @default(false)
  isArchived            Boolean             @default(false)
  createdAt             DateTime            @default(now())
  updatedAt             DateTime            @default(now()) @updatedAt

  // Core: what equipment, where, when, how long
  equipmentId           String              @db.VarChar(21)
  Equipment             Equipment           @relation(fields: [equipmentId], references: [id])
  jobId                 String?             @db.VarChar(21)
  Job                   Job?                @relation(fields: [jobId], references: [id])
  jobScheduleId         String?             @db.VarChar(21)
  JobSchedule           JobSchedule?        @relation(fields: [jobScheduleId], references: [id])
  workDate              DateTime            @db.Date

  // Rate resolution
  equipmentRateLabelId  String              @db.VarChar(21)
  EquipmentRateLabel    EquipmentRateLabel  @relation(fields: [equipmentRateLabelId], references: [id])
  per                   String              @default("HOUR")      // HOUR | DAY | WEEK | MONTH | YEAR
  operatorIncluded      Boolean             @default(true)        // wet hire vs dry hire
  isFullDayBilling      Boolean             @default(true)

  // Duration
  submittedDuration     Int                 @default(0)           // seconds
  approvedDuration      Int                 @default(0)           // seconds

  // Meter readings (optional, for audit trail / FEMA)
  meterStart            Decimal?            @db.Decimal(12, 1)
  meterEnd              Decimal?            @db.Decimal(12, 1)

  // Rate schedule snapshot (set at approval time)
  equipmentRateScheduleId String?           @db.VarChar(21)
  EquipmentRateSchedule   EquipmentRateSchedule? @relation(fields: [equipmentRateScheduleId], references: [id])

  // Operator (optional — not required for unattended equipment)
  operatorUserId        String?             @db.VarChar(21)
  OperatorUser          User?               @relation("EquipmentTimeEntryOperator", fields: [operatorUserId], references: [id])

  // Who logged this entry (always set — accountability)
  createdByUserId       String              @db.VarChar(21)
  CreatedByUser         User                @relation("EquipmentTimeEntryCreator", fields: [createdByUserId], references: [id])

  // Approval (own status — independent from labour timesheets)
  status                String              @default("DRAFT")     // DRAFT | SUBMITTED | APPROVED | REJECTED
  approvedByUserId      String?             @db.VarChar(21)
  ApprovedByUser        User?               @relation("EquipmentTimeEntryApprover", fields: [approvedByUserId], references: [id])

  // Attachment parent link (excavator + breaker sub-line)
  parentEquipmentTimeEntryId String?        @db.VarChar(21)
  ParentEquipmentTimeEntry   EquipmentTimeEntry? @relation("AttachmentSubLines", fields: [parentEquipmentTimeEntryId], references: [id])
  AttachmentSubLines         EquipmentTimeEntry[] @relation("AttachmentSubLines")

  // Cost codes
  EquipmentTimeEntryCostCodes EquipmentTimeEntryCostCode[]

  @@index([equipmentId, workDate, isDeleted])
  @@index([jobId, workDate, isDeleted])
  @@index([operatorUserId, workDate, isDeleted])
  @@index([status, isDeleted])
  @@index([parentEquipmentTimeEntryId, isDeleted])
}
```

### 1b. EquipmentTimeEntryCostCode

```prisma
model EquipmentTimeEntryCostCode {
  id                        String              @id @db.VarChar(21)
  isDeleted                 Boolean             @default(false)
  isArchived                Boolean             @default(false)
  createdAt                 DateTime            @default(now())
  updatedAt                 DateTime            @default(now()) @updatedAt

  equipmentTimeEntryId      String              @db.VarChar(21)
  EquipmentTimeEntry        EquipmentTimeEntry  @relation(fields: [equipmentTimeEntryId], references: [id])

  costCodeId                String              @db.VarChar(21)
  CostCode                  CostCode            @relation(fields: [costCodeId], references: [id])

  approvedDuration          Int                 @default(0)    // seconds

  @@index([equipmentTimeEntryId, costCodeId, isDeleted])
}
```

### 1c. Relations on existing models

```prisma

EquipmentTimeEntries EquipmentTimeEntry[]

// On Job:
EquipmentTimeEntries EquipmentTimeEntry[]

// On JobSchedule:
EquipmentTimeEntries EquipmentTimeEntry[]

// On EquipmentRateLabel:
EquipmentTimeEntries EquipmentTimeEntry[]

// On EquipmentRateSchedule:
EquipmentTimeEntries EquipmentTimeEntry[]

// On User (3 separate relations):
EquipmentTimeEntriesAsOperator   EquipmentTimeEntry[] @relation("EquipmentTimeEntryOperator")
EquipmentTimeEntriesCreated      EquipmentTimeEntry[] @relation("EquipmentTimeEntryCreator")
EquipmentTimeEntriesApproved     EquipmentTimeEntry[] @relation("EquipmentTimeEntryApprover")

// On CostCode:

---

## Step 4: Model Class

**Create file:** `apps/api/src/models/EquipmentTimeEntry.ts`

Standard BaseModel with modelFields matching the type interface. Key methods:

### upsertEquipmentTimeEntry

Single create/update. Sets `createdByUserId` from the session user on create. Resolves `equipmentRateScheduleId` from the active schedule for the equipment's category and the work date.

### upsertManyEquipmentTimeEntries

Batch save. Accepts an array of equipment time entries, creates new ones (no `id`) and updates existing ones (with `id`). Used by the timesheet form and WO form when saving multiple equipment entries at once.

### submitEquipmentTimeEntries

Transitions `status` from `DRAFT` to `SUBMITTED` for a set of entry IDs. Validates required fields (equipment, workDate, duration > 0).

### approveEquipmentTimeEntries

Transitions `status` from `SUBMITTED` to `APPROVED`. Sets `approvedByUserId` and `approvedDuration`. Snapshots `equipmentRateScheduleId` to the active schedule for the work date if not already set.

### rejectEquipmentTimeEntries

Transitions `status` from `SUBMITTED` to `REJECTED`. Sets `approvedByUserId`.

## Step 5: GraphQL Resolver

**Create file:** `apps/api/src/graphql/models/EquipmentTimeEntry.ts`

```graphql
type EquipmentTimeEntry {
    id: ID!
    equipmentId: String!
    Equipment: Equipment
    jobId: String
    Job: Job
    jobScheduleId: String
    JobSchedule: JobSchedule
    workDate: DateTime!
    equipmentRateLabelId: String!
    EquipmentRateLabel: EquipmentRateLabel
    per: String!
    operatorIncluded: Boolean!
    isFullDayBilling: Boolean!
    meterStart: Float
    meterEnd: Float
    submittedDuration: Int!
    approvedDuration: Int!
    equipmentRateScheduleId: String
    EquipmentRateSchedule: EquipmentRateSchedule
    operatorUserId: String
    OperatorUser: User
    createdByUserId: String!
    CreatedByUser: User
    status: String!
    approvedByUserId: String
    ApprovedByUser: User
    parentEquipmentTimeEntryId: String
    ParentEquipmentTimeEntry: EquipmentTimeEntry
    AttachmentSubLines: [EquipmentTimeEntry]
    EquipmentTimeEntryCostCodes: [EquipmentTimeEntryCostCode]
}

type EquipmentTimeEntryCostCode {
    id: ID!
    equipmentTimeEntryId: String!
    costCodeId: String!
    CostCode: CostCode
    approvedDuration: Int!
}

input UpsertEquipmentTimeEntryInput {
    id: ID
    equipmentId: String!
    jobId: String
    jobScheduleId: String
    workDate: DateTime!
    equipmentRateLabelId: String!
    per: String
    operatorIncluded: Boolean
    isFullDayBilling: Boolean
    meterStart: Float
    meterEnd: Float
    submittedDuration: Int!
    approvedDuration: Int
    operatorUserId: String
    parentEquipmentTimeEntryId: String
}

input UpsertEquipmentTimeEntryCostCodeInput {
    id: ID
    equipmentTimeEntryId: String!
    costCodeId: String!
    approvedDuration: Int
}

extend type Query {
    equipmentTimeEntries(
        equipmentId: String
        jobId: String
        operatorUserId: String
        workDate: DateTime
        status: String
    ): [EquipmentTimeEntry]
}

extend type Mutation {
    upsertEquipmentTimeEntry(data: UpsertEquipmentTimeEntryInput!): EquipmentTimeEntry
    upsertManyEquipmentTimeEntries(data: [UpsertEquipmentTimeEntryInput!]!): Boolean
    deleteEquipmentTimeEntry(id: ID!): Boolean
    submitEquipmentTimeEntries(ids: [ID!]!): Boolean
    approveEquipmentTimeEntries(ids: [ID!]!): Boolean
    rejectEquipmentTimeEntries(ids: [ID!]!): Boolean
    upsertEquipmentTimeEntryCostCode(data: UpsertEquipmentTimeEntryCostCodeInput!): EquipmentTimeEntryCostCode
    deleteEquipmentTimeEntryCostCode(id: ID!): Boolean
}
```

Register in `apps/api/src/graphql/schema.ts` (5 places: import, Resolvers, Query, Mutation, typeDefs).
