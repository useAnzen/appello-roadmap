# MAT-2b: LEM Material Consumption — Mobile Logging

## Overview

Mobile interface for field workers to log material consumption per job per day. Uses the `MaterialConsumptionEntry` model from MAT-2a — no new models needed.

**Estimated effort:** 3-4 days
**Risk:** Low — mobile UI only, reuses existing model
**Deps:** MAT-2a (MaterialConsumptionEntry model must exist)

---

## Step 1: Mobile Material Consumption Form

**Create file:** `apps/mobile/src/components/MaterialConsumption/MobileMaterialConsumptionForm.tsx`

Stepped form (3 steps):
1. Select Material — catalog picker (SelectionSlideup from material catalog) or free-text description entry
2. Enter Quantity — quantity input + unit selector + optional cost code
3. Review + Submit — summary card, submit button

Key patterns to follow from existing mobile forms:
- Use `ProgressionBar` for step progress
- Fixed bottom Next/Submit button
- Material picker via `SelectionSlideup` modal (60px touch targets)
- Cost code picker from job's assigned cost codes

---

## Step 2: Mobile Pages

### 2a. Entry Page

**Create file:** `apps/mobile/src/pages/job-sites/[id]/material-consumption/new.tsx`

Entry point from job site detail page. Pre-filled with jobId and current date.

### 2b. List Page

**Create file:** `apps/mobile/src/pages/job-sites/[id]/material-consumption/index.tsx`

List of previous entries for this job. Grouped by date. Shows material name, quantity, unit, status badge.

---

## Step 3: Job Site Action Integration

**File:** `apps/mobile/src/components/JobViews/SimplifiedJobTasks.tsx` (or equivalent job site action list)

Add "Log Material" action button that navigates to the material consumption entry page.

---

## Verification Checklist

- [ ] Field workers can log material consumption per job per day from mobile
- [ ] Stepped form: select material → enter quantity + unit → assign cost code → submit
- [ ] Material picker works from catalog (SelectionSlideup) and free-text fallback
- [ ] Entries created with status "Draft" or "Submitted" based on permission
- [ ] View previous day's entries for the same job (list page)
- [ ] Offline support for entry creation (sync when connected)
- [ ] "Log Material" action appears on job site detail page
- [ ] No new Prisma models — uses MaterialConsumptionEntry from MAT-2a

---

<script>
(function() {
    var md = document.getElementById('plan-md').textContent;
    var target = document.getElementById('rendered');
    var html = md
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
            return '<pre><code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
        })
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr>');
    html = html.replace(/^- \[ \] (.+)$/gm, '<div class="check-item"><div class="check-box"></div><span>$1</span></div>');
    html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var headers = rows[0].split('|').filter(function(c) { return c.trim(); });
        var isSep = /^[\s|:\-]+$/.test(rows[1]);
        var start = isSep ? 2 : 1;
        var out = '<table><thead><tr>';
        headers.forEach(function(h) { out += '<th>' + h.trim() + '</th>'; });
        out += '</tr></thead><tbody>';
        for (var i = start; i < rows.length; i++) {
            var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
            out += '<tr>'; cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; }); out += '</tr>';
        }
        out += '</tbody></table>';
        return out;
    });
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    html = html.replace(/^(?!<[hultdps\/<]|<\/|<code|<pre|<hr|<div|<strong|<em)(.+)$/gm, '<p>$1</p>');
    target.innerHTML = html;
})();
</script>
