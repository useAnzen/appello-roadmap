# WO-8b: Collect Signatures — Implementation Plan

## Overview

Two signature collection workflows for submitted work orders: **Request Signature** (send notification to internal Appello user, they open WO and sign — mirrors form ACK pattern) and **Collect In-Person** (hand device to external person who signs on-screen without an account). Both use the combined `Signature` model from WO-3a (which handles both requests and completed signatures via the `status` field) and the `readOnlySummary` renderers from WO-8a.

**Estimated effort:** 2-3 days
**Risk:** Low-Medium — notification integration, device handoff UX (no new model needed — uses combined Signature model from WO-3a)
**Spec:** `tm-work-orders-uis/uis-20h-2-collect-signatures.html`
**Requires:** WO-3a (combined Signature model with signerId/signerModel/status/requestedById), WO-3c (signature canvas), WO-4 (detail page), WO-8a (readOnlySummary renderers)

---

## Step 1: No New Prisma Model Needed

The combined `Signature` model from WO-3a handles both signature requests and completed signatures. No separate `SignatureRequest` table is needed.

**How it works:**

- **Requesting a signature** = `createSignature` with `status: "PENDING"`, `signerModel: "User"`, `signerId: <requestedUserId>`, no `assetId`
- **Signing (completing a request)** = `editSignature` to set `assetId`, `status: "SIGNED"`, `signedAt`, GPS coords
- **Collecting in-person** = `createSignature` with `status: "SIGNED"`, `signerModel: "External"`, `signerName`/`signerEmail`/`signerCompany`, `assetId` attached immediately
- **Declining** = `editSignature` to set `status: "DECLINED"`

The `requestedById` field (set from `context.userId()` by the resolver) tracks who initiated the signature — either the person requesting an internal user's signature or the person collecting an in-person signature.

---

## Step 2: Notification — Request + Signed

**File:** `apps/api/src/models/Signature.ts`

Add notification methods to the existing Signature model class, following the `Acknowledge.handleAckNotification` pattern:

Both methods follow the `Acknowledge.handleAckNotification` pattern:

1. Fetch the related Job via `new JobModel().getItem()`
2. Fetch the user via `new UserModel().getItem()`
3. Push to activity feed via `super.pushToActivityFeed()`
4. Create notification + notification status via the existing `NotificationModel` and `NotificationStatusModel` methods
5. Send push notification via `NotificationModel.sendPushNotification()`

### `handleRequestNotification` (called after `createItem` when `status = "PENDING"`)

- Resolves the signer from `signerId` (when `signerModel = "User"`)
- Pushes "Signature Requested" to the signer's activity feed
- Creates a `SIGNATURE_REQUEST` notification for the signer
- Sends FCM push: `"[Requester] requested your signature on [WO Number]"`

### `handleSignedNotification` (called after `editItem` when status transitions to `"SIGNED"`)

- Sends `SIGNATURE_COMPLETED` push to the `requestedById` user: `"[Signer] signed [WO Number]"`

### Add Notification Types

**File:** `apps/api/src/types/Notification.types.ts`

Add `SIGNATURE_REQUEST` and `SIGNATURE_COMPLETED` to the `NotificationType` enum.

## Step 3: Frontend — WO Detail Signatures Section

**Modify file:** WO detail overview tab (from WO-4)

Extend the existing signatures `customColumnRender` section to include:

### Query updates

```graphql
# Add to the WO detail query — single fragment for all signature states:
fragment WOSignatureFields on Signature {
    id
    assetId
    Asset { url }
    signerId
    signerModel
    signerName
    signerEmail
    signerCompany
    signedAt
    latitude
    longitude
    requestedById
    RequestedBy { id firstName lastName }
    status
    createdAt
}
```

### Signatures section component

Replace the simple signature list with a full section showing:

1. **Action buttons** (top right of section header):
   - "Request Signature" — opens the request flyout (Workflow A)
   - "Collect In-Person" — opens the signing view (Workflow B)
   - Both buttons only visible when WO status is Submitted or later

2. **Signature list** — all Signature records for this WO in a single chronological list, differentiated by `status`:
   - **Signed entries** (`status = "SIGNED"`): Show signature image thumbnail (from Asset), signer name (resolved from `signerId` when `signerModel = "User"`, or from `signerName` when `signerModel = "External"`), timestamp, GPS. Badge: "SIGNED" (green).
   - **Pending requests** (`status = "PENDING"`): Show requested user name (resolved from `signerId`), requested timestamp (`createdAt`), requester name (`RequestedBy`). Badge: "REQUESTED" (blue).
   - **External signatures** (`signerModel = "External"`): Show `signerName`, `signerCompany` if present. Badge: "SIGNED" (green), avatar uses pink (external indicator).

3. **Pending request banner** — If the current user has a pending Signature where `signerId = currentUser.id` and `status = "PENDING"`, show a blue banner at the top of the detail page: "Your signature has been requested" with a "Sign Now" button.

## Step 4: Frontend — Request Signature Flyout (Workflow A)

**Create file:** `apps/frontend/src/components/WorkOrders/RequestSignatureFlyout.tsx`

```typescript
interface IRequestSignatureFlyoutProps {
    className?: string;
    jobId: string;
    existingSignatures: GqlSignature[];  // all Signature records for this WO
    onRequestSent: () => void;
    onClose: () => void;
}
```

### Component behavior

1. Opens as a standard flyout via `openFlyout()`
2. Contains a `CustomCombobox` searching active Users in the organization
3. Filters out users who already have a Signature on this WO (any status — `existingSignatures` with matching `signerId` where `signerModel = "User"`)
4. On "Send Request", calls `createSignature` mutation with `status: "PENDING"`, `signerModel: "User"`, `signerId: selectedUser.id` — no `assetId`
5. On success, shows toast confirmation and closes flyout
6. Parent refetches the WO detail query to update the signatures section

## Step 5: Frontend — WO Signing View (Shared Component)

**Create file:** `apps/frontend/src/components/WorkOrders/WOSigningView.tsx`

This is the shared component used by both Workflow A ("Sign Now" from notification) and Workflow B ("Collect In-Person").

```typescript
interface IWOSigningViewProps {
    className?: string;
    jobId: string;
    mode: "internal" | "external";
    signatureId?: string;  // Workflow A: existing PENDING Signature to complete
    onComplete: () => void;
    onCancel: () => void;
}
```

### Component structure

1. **Read-only WO content** — Fetches the WO data and renders it using the `readOnlySummary` renderers from WO-8a's SteppedFormSummary. Each section displays in the same compact read-only format. This includes existing signatures (shown as thumbnail + name).

2. **Signer info area** (below WO content):
   - **Internal mode:** Signer name auto-populated from the current user's name (read-only display). No email/company fields.
   - **External mode:** Text inputs for Full Name (required), Email (optional), Company (optional).

3. **Signature canvas** — Uses `react-signature-canvas` (same component from `@useanzen/ui` used in WO-3c). Clear button to reset.

4. **GPS capture** — On canvas interaction, request browser geolocation. Store latitude/longitude.

5. **"Confirm Signature" button** — Validates (name required, canvas not empty), then:

```typescript
const handleConfirmSignature = async () => {
    // 1. Convert canvas to PNG blob
    const signatureBlob = signatureCanvasRef.current.toBlob();

    // 2. Upload as Asset
    const asset = await createAsset({ ... });
    await uploadToSignedUrl(asset.uploadUrl, signatureBlob);

    if (signatureId) {
        // 3a. Workflow A — complete an existing PENDING Signature
        await editSignature({
            id: signatureId,
            data: {
                assetId: asset.id,
                status: "SIGNED",
                latitude: gpsCoords?.latitude,
                longitude: gpsCoords?.longitude,
            }
        });
        // Server-side handleSignedNotification fires on status → SIGNED
    } else {
        // 3b. Workflow B — create a new Signature for external signer (already SIGNED)
        await createSignature({
            referenceModel: "Job",
            referenceId: jobId,
            assetId: asset.id,
            signerId: "external",       // or a generated ID for the external signer
            signerModel: "External",
            signerName: signerNameInput,
            signerEmail: signerEmailInput || null,
            signerCompany: signerCompanyInput || null,
            latitude: gpsCoords?.latitude,
            longitude: gpsCoords?.longitude,
        });
        // Server will set status to SIGNED and requestedById from context
    }

    onComplete();
};
```

### Opening the signing view

- **Workflow A ("Sign Now" button):** Opens as a full-screen flyout. Passes `mode="internal"` and the `signatureId` of the pending Signature record.
- **Workflow B ("Collect In-Person" button):** Opens as a full-screen flyout. Passes `mode="external"`. No signatureId.

## Step 6: Frontend — "Sign Now" Banner

**Modify file:** WO detail page (from WO-4)

Check the existing signatures list (already fetched for the signatures section) for a pending request targeting the current user:

```typescript
// In the WO detail page component — derive from the already-fetched signatures:
const myPendingSignature = signatures?.find(
    (s) => s.signerId === currentUser.id
        && s.signerModel === "User"
        && s.status === "PENDING"
);
```

If `myPendingSignature` exists, render a banner at the top of the overview tab:

```tsx
{myPendingSignature && (
    <div className="signature-request-banner">
        <div>
            <strong>Your signature has been requested</strong>
            <span>Requested by {myPendingSignature.RequestedBy.firstName} {myPendingSignature.RequestedBy.lastName}</span>
        </div>
        <button onClick={() => openSigningView("internal", myPendingSignature.id)}>
            Sign Now
        </button>
    </div>
)}
```
