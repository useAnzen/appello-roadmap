# WO-9: Trade Level Override â€” Report & Calculation Audit

## Overview

WO-2 Step 0 adds `overrideTradeLevelId` to `TimeSheetDetailRecord`, allowing a user to have multiple TSDRs for the same job with different trade levels (e.g., Forklift Operator for 4 hours, Journeyman for 4 hours on the same day). Every piece of code that resolves a trade level from a TSDR to calculate wage rates, billable rates, or labour costs must be updated to use the override pattern:

```
effectiveTradeLevelId = detail.overrideTradeLevelId ?? detail.TimeSheetRecord.tradeLevelId
```

Without this audit, reports and exports will use the wrong trade level (and therefore the wrong rate) for any TSDR that has an override set. This would result in incorrect payroll, incorrect job P&L, and incorrect invoices.

**Estimated effort:** 2-3 days
**Risk:** Medium â€” many consumer locations, but each is a small change (add the override fallback). Risk is in *missing* a location, not in the complexity of each change.
**Requires:** WO-2 Step 0 (overrideTradeLevelId schema change)
**Timing:** After WO features are complete, before release. Must ship in Release 1.33.

---

## The Pattern

Every location that reads a trade level in the context of a TimeSheetDetailRecord must change from:

```typescript
// BEFORE (incorrect after WO-2 Step 0):
const tradeLevelId = detail.TimeSheetRecord.tradeLevelId;

// AFTER:
const tradeLevelId = detail.overrideTradeLevelId ?? detail.TimeSheetRecord.tradeLevelId;
```

If the code queries TSDRs and includes the parent TimeSheetRecord for trade level, it must also include `overrideTradeLevelId` on the TSDR itself and check it first.

---

## Audit Results

Codebase audit of `application-mono-repo` completed. The key insight: **the system uses `TimeSheetRecord.userTradeLevelId`** (not `tradeLevelId` directly). This FK points to `UserTradeLevel` which then references the `TradeLevel`. The override must intercept at the point where `userTradeLevelId` is used to resolve which `TradeLevelRate` records to create/update.

### How rate resolution currently works

1. `TimeSheetRecord.userTradeLevelId` â†’ `UserTradeLevel.tradeLevelId` â†’ `TradeLevel`
2. `createTimeSheetDetailRecordValuePerTradeLevelRate()` uses this `tradeLevelId` to find all `TradeLevelRate` records for the user's contract + trade level + wage region
3. Creates one `TimeSheetDetailRecordValue` per `TradeLevelRate` (one per rate label like Wages 1x, 1.5x, 2x)
4. Sum tables (`TimeSheetRecordSums`, `TimeSheetDetailRecordSums`) aggregate by `tradeLevelRateId`
5. Data views (cost reports) JOIN on `TimeSheetDetailRecordValue.tradeLevelRateId` â†’ `TradeLevelRate.baseValue` for cost

**Critical point:** Once `TimeSheetDetailRecordValue.tradeLevelRateId` is set correctly (at creation time), the downstream cost reports and data views will automatically use the correct rate. The fix is concentrated in the **creation and update paths**, not in every report.

---

## Step 1: Timesheet Sums Helper â€” CRITICAL

**File:** `apps/api/src/helpers/timesheetHelper.ts`

### Lines 31-44: INSERT INTO TimeSheetRecordSums

This SQL creates sum records using `tsr.userTradeLevelId` to determine which TradeLevelRates to aggregate. It needs to account for override trade levels.

**What to change:** When building the INSERT query, check `tsdr.overrideTradeLevelId` first. If set, use it to resolve TradeLevelRates instead of `tsr.userTradeLevelId`. This may require restructuring the query to JOIN through `TimeSheetDetailRecord` and use `COALESCE(tsdr.overrideTradeLevelId, utl.tradeLevelId)`.

### Lines 86-108: INSERT INTO TimeSheetDetailRecordSums

Same pattern â€” creates detail-level sum records using `tsr.userTradeLevelId`. Needs the same override check.

**What to change:** Same COALESCE pattern. The detail-level sums must use the per-TSDR override when present.

### What to test

- Standard timesheets (no overrides) â†’ sum records identical to before
- Timesheet with two TSDRs for same job, different overrides â†’ separate sum records per trade level rate

---

## Step 2: TimeSheetRecord Model â€” Rate Value Creation â€” CRITICAL

**File:** `apps/api/src/models/TimeSheetRecord.ts`

### Lines ~1871-1880: createTimeSheetDetailRecordValuePerTradeLevelRate() call

Currently resolves trade level from `userTradeLevel?.tradeLevelId` and creates detail values per rate.

**What to change:** Pass `detail.overrideTradeLevelId ?? userTradeLevel?.tradeLevelId` to `createTimeSheetDetailRecordValuePerTradeLevelRate()`. This ensures the correct TradeLevelRates are created based on the override when present.

### Lines ~1806-1832: userTradeLevelId change handler

When `userTradeLevelId` changes on a TimeSheetRecord, this code updates all related `TimeSheetDetailRecordValue.tradeLevelRateId` records â€” recalculating rates based on the new trade level.

**What to change:** When updating, **skip** detail records where `overrideTradeLevelId` is set. Those records should keep their override-based rates, not be overwritten by the parent change.

### What to test

- Change a user's trade level on a TSR with no overrides â†’ all TSDRVs updated (existing behaviour)
- Change a user's trade level on a TSR that has some TSDRs with overrides â†’ only non-override TSDRVs updated; override TSDRVs unchanged

---

## Step 3: TimeSheetDetailRecordValue Model â€” CRITICAL

**File:** `apps/api/src/models/TimeSheetDetailRecordValue.ts`

### Lines ~245-373: createTimeSheetDetailRecordValuePerTradeLevelRate()

Takes a `tradeLevelId` parameter and creates a `TimeSheetDetailRecordValue` for each `TradeLevelRate` matching that trade level + wage region.

**What to change:** The method signature already accepts a `tradeLevelId` parameter â€” the fix is in the **caller** (Step 2 above) to pass the correct one. However, verify that all callers of this method are passing the override-aware value.

---

## Step 4: Data Views â€” Verify (Likely No Changes)

The cost report data views already JOIN on `TimeSheetDetailRecordValue.tradeLevelRateId` â†’ `TradeLevelRate.baseValue`, NOT on `TimeSheetRecord.userTradeLevelId`. This means **if Steps 1-3 are correct** (the right `tradeLevelRateId` is set on each TSDRV), these views automatically produce correct results.

**Verify these views produce correct output after Steps 1-3:**

| File | View |
|------|------|
| `apps/api/src/dataview/monthlyCostReportView.ts` (line 233) | Monthly cost report â€” `(tsdrvcc.approvedDuration / 3600.0) * tlr.baseValue` |
| `apps/api/src/dataview/costToCompleteReportView.ts` (line 134) | Cost to complete â€” same pattern |
| `apps/api/src/dataview/earnedVsBurnedView.ts` (line 452) | Earned vs burned â€” same pattern |
| `apps/api/src/dataview/monthlyCostReportViewJobLevel.ts` (line 107) | Job-level monthly cost â€” same pattern |

**What to test:** Run each report for a job with override TSDRs and verify the cost uses the override trade level's rate, not the parent's.

---

## Step 5: Sum Tables Schema

**File:** `apps/api/prisma/schema.prisma`

Two sum tables aggregate timesheet data by `tradeLevelRateId`:

| Model | Line | Unique constraint |
|-------|------|------------------|
| `TimeSheetRecordSums` | ~2155 | Groups by `tradeLevelRateId` |
| `TimeSheetDetailRecordSums` | ~2169 | Unique on `(timeSheetDetailRecordId, tradeLevelRateId)` |

**What to verify:** These tables don't need schema changes â€” they group by `tradeLevelRateId` which is the resolved rate, not the trade level. But the **helper that populates them** (Step 1) must feed the correct `tradeLevelRateId` based on the override.

---

## Step 6: Integration Exports (QuickBooks, Sage 50)

**Files:**
- `apps/api/src/models/integration/Quickbook.ts` (lines 82-89)
- `apps/api/src/models/integration/Sage50.ts` (lines 277-283)

Both JOIN `userTradeLevelId` and `tradeLevelRateId` for export mapping.

**What to verify:** These exports use the already-assigned `tradeLevelRateId` from `TimeSheetDetailRecordValue`, not re-deriving from the parent. If Steps 1-3 are correct, these should work automatically. But **verify** that any grouping logic that groups by trade level uses the TSDRV's rate, not the parent TSR's `userTradeLevelId`.

---

## Step 7: Display Views (Timesheet Reports, Matrix, Approval)

| File | What it shows |
|------|---------------|
| `apps/api/src/dataview/timeSheetReportView.ts` (lines 209, 246-247) | Displays `tsr.userTradeLevelId` with JOIN to show trade level name |
| `apps/api/src/dataview/timesheetMatrixView.ts` (lines 633, 782-783) | Selects/filters by `tsr.userTradeLevelId` |

**What to change:** These display the trade level name from the parent TSR. When overrides exist, the display should show the effective trade level per entry. This requires joining `COALESCE(tsdr.overrideTradeLevelId, utl.tradeLevelId)` for the display name.

**Priority:** Lower than Steps 1-3 (display vs. calculation), but should be updated for accuracy.

---

## Step 8: Payroll Export

Payroll exports group by employee + trade level + pay rate. The audit found that QuickBooks and Sage 50 exports use `tradeLevelRateId` from the detail record value (already correct if Steps 1-3 are fixed). However:

**What to verify:** If the payroll grouping uses `TimeSheetRecord.userTradeLevelId` as a grouping key (rather than the per-TSDRV `tradeLevelRateId`), a user with overrides would be grouped incorrectly â€” all hours under the parent trade level instead of split by override.

**What to change if needed:** Group payroll line items by `effectiveTradeLevelId` per TSDR, not by `TimeSheetRecord.userTradeLevelId`.

---

## Step 9: Regression Testing

After all changes:

1. **Run existing payroll export tests** with standard timesheets â†’ output must be identical
2. **Run existing financial report tests** with standard timesheets â†’ output must be identical
3. **Run sum table recalculation** for existing timesheets â†’ sums unchanged
4. **Create test timesheets with overrides** and verify:
    - Two TSDRs for same job, different trade levels â†’ correct `tradeLevelRateId` on each TSDRV
    - Sum tables reflect the per-override rates
    - Cost reports show correct costs per trade level
    - Payroll export produces separate line items per trade level
    - Changing `userTradeLevelId` on parent TSR does NOT affect override TSDRs
5. **Compare P&L totals** for existing jobs before and after â†’ no drift
