# WO-4: Work Order Detail Page — Implementation Plan

## Overview

WO detail page with Overview (summary cards + DataModelDetails with custom renderers for LEM sections), Invoices (read-only from JobBillList), Files (existing), and Settings tabs. PDF export via TemplateSelectionModal with custom LEM renderers. Download template settings tab for admin configuration.

**Estimated effort:** 4-6 days
**Risk:** Medium — custom display components + PDF renderers
**Spec:** `tm-work-orders-uis/uis-20d-detail-page.html`
**Requires:** WO-3a/b/c/d, WO-2

---

## Step 1: WO Detail Page Shell

**Create file:** `apps/frontend/src/components/DetailsPage/WorkOrderDetailPage/index.tsx`

Uses `DetailsPageTabs` with 4 tabs. The page loads the Job record and checks `jobClassification` — if not WORK_ORDER, redirects to the standard Job detail page.

```typescript
const WorkOrderDetailPage: FC = () => {
    const router = useRouter();
    const jobId = router.query.id as string;
    const { permissions } = useAuth();

    const tabs: IDetailsPageTab[] = [
        {
            label: "Overview",
            component: <WorkOrderOverview jobId={jobId} />,
            param: "overview",
            permission: hasPermissions({ job: { view: true } }, permissions)
        },
        {
            label: "Invoices",
            component: <WorkOrderInvoices jobId={jobId} />,
            param: "invoices",
            permission: hasPermissions({ JobBill: { view: true } }, permissions)
        },
        {
            label: "Files",
            component: <JobFiles />,  // existing component
            param: "files",
            permission: hasPermissions({ job: { view: true } }, permissions)
        },
        {
            label: "Settings",
            component: <DataModelSettings modelName="Job" subModel="WORK_ORDER" />,
            param: "settings",
            permission: hasPermissions({ job: { edit: true } }, permissions)
        }
    ];

    return (
        <DetailsPageWrapper>
            {/* Header: WO number, name, status badge, Print PDF, Generate Invoice (WO-7) */}
            <DetailsPageTabs tabs={tabs} />
        </DetailsPageWrapper>
    );
};
```

### Header actions

```typescript
// Print PDF button — opens TemplateSelectionModal with subModel
<Button onClick={() => openModal(
    <TemplateSelectionModal
        apiLink="/api/pdf-export"
        filters={{ reportType: "workOrderDetail", id: jobId }}

        fileType="pdf"
        referenceModel="Job"

**Note:** `TemplateSelectionModal` needs to be updated to accept an optional `subModel` prop and pass it to the template query filter (see Step 5c). The template uses `referenceModel = "Job"` + `subModel = "WORK_ORDER"` to keep WO templates separate from PROJECT_JOB templates without breaking the DAA referenceModel connection.

## Step 2: Overview Tab — Summary Cards + DataModelDetails

**Create file:** `apps/frontend/src/components/DetailsPage/WorkOrderDetailPage/Tabs/Overview.tsx`

### 2a. Summary cards

Query both labour sources plus material/equipment to compute summary values:

```typescript
// Labor hours — TWO SOURCES:

// 1. Structured: TimeSheetDetailRecords for this job
const timesheetHours = timesheetDetails.reduce((sum, detail) => {
    return sum + ((detail.secondsAtService ?? 0) / 3600);
}, 0);

// 2. Blank lines: WorkOrderLaborItems
const blankHours = blankLaborItems.reduce((sum, item) => {
    const hours = item.submittedDuration / 3600;
    return sum + (hours * item.qtyOfWorkers);
}, 0);

const laborHours = timesheetHours + blankHours;

// Material cost: sum all material totals
const materialCost = materialItems.reduce((sum, item) =>
    sum + (item.total ?? 0), 0);

// Equipment — TWO SOURCES:

// 1. Structured: EquipmentTimeEntries for this job
const structuredEquipHours = equipmentTimesheetValues.reduce((sum, val) => {
    return sum + ((val.duration ?? 0) / 3600);
}, 0);

// 2. Blank lines: WorkOrderEquipmentItems
const blankEquipTotal = blankEquipmentItems.reduce((sum, item) =>
    sum + (item.quantity * item.unitRate), 0);

// Total value: computed from rates (viewWageDetails gated)
```

Render 2x3 grid using existing card styling patterns.

### 2b. DataModelDetails with custom renderers

```typescript
<DataModelDetails
    modelName={"Job" as GqlTableDataName}
    recordId={jobId}
    customColumnRender={{
        "wo-labor-items": () => <LaborItemsDisplay jobId={jobId} />,
        "wo-material-items": () => <MaterialItemsDisplay jobId={jobId} />,
        "wo-equipment-items": () => <EquipmentItemsDisplay jobId={jobId} />,
        "wo-signatures": () => <SignaturesDisplay jobId={jobId} />
    }}
    viewSectionType={"DETAILS" as GqlViewSectionType}
/>
```

DataModelDetails handles the standard fields (name, date of work, status, job type, wage region, PO, etc.) automatically from the WORK_ORDER DAA sections. The custom renderers handle the 4 LEM sections.

## Step 3: Read-Only Display Components

### 3a. LaborItemsDisplay

**Create file:** `apps/frontend/src/components/WorkOrder/LaborItemsDisplay.tsx`

Queries **two sources** and renders a combined read-only table:

1. **Structured labour:** `timeSheetRecords(jobId)` → TimeSheetDetailRecords with employee, trade level (using `detail.tradeLevelId ?? record.tradeLevelId`), rate label breakdown, and hours
2. **Blank lines:** `workOrderLaborItems(jobId)` → WorkOrderLaborItem records

Display:
- **Timesheet entries:** Show employee name, trade level, rate label hours breakdown. Grouped by employee/date.
- **Blank rows:** Show description (italic), workers, hours, rate
- Rate column: only visible with `viewWageDetails` permission (check `hasPermissions({ user: { viewWageDetails: true } }, permissions)`)
- Subtotal row at bottom showing combined total hours from both sources

### 3b. MaterialItemsDisplay

**Create file:** `apps/frontend/src/components/WorkOrder/MaterialItemsDisplay.tsx`

Queries `workOrderMaterialItems(jobId)` and renders a read-only table:

- Columns: Material | Qty | Sell Price | Cost | Total
- Structured rows show material name from relation; blank rows show description in italic
- Cost column gated by `viewWageDetails` permission
- Subtotal row showing total dollar amount

### 3c. EquipmentItemsDisplay

**Create file:** `apps/frontend/src/components/WorkOrder/EquipmentItemsDisplay.tsx`

Queries **two sources** and renders a combined read-only table:

1. **Structured equipment:** `equipmentTimeEntrys(jobId)` → EquipmentTimeEntry records (from EQ-0) queried directly by `jobId`. Equipment name from relation, rate type label, duration. Rate resolved via `resolveEquipmentRate` from LEM-2.
2. **Blank lines:** `workOrderEquipmentItems(jobId)` → WorkOrderEquipmentItem records (description, quantity, unitRate only — no equipmentId, no rate labels)

Display:
- **Logged equipment:** Show equipment name, rate type, duration. Grouped by equipment/date.
- **Blank rows:** Show description (italic), qty, rate
- Rate/cost info gated by `viewWageDetails` permission
- Subtotal row at bottom showing combined total from both sources

### 3d. SignaturesDisplay

**Create file:** `apps/frontend/src/components/WorkOrder/SignaturesDisplay.tsx`

Queries `signatures(referenceModel: "Job", referenceId: jobId)` and renders a flex-wrap grid:

- Each signature: image thumbnail (from Asset), signer name (from User relation or stored name), signed date/time, GPS coordinates
- Uses existing image display patterns from the app

## Step 5: PDF Export — Custom WorkOrder Renderer

**Create file:** `apps/frontend/src/components/DownloadablePDF/WorkOrder/WorkOrderPDF.tsx`

The PDF renderer receives the `templateId` and the `jobId`. It:

1. Loads the `ObjectDownloadTemplate` to determine which DAAs are included
2. Loads the Job record + all line items + signatures
3. Renders standard DAA fields as key-value pairs (same as Job PDF)
4. Renders custom sections for the 4 LEM DAA slugs with table formatting

### Custom section renderers

```typescript
// For each DAA slug included in the template:
switch (daa.slug) {
    case "wo-labor-items":
        return renderLaborTable(timesheetDetails, blankLaborItems, includeRates);
    case "wo-material-items":
        return renderMaterialTable(materialItems);
    case "wo-equipment-items":
        return renderEquipmentTable(equipmentTimesheetValues, blankEquipmentItems, includeRates);
    case "wo-signatures":
        return renderSignatures(signatures);
    default:
        return renderStandardField(daa, recordData);
}
```

Each LEM table renderer produces PDF-compatible markup following the same patterns as `SimpleInvoicePDF.tsx` for table layout.

## Step 6: Add subModel to ObjectDownloadTemplate + TemplateSelectionModal + ObjectDownloadTemplates

The `ObjectDownloadTemplate` model, `TemplateSelectionModal`, and `ObjectDownloadTemplates` settings component all need subModel support so WO templates and Job templates don't mix.

### 6a. Schema: add subModel to ObjectDownloadTemplate

**File:** `apps/api/prisma/schema.prisma`

```prisma
// Add to existing ObjectDownloadTemplate model:
subModel    String?   @db.VarChar(191)
```

Migration:

```sql
ALTER TABLE `ObjectDownloadTemplate` ADD COLUMN `subModel` VARCHAR(191) NULL;

-- Backfill existing Job templates to PROJECT_JOB
UPDATE `ObjectDownloadTemplate`
SET `subModel` = 'PROJECT_JOB'
WHERE `referenceModel` = 'Job'
AND (`subModel` IS NULL OR `subModel` = '');
```

## Step 7: Download Template Seed Migration

**Create file:** `apps/api/prisma/migrations/[timestamp]_wo_download_template_seed/migration.sql`

Seed a "Default Work Order Template" with ALL WO DAA fields turned on.

```sql
-- Create the ObjectDownloadTemplate with subModel
INSERT INTO `ObjectDownloadTemplate` (`id`, `createdAt`, `updatedAt`, `referenceModel`, `subModel`, `templateName`)
VALUES ('GENERATE_ID_TMPL', NOW(), NOW(), 'Job', 'WORK_ORDER', 'Default Work Order Template');

-- Link ALL WORK_ORDER DAAs to the template
INSERT INTO `_DocumentAttributeAssignmentToObjectDownloadTemplate`
    (`A`, `B`)
SELECT
    daa.id,
    'GENERATE_ID_TMPL'
FROM `DocumentAttributeAssignment` daa
WHERE daa.referenceModel = 'Job'
AND daa.subModel = 'WORK_ORDER'
AND daa.isDeleted = false;
```

**Key:** `referenceModel = "Job"` + `subModel = "WORK_ORDER"` — consistent with how DAAs are stored. The `TemplateSelectionModal` with `subModel="WORK_ORDER"` finds this template. Job templates have `subModel = "PROJECT_JOB"` from the backfill.

## Step 8: Add "Work Orders" Tab to Download Template Settings

**File:** `apps/frontend/src/components/Settings/DownloadTemplates/ObjectDownloadTabs.tsx`

Add a new tab after "Jobs" (~line 47). Also update the existing Jobs tab to pass `subModel="PROJECT_JOB"`.

```typescript
// Update existing Jobs tab (~line 38):
{
    id: "jobs",
    label: "Jobs",
    content: (
        <ObjectDownloadTemplates
            allowEdit={allowEdit}
            referenceModel="Job"
            subModel="PROJECT_JOB"      // <-- ADD
        />
    ),
    // ... existing permission
},

// Add new Work Orders tab after Jobs:
{
    id: "workOrders",
    label: "Work Orders",
    content: (
        <ObjectDownloadTemplates
            allowEdit={allowEdit}
            referenceModel="Job"
            subModel="WORK_ORDER"
        />
    ),
    permission: hasPermissions(
        { ObjectDownloadTemplate: { view: true } },
        permissions
    ),

No `defaultIncludedFields` — all fields are fully toggleable by the admin. The seeded "Default Work Order Template" has everything turned on, but admins can turn off any LEM section (labor, material, equipment, signatures). The PDF renderer simply skips sections not included in the selected template.

The `ObjectDownloadTemplates` component already has `referenceModel` — now with `subModel` added in Step 6c, it queries both `referenceModel = "Job"` and `subModel = "WORK_ORDER"` to load the correct DAAs for field toggles and the correct templates for the list. The existing Jobs tab gets `subModel="PROJECT_JOB"` to avoid showing WO templates.
