# WO-3b: Line Item Editors — Implementation Plan

## Overview

Three custom input components (LaborItemEditor, MaterialItemEditor, EquipmentItemEditor) that replace the `<p>` tag placeholders in the DataModelForm's `customFormControl` from WO-3a. All maintain local state and save only when the parent form's Save Draft/Submit is clicked. No backend changes — all models and mutations are from WO-2.

**Estimated effort:** 4-5 days
**Risk:** Medium — complex frontend components, multiple interaction patterns
**Spec:** `tm-work-orders-uis/uis-20c-2-line-item-editors.html`
**Requires:** WO-3a (DAA positions + customFormControl), WO-2 (line item models + upsertWorkOrderLineItems mutation), PR #6831 (DataModelForm)

---

## Step 1: Shared Patterns and Utilities

Before building the three editors, establish shared patterns they all use.

### 1a. AddLineDropdown component

All three editors use the same "+ Add [Type] ▾" dropdown with "Structured Line" and "Blank Line" options.

**Create file:** `apps/frontend/src/components/WorkOrder/AddLineDropdown.tsx`

```typescript
interface IAddLineDropdownProps {
    label: string;  // "Labor", "Material", "Equipment"
    onAddStructured: () => void;
    onAddBlank: () => void;
}
```

- Uses `Popover` from `@headlessui/react` (existing dependency) or a simple dropdown state
- Two options: "Structured Line" with helper text + "Blank Line" with helper text
- Green button styling matching the mockups

### 1b. Line item row visual convention

- Structured rows: solid `border` + `bg-gray-50` background
- Blank rows: dashed `border-dashed border-gray-300` + white background
- Remove button (×): red, right-aligned, on every row
- Each row is a self-contained card with padding

### 1c. Duration/hours utility

Shared conversion between display hours and stored seconds:

```typescript
// In a shared utils file or inline:
const hoursToSeconds = (hours: number): number => Math.round(hours * 3600);
const secondsToHours = (seconds: number): number => Number((seconds / 3600).toFixed(2));
```

## Step 2: LaborItemEditor

**Create file:** `apps/frontend/src/components/WorkOrder/LaborItemEditor.tsx`

### Props

```typescript
interface ILaborItemEditorProps {
    className?: string | ClassNames;
    jobId: string;
    dateOfWork: Date | null;
    items: ILaborRow[];
    setItems: (items: ILaborRow[]) => void;
}
```

### Data loading

On mount (and when `dateOfWork` changes), load:

1. **User's EmployeeAgreement** — query the current user's employment record to find their agreement. If multiple, show selector. If one, auto-select.

2. **Active EmployeeAgreementContract** — for the selected agreement, find the contract where `effectiveDate <= dateOfWork`:
```graphql
query ActiveContract($employeeAgreementId: ID!, $date: Date!) {
    employeeAgreementContracts(
        options: { where: { employeeAgreementId: $employeeAgreementId } }
    ) {
        # Filter client-side by effectiveDate <= dateOfWork, take most recent
    }
}
```

3. **TradeLevelRates for the contract** — load trade levels and rate labels:
```graphql
query TradeLevelRatesForContract($contractId: ID!) {
    employeeAgreementContract(id: $contractId) {
        TradeLevelRates {
            id
            tradeLevelId
            employeeAgreementRateLabelId
            TradeLevel { id, name, orderNo }
            EmployeeAgreementRateLabel { id, name, isLineItem }
        }
        EmployeeAgreement {
            EmployeeAgreementRateLabels {
                id, name, isLineItem
            }
        }
    }
}
```

Filter rate labels to `isLineItem = false` for the column headers (e.g., Wages 1x, Wages 1.5x, Wages 2x).

### Structured row rendering

Each structured row renders:
- Employee Agreement (read-only or selector)
- Trade Level (dropdown from loaded trade levels)
- Workers qty (number input)
- Rate label columns (one per EmployeeAgreementRateLabel where `isLineItem = false`) — hour inputs matching the `TimesheetRateLabelColumns.tsx` pattern

When the user enters hours in a column, update the `rateLabelDurations` map with the corresponding rateLabelId and seconds value.

### Blank row rendering

Simpler layout:
- Description (text input, required)
- Workers qty (number input)
- Hours (number input, single column)
- Rate (CurrencyInput)

### Adding rows

```typescript
const handleAddStructured = () => {
    setItems([...items, {
        type: "structured",
        orderNo: items.length,
        employeeAgreementId: autoSelectedAgreementId,
        tradeLevelId: "",
        qtyOfWorkers: 1,
        rateLabelDurations: {}
    }]);
};

const handleAddBlank = () => {
    setItems([...items, {
        type: "blank",
        orderNo: items.length,
        description: "",
        qtyOfWorkers: 1,
        submittedDuration: 0,
        rate: 0
    }]);
};
```

### Subtotal

At the bottom of the editor, show total hours across all rows:

```typescript
const totalHours = items.reduce((sum, item) => {
    if (item.type === "structured") {
        const rowHours = Object.values(item.rateLabelDurations)
            .reduce((s, seconds) => s + seconds, 0) / 3600;
        return sum + (rowHours * item.qtyOfWorkers);
    } else {
        return sum + ((item.submittedDuration / 3600) * item.qtyOfWorkers);
    }
}, 0);
```

Display: `Total Labor Hours: 30.0 hrs (4 workers · 2 trade levels · 1 blank)`

### Key pattern to follow

The rate label columns should follow `TimesheetRateLabelColumns.tsx` (at `apps/frontend/src/components/Forms/TimesheetAddEditForm/TimesheetRateLabelColumns.tsx`) — same concept of one column per rate label with hour input per cell.

## Step 3: MaterialItemEditor

**Create file:** `apps/frontend/src/components/WorkOrder/MaterialItemEditor.tsx`

### Props

```typescript
interface IMaterialItemEditorProps {
    className?: string | ClassNames;
    jobId: string;
    items: IMaterialRow[];
    setItems: (items: IMaterialRow[]) => void;
}

interface IMaterialRow {
    id?: string;  // set when editing existing
    type: "structured" | "blank";
    orderNo: number;
    materialId?: string;
    materialName?: string;   // display only
    unitOfMeasure?: string;  // from MaterialGroup
    description?: string;
    quantity?: number;
    unitPrice?: number;   // sell price (auto from LEM-3 cascade, editable)
    costPrice?: number;   // cost basis (read-only for margin visibility)
    total?: number;
}
```

### Structured row

- Material selector: `CustomCombobox` with `useSearchCore`, `queryResultLabel="Material"` — same pattern as equipment/job selectors throughout the app
- On material select: auto-populate `materialName`, `unitOfMeasure` (from MaterialGroup), `unitPrice` (from `resolveMaterialSellPrice()` LEM-3 cascade), and `costPrice` (from cost basis)
- Sell Price: `CurrencyInput` — auto-populated from LEM-3 cascade, editable for override
- Cost: shown read-only for margin visibility (requires `viewWageDetails` permission)
- Total: auto-calculated `quantity * unitPrice`, updated on every change

### Blank row

- Description: text input (required)
- Qty: number input
- Unit Cost: `CurrencyInput`
- Total: auto-calculated

### Subtotal

```typescript
const materialTotal = items.reduce(
    (sum, item) => sum + (item.total ?? 0), 0
);
```

Display: `Material Total: $531.50 (2 items)`

## Step 4: EquipmentItemEditor

**Create file:** `apps/frontend/src/components/WorkOrder/EquipmentItemEditor.tsx`

### Props

    type: "blank";

### Structured row

- Equipment selector: `CustomCombobox` with `useSearchCore`, `queryResultLabel="Equipment"` — Solr-indexed
- On equipment select: store `equipmentCategoryId`, load `EquipmentRateLabels` for the category via `equipmentRateLabels(equipmentCategoryId)` query (from LEM-2)
- Rate Type: dropdown populated from loaded EquipmentRateLabels (Standard, Standby, OT, etc.)
- Per: display from rate configuration (Hour, Day, etc.) — may be pre-set from EquipmentAssignment context (business question from UIS-15H)
- Duration: number input labeled by `per` ("hrs", "days"), stored in seconds

### Blank row

- Description: text input (required)
- Qty: number input
- Per: text label (user types "days", "hrs", etc.)
- Rate: `CurrencyInput`

### Subtotal

Show grouped by per-unit type:
`Total Equipment: 8.0 hrs + 2 days (1 structured · 1 blank)`

## Step 5: Replace Placeholders in customFormControl

**File:** Job DataModelForm page (from PR #6831)

Replace the `<p>` tag placeholders from WO-3a with real components:

```typescript
import { LaborItemEditor } from "~root/components/WorkOrder/LaborItemEditor";
import { MaterialItemEditor } from "~root/components/WorkOrder/MaterialItemEditor";
import { EquipmentItemEditor } from "~root/components/WorkOrder/EquipmentItemEditor";

// State for line items (managed at the form level, passed to editors)
const [laborItems, setLaborItems] = useState<ILaborRow[]>([]);
const [materialItems, setMaterialItems] = useState<IMaterialRow[]>([]);
const [equipmentItems, setEquipmentItems] = useState<IEquipmentRow[]>([]);

const customFormControl = {
    "wo-labor-items": (formData, setFormData) => (
        <LaborItemEditor
            jobId={jobId}
            dateOfWork={formData["wo-date-of-work"]}
            items={laborItems}
            setItems={setLaborItems}
        />
    ),
    "wo-material-items": (formData, setFormData) => (
        <MaterialItemEditor
            jobId={jobId}
            items={materialItems}
            setItems={setMaterialItems}
        />
    ),
    "wo-equipment-items": (formData, setFormData) => (
        <EquipmentItemEditor
            jobId={jobId}
            items={equipmentItems}
            setItems={setEquipmentItems}
        />
    ),
    "wo-signatures": () => <p>Signatures</p>  // WO-3c
};
```

### Load existing items on edit

When editing an existing WO, query the line items and populate state:

```typescript
useEffect(() => {
    if (jobId) {
        // Load existing labor items
        getWorkOrderLaborItems({ variables: { jobId } }).then(res => {
            // Transform DB records back into ILaborRow format
            // Group by orderNo for structured rows
        });
        // Same for material and equipment
    }
}, [jobId]);
```

### On form save

Intercept the DataModelForm's save handler to include line items:

```typescript
const handleSave = async (formData) => {
    // 1. Save the Job via DataModelForm's normal save
    const savedJob = await saveJob(formData);

    // 2. Transform local state into mutation input
    const laborInput = transformLaborRowsToInput(laborItems);
    const materialInput = transformMaterialRowsToInput(materialItems);
    const equipmentInput = transformEquipmentRowsToInput(equipmentItems);

    // 3. Save line items
    await upsertWorkOrderLineItems({
        variables: {
            input: {
                jobId: savedJob.id,
                laborItems: laborInput,
                materialItems: materialInput,
                equipmentItems: equipmentInput
            }
        }
    });
};
```

### Transform functions

```typescript
// Structured labor rows expand into multiple DB records (one per rate label with hours > 0)
function transformLaborRowsToInput(rows: ILaborRow[]): UpsertWorkOrderLaborItemInput[] {
    const items: UpsertWorkOrderLaborItemInput[] = [];
    for (const row of rows) {
        if (row.type === "structured") {
            for (const [rateLabelId, seconds] of Object.entries(row.rateLabelDurations)) {
                if (seconds > 0) {
                    // Resolve tradeLevelRateId from (contractId + tradeLevelId + rateLabelId)
                    const tradeLevelRateId = resolveTradeLevelRateId(
                        row.tradeLevelId, rateLabelId
                    );
                    items.push({
                        tradeLevelRateId,
                        qtyOfWorkers: row.qtyOfWorkers,
                        submittedDuration: seconds,
                        orderNo: row.orderNo
                    });
                }
            }
        } else {
            items.push({
                tradeLevelRateId: null,
                rate: row.rate,
                qtyOfWorkers: row.qtyOfWorkers,
                submittedDuration: row.submittedDuration,
                description: row.description,
                orderNo: row.orderNo
            });
        }
    }
    return items;
}

// Material and equipment transforms are simpler — 1:1 mapping
```
