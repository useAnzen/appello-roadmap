# IE-1: EstimateLineItem Schema & Model — Implementation Plan

## Overview

Add `EstimateLineItem` and `EstimateLineItemType` enum to Prisma; wire BaseModel + GraphQL; expose `resolveEstimateLineItemUnitCost` for UI auto-fill. Depends on LEM-1 (billable labor rates) and LEM-2 (equipment resolution).

**Estimated effort:** 3-4 days  
**Spec:** `uis-IE-1-schema-model.html`  
**Requires:** LEM-1, LEM-2

---

## Step 1: Prisma schema

**File:** `apps/api/prisma/schema.prisma`

- Add enum `EstimateLineItemType` with values Labor, Material, Equipment, Custom.
- Add model `EstimateLineItem` with fields per UIS (instanceId, FK to EstimateChangeOrderRecord, optional tradeLevelId, materialId, equipmentId, userId, description, quantity, unit, unitCost, totalCost, markupPercent, markupDollarValue, price, orderNo, isDeleted, isArchived, timestamps).
- Add inverse relation array on `EstimateChangeOrderRecord`.

Run migration via `pnpm --filter api prisma:migrate`.

---

## Step 2: Model layer

**New file:** `apps/api/src/models/EstimateLineItem.ts`

- Extend BaseModel with `permissionName` aligned to estimate permissions.
- Implement `getList` filtered by `estimateChangeOrderRecordId` and instance.

**New file:** `apps/api/src/services/EstimateLineItemPricing.ts` (or methods on model)

- `resolveUnitCostForLine(input)`:
  - Labor + tradeLevelId: read `TradeLevelRate.billableValue` for active agreement context (match existing timesheet rate selection patterns).
  - Equipment + equipmentId: delegate to `EquipmentRateValueModel.resolveEquipmentRate`.
  - Material + materialId: call `MaterialPricingService` when LEM-3 exists; else use `MaterialAttributePrice` fallback documented in code.

---

## Step 3: GraphQL

**New file:** `apps/api/src/graphql/models/EstimateLineItem.ts`

- Type `EstimateLineItem`, inputs for create/edit, queries `estimateLineItems(estimateChangeOrderRecordId)`.
- Mutation `resolveEstimateLineItemUnitCost`.

**Modify:** `apps/api/src/graphql/schema.ts` — register typeDefs, Query, Mutation, resolvers.

---

## Step 4: TypeScript validation

```bash
pnpm --filter api build
```

---

## UI / UX deliverables (handoff to IE-2)

- Keep the **field-to-column matrix** and **example rows per type** in `uis-IE-1-schema-model.html` in sync with any Prisma renames.
- **Resolver input checklist** (for `ResolveEstimateLineItemUnitCostInput` or equivalent):
  - **Labor:** `lineItemType`, `userId`, `tradeLevelId`, job/agreement context, instanceId.
  - **Material:** `materialId`, optional qty for tiered pricing.
  - **Equipment:** `equipmentId`, billing unit (hr/day).
  - **Custom:** resolver not called; UI sends manual `unitCost`.
- Confirm GraphQL `EstimateLineItem` type exposes every field IE-2 grid needs (`totalCost`, `markupDollarValue`, relations for display names).

---

## Checklist

- [ ] Migration applies cleanly on empty DB
- [ ] CRUD covered by manual test or API test harness
- [ ] `resolveEstimateLineItemUnitCost` returns sensible values for sample trade level and equipment
- [ ] No raw Prisma in resolvers beyond BaseModel delegation pattern

---

## Integration / E2E test scenarios

1. **Migration + CRUD:** Apply migration; create estimate record; `createEstimateLineItem` for each `lineItemType`; `estimateLineItems` returns rows with correct `orderNo` and soft-delete respected on `deleteEstimateLineItem`.
2. **Resolver Labor:** Seed `User`, `UserTradeLevel`, `TradeLevelRate`; call `resolveEstimateLineItemUnitCost` with `Labor` + `userId` + `tradeLevelId`; assert returned `Float` matches billable rate.
3. **Resolver Equipment:** Seed equipment + LEM-2 rate; pass `unit: day` vs `hr`; assert different positive floats.
4. **Resolver Material:** With LEM-3 fixture (or stub), assert material path returns catalog-aligned unit cost or documented null.
5. **Custom:** Call resolver with `Custom`; expect null/error path; persist manual `unitCost` via `createEstimateLineItem`.
6. **Permissions:** User without estimate edit permission receives forbidden on mutations (align with BaseModel tests).
