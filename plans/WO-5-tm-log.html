**Risk:** Low — refactoring existing working code into a shared component

## Step 1: Extract SharedJobListView

**Create file:** `apps/frontend/src/components/SharedListViews/SharedJobListView.tsx`

Extract the entire `JobListTable` component body from `pages/jobs/index.tsx` into this shared component. Replace all hardcoded values with props.

### What moves out of `pages/jobs/index.tsx`:

- All `useState` hooks (kanbanColumns)
- `useGetJobLazyQuery` for edit handler
- Status query (`GetJobStatus` / `GetStatusProperty`) — parameterize `propertyName`
- `updateJobStatus` mutation
- `updateCardOrder` mutation
- `archiveJobs` / `deleteJobs` / `restoreJobs` mutations
- `relatedDeleteCount` query
- `updateStatus` handler
- `handleEdit` handler
- The `ListTableViews` component with all its props

### Props interface

```typescript
interface ISharedJobListViewProps {
    className?: string;
    subModel: string;
    statusPropertyName: string;
    tableName: string;
    label: string;
    createButtonText: string;
    searchPlaceholder: string;
    detailsRoute: string;
    breadcrumbs: Array<{ name: string; onClick: () => void }>;
    sessionFilterName: string;
}
```

### Key parameterizations in the extracted component

```typescript
// ListTableViews props that change:
<ListTableViews<GqlJob>
    referenceModel="Job"
    subModel={subModel}                    // was hardcoded "Job"
    tableName={tableName}                  // was "Jobs"
    label={label}                          // was "Jobs"
    searchPlaceholder={searchPlaceholder}  // was job-focused text
    createButtonText={createButtonText}    // was "Create Job"
    sessionFilterName={sessionFilterName}  // was "jobs"
    // ... rest unchanged
/>

// Status query — parameterize propertyName:
useQuery(GET_STATUS_PROPERTY, {
    variables: { propertyName: statusPropertyName }  // was "job status"
});

// Kanban card detailsLink:
cardContentLayout={(item) => ({
    title: `${item.fullJobNumber} - ${item.name}`,
    content: (...),
    detailsLink: `${detailsRoute}/${item.id}?tab=overview`  // was `/jobs/${item.id}`
})}

// Create button — open DataModelForm with correct subModel:
createButtonClick={(callback) =>
    openFlyout(
        <JobAddEditForm
            formType={"CREATE" as GqlDataModelFormType}
            subModel={subModel}        // NEW — determines which DAAs load
            onCanceled={closeFlyout}
            onSaved={() => {
                closeFlyout();
                callback();
            }}
        />
    )
}
```

### JobNowClosedModal consideration

The existing Jobs page uses `JobNowClosedModal` for archive confirmation and status-change-to-done handling. This should still work for Work Orders since it operates on the Job model. However, if the modal text is job-specific ("Job is now complete"), it may need parameterization. Evaluate during implementation — for v1 the same text is fine.

## Step 3: Create Work Orders List Page

**Create file:** `apps/frontend/src/pages/work-orders/index.tsx`

```typescript
import { FC } from "react";
import { useRouter } from "next/router";
import { SharedJobListView } from "~root/components/SharedListViews/SharedJobListView";
import { PageTitle } from "~root/components";

const WorkOrderListPage: FC = () => {
    const router = useRouter();

    return (
        <>
            <PageTitle title="Work Orders" />
            <SharedJobListView
                subModel="WORK_ORDER"
                statusPropertyName="workOrderStatus"
                tableName="Work Orders"
                label="Work Orders"
                createButtonText="Create Work Order"
                searchPlaceholder="Search WO #, Description, Company, Status, Type"
                detailsRoute="/work-orders"
                breadcrumbs={[
                    { name: "Home", onClick: () => router.push("/") },
                    { name: "Work Orders", onClick: () => router.push("/work-orders") }
                ]}
                sessionFilterName="workOrders"
            />
        </>
    );
};

export default WorkOrderListPage;
```

That's it. The `SharedJobListView` handles everything — table, kanban, CRUD, search, filters, CSV, status updates — all scoped to WORK_ORDER via the subModel prop.

(function() {
    var md = document.getElementById('plan-md').textContent;
    var target = document.getElementById('rendered');
    var html = md
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
            return '<pre><code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
        })
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr>');
    html = html.replace(/^- \[ \] (.+)$/gm, '<div class="check-item"><div class="check-box"></div><span>$1</span></div>');
    html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var headers = rows[0].split('|').filter(function(c) { return c.trim(); });
        var isSep = /^[\s|:\-]+$/.test(rows[1]);
        var start = isSep ? 2 : 1;
        var out = '<table><thead><tr>';
        headers.forEach(function(h) { out += '<th>' + h.trim() + '</th>'; });
        out += '</tr></thead><tbody>';
        for (var i = start; i < rows.length; i++) {
            var cells = rows[i].split('|').filter(function(c) { return c.trim(); });
            out += '<tr>'; cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; }); out += '</tr>';
        }
        out += '</tbody></table>';
        return out;
    });
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    html = html.replace(/^(?!<[hultdps\/<]|<\/|<code|<pre|<hr|<div|<strong|<em)(.+)$/gm, '<p>$1</p>');
    target.innerHTML = html;
})();
</script>
